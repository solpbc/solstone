<!-- Status Pane Component -->
<aside id="status-pane" class="status-pane" tabindex="-1" aria-label="status">
  <div class="status-pane-content">
    <h3 id="status-sentence">connecting&hellip;</h3>
    <div class="status-pane-detail" style="display: flex; flex-direction: column; gap: 4px;">
      <span id="status-detail"></span>
    </div>
    <details class="status-pane-technical" style="margin-top: 12px;">
      <summary style="cursor: pointer; user-select: none;">technical details</summary>
      <div class="status-pane-technical" style="display: flex; flex-direction: column; gap: 4px; margin-top: 8px;">
        <div><strong>state:</strong> <span id="ws-status-raw">connecting</span></div>
        <div><strong>uptime:</strong> <span id="ws-uptime-raw">-</span></div>
        <div><strong>last message:</strong> <span id="ws-last-message-raw">-</span></div>
      </div>
    </details>

    <div id="capture-status-section" style="margin-top: 12px; display: none;">
      <h4 style="margin: 0 0 4px 0; font-size: 13px; font-weight: 600;">capture</h4>
      <span id="capture-status-text" style="font-size: 13px;"></span>
    </div>

    <div id="version-section" style="margin-top: 12px; display: none;">
      <h4 style="margin: 0 0 4px 0; font-size: 13px; font-weight: 600;">version</h4>
      <span id="version-text" style="font-size: 13px;"></span>
    </div>

    <div id="quiet-notifs-section" style="display:none; margin-top: 16px;">
      <h3 style="margin-bottom: 8px;">quiet notifications</h3>
      <div id="quiet-notifs-list" style="display: flex; flex-direction: column; gap: 4px; font-size: 13px;"></div>
    </div>

    <h3 style="margin-top: 16px;">recent activity <button id="notif-bell" title="enable browser notifications" aria-label="enable browser notifications">🔔</button></h3>
    <div id="notification-history" style="display: flex; flex-direction: column; gap: 4px; font-size: 13px;">
      <span style="color: #9ca3af;">no recent activity</span>
    </div>
  </div>
</aside>

<script>
// Status pane toggle logic
(function(){
  const statusIcon = document.querySelector('.facet-bar .status-icon');
  const statusPane = document.querySelector('.status-pane');
  const liveRegion = document.getElementById('status-live-region');
  let statusPaneOpen = false;
  let _lastHistoryLen = -1;
  let _systemStatusInterval = null;
  let _lastCaptureStatus = null;

  // Shared label updater — called from here and from websocket.js
  window.updateStatusLabel = function() {
    if (!statusIcon) return;
    const metrics = window.appEvents?.getMetrics?.();
    const state = metrics?.state || 'connecting';
    const expanded = statusIcon.getAttribute('aria-expanded') === 'true';
    statusIcon.setAttribute('aria-label',
      'system status: ' + state + ', ' + (expanded ? 'expanded' : 'collapsed'));
    if (liveRegion) liveRegion.textContent = state;
  };

  if (statusIcon && statusPane) {
    statusIcon.addEventListener('click', (e) => {
      e.stopPropagation();
      statusPaneOpen = !statusPaneOpen;
      statusIcon.setAttribute('aria-expanded', statusPaneOpen ? 'true' : 'false');
      window.updateStatusLabel();

      if (statusPaneOpen) {
        statusPane.classList.add('visible');
        statusPane.focus();
        window.AppServices?.quietNotifs?.markViewed();
        renderQuietNotifs();
        updateStatusPane();
        fetchSystemStatus();
        _systemStatusInterval = setInterval(fetchSystemStatus, 60000);
      } else {
        statusPane.classList.remove('visible');
        if (_systemStatusInterval) { clearInterval(_systemStatusInterval); _systemStatusInterval = null; }
        statusIcon.focus();
      }
    });

    // Close status pane when clicking outside
    document.addEventListener('click', (e) => {
      if (statusPaneOpen && statusPane && statusIcon &&
          !statusIcon.contains(e.target) && !statusPane.contains(e.target)) {
        statusPaneOpen = false;
        statusPane.classList.remove('visible');
        statusIcon.setAttribute('aria-expanded', 'false');
        if (_systemStatusInterval) { clearInterval(_systemStatusInterval); _systemStatusInterval = null; }
        window.updateStatusLabel();
        statusIcon.focus();
      }
    });

    // Escape to close status pane
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && statusPaneOpen) {
        statusPaneOpen = false;
        statusPane.classList.remove('visible');
        statusIcon.setAttribute('aria-expanded', 'false');
        if (_systemStatusInterval) { clearInterval(_systemStatusInterval); _systemStatusInterval = null; }
        window.updateStatusLabel();
        statusIcon.focus();
      }
    });
  }

  // Update status pane metrics
  function updateStatusPane() {
    if (!window.appEvents) return;
    if (!statusPaneOpen) return;

    const metrics = window.appEvents.getMetrics();
    const statusSentence = document.getElementById('status-sentence');
    const statusDetail = document.getElementById('status-detail');
    const wsStatusRaw = document.getElementById('ws-status-raw');
    const wsUptimeRaw = document.getElementById('ws-uptime-raw');
    const wsLastMessageRaw = document.getElementById('ws-last-message-raw');

    if (statusSentence) {
      if (metrics.state === 'connected') {
        statusSentence.textContent = 'all systems connected';
        statusSentence.style.color = '#10b981';
      } else if (metrics.state === 'connecting') {
        statusSentence.textContent = 'connecting…';
        statusSentence.style.color = '#f59e0b';
      } else {
        statusSentence.textContent = 'connection lost — reconnecting';
        statusSentence.style.color = '#ef4444';
      }
    }

    if (statusDetail) {
      if (metrics.state === 'connected') {
        const uptimeText = `connected for ${formatDurationHuman(Math.floor(metrics.uptimeMs / 1000))}`;
        if (metrics.lastMessageMs !== null) {
          const seconds = Math.floor(metrics.lastMessageMs / 1000);
          const lastUpdate = seconds === 0 ? 'just now' : `${formatDurationHuman(seconds)} ago`;
          statusDetail.textContent = `${uptimeText} · last update ${lastUpdate}`;
        } else {
          statusDetail.textContent = uptimeText;
        }
      } else if (metrics.state === 'connecting') {
        statusDetail.textContent = '';
      } else {
        statusDetail.textContent = 'some features may be delayed';
      }
    }

    if (wsStatusRaw) {
      wsStatusRaw.textContent = metrics.state;
    }

    if (wsUptimeRaw) {
      if (metrics.connected) {
        wsUptimeRaw.textContent = formatDuration(Math.floor(metrics.uptimeMs / 1000));
      } else {
        wsUptimeRaw.textContent = '-';
      }
    }

    if (wsLastMessageRaw) {
      if (metrics.lastMessageMs !== null) {
        const seconds = Math.floor(metrics.lastMessageMs / 1000);
        wsLastMessageRaw.textContent = seconds === 0 ? 'just now' : `${formatDuration(seconds)} ago`;
      } else if (metrics.connected) {
        wsLastMessageRaw.textContent = 'no messages yet';
      } else {
        wsLastMessageRaw.textContent = '-';
      }
    }

    // Update composite icon if we have capture data
    if (_lastCaptureStatus !== null) updateCompositeIcon();

    // Update notification history
    updateNotificationHistory();
    updateBellState();
  }

  function fetchSystemStatus() {
    fetch('/api/system/status')
      .then(r => r.ok ? r.json() : null)
      .catch(() => null)
      .then(data => {
        if (!data) return;
        _lastCaptureStatus = data.capture?.status || null;
        renderCaptureSection(data.capture);
        renderVersionSection(data.version);
        updateCompositeIcon();
      });
  }

  function renderCaptureSection(capture) {
    const section = document.getElementById('capture-status-section');
    const text = document.getElementById('capture-status-text');
    if (!section || !text) return;

    section.style.display = '';
    const status = capture?.status;
    const displayStatus = status === 'no_observers' ? 'no observers' : (status || 'unknown');
    if (status === 'active') {
      text.style.color = '#10b981';
    } else if (status === 'stale') {
      const names = (capture.observers || []).filter(o => o.status === 'stale').map(o => o.name).join(', ');
      text.textContent = 'capture ' + displayStatus + (names ? ' — ' + names : '');
      text.style.color = '#f59e0b';
      return;
    } else if (status === 'offline') {
      text.style.color = '#ef4444';
    } else {
      text.style.color = '#9ca3af';
    }
    text.textContent = 'capture ' + displayStatus;
  }

  function renderVersionSection(version) {
    const section = document.getElementById('version-section');
    const text = document.getElementById('version-text');
    if (!section || !text) return;

    section.style.display = '';
    if (version?.update_available) {
      text.textContent = '';
      text.appendChild(document.createTextNode('v' + (version.current || '?') + ' — '));
      const span = document.createElement('span');
      span.style.color = '#f59e0b';
      span.textContent = 'update available (v' + (version.latest || '?') + ')';
      text.appendChild(span);
      text.style.color = '';
    } else {
      text.textContent = 'v' + (version?.current || 'unknown');
      text.style.color = '#9ca3af';
    }
  }

  function updateCompositeIcon() {
    const metrics = window.appEvents?.getMetrics?.();
    const wsState = metrics?.state || 'disconnected';

    // Map capture status to severity: active=0, no_observers=0, stale=1, offline=2
    // Map WS state to severity: connected=0, connecting=1, disconnected=2
    const captureSeverity = { active: 0, no_observers: 0, stale: 1, offline: 2 };
    const wsSeverity = { connected: 0, connecting: 1, disconnected: 2 };

    const cs = captureSeverity[_lastCaptureStatus] ?? 0;
    const ws = wsSeverity[wsState] ?? 2;

    // Only override icon if capture makes it worse than WS alone
    if (cs <= ws) return;

    const worst = Math.max(cs, ws);
    const iconState = worst === 0 ? 'connected' : worst === 1 ? 'connecting' : 'disconnected';

    // Directly update the SVG without touching connectionState
    const icon = document.querySelector('.facet-bar .status-icon');
    if (!icon) return;

    const svgs = {
      connected: '<svg class="status-indicator" viewBox="0 0 16 16" width="16" height="16" aria-hidden="true"><circle cx="8" cy="8" r="6" fill="#10b981"/></svg>',
      connecting: '<svg class="status-indicator status-indicator--connecting" viewBox="0 0 16 16" width="16" height="16" aria-hidden="true"><circle cx="8" cy="8" r="6" fill="none" stroke="#f59e0b" stroke-width="2.5" stroke-dasharray="24 8"/></svg>',
      disconnected: '<svg class="status-indicator" viewBox="0 0 16 16" width="16" height="16" aria-hidden="true"><path d="M8 2 L14 13 L2 13 Z" fill="#ef4444"/></svg>'
    };

    const badge = icon.querySelector('#quiet-notif-badge');
    icon.innerHTML = svgs[iconState] || svgs.disconnected;
    if (badge) icon.appendChild(badge);
  }

  function renderQuietNotifs() {
    const section = document.getElementById('quiet-notifs-section');
    const list = document.getElementById('quiet-notifs-list');
    if (!section || !list) return;

    const notifs = window.AppServices?.quietNotifs?.getAll() || [];
    section.style.display = notifs.length > 0 ? '' : 'none';

    if (notifs.length === 0) {
      list.innerHTML = '<span style="color: #9ca3af;">no quiet notifications</span>';
      return;
    }

    const escape = window.AppServices.escapeHtml;
    list.innerHTML = notifs.map(n => {
      const timeAgo = window.AppServices.notifications._getRelativeTime(n.ts);
      const src = escape(n.source || '');
      const msg = escape((n.message || '').slice(0, 120));
      return `<div style="display: flex; align-items: center; gap: 8px; padding: 4px 0;">
        <span style="color: #9ca3af; font-size: 11px; flex-shrink: 0;">${timeAgo}</span>
        <code style="flex-shrink: 0; font-size: 11px;">${src}</code>
        <span style="color: #fca5a5; font-size: 13px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">${msg}</span>
      </div>`;
    }).join('');
  }

  function updateNotificationHistory() {
    const container = document.getElementById('notification-history');
    if (!container || !window.AppServices?.notifications) return;

    const history = window.AppServices.notifications.getHistory();
    if (!statusPaneOpen && history.length === _lastHistoryLen) return;
    _lastHistoryLen = history.length;
    const escape = window.AppServices.escapeHtml;

    if (history.length === 0) {
      container.innerHTML = '<span style="color: #9ca3af;">no recent activity</span>';
      return;
    }

    container.innerHTML = history.map(n => {
      const timeAgo = window.AppServices.notifications._getRelativeTime(n.timestamp);

      if (n.action) {
        return `<a href="${escape(n.action)}" class="status-pane-history-item" style="display: flex; align-items: center; gap: 8px; padding: 6px 8px; margin: 0 -8px; border-radius: 4px; text-decoration: none; color: inherit;"
          ${n.facet ? `onclick="window.selectFacet && window.selectFacet('${escape(n.facet)}')"` : ''}>
          <span style="font-size: 16px; flex-shrink: 0;">${escape(n.icon)}</span>
          <span style="font-weight: 500; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">${escape(n.title)}</span>
          <span style="color: #9ca3af; font-size: 11px; flex-shrink: 0;">${timeAgo}</span>
        </a>`;
      } else {
        return `<div style="display: flex; align-items: center; gap: 8px; padding: 6px 8px; margin: 0 -8px;">
          <span style="font-size: 16px; flex-shrink: 0;">${escape(n.icon)}</span>
          <span style="font-weight: 500; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">${escape(n.title)}</span>
          <span style="color: #9ca3af; font-size: 11px; flex-shrink: 0;">${timeAgo}</span>
        </div>`;
      }
    }).join('');
  }

  function formatDuration(seconds) {
    if (seconds < 60) return `${seconds}s`;
    const minutes = Math.floor(seconds / 60);
    const secs = seconds % 60;
    if (minutes < 60) return `${minutes}m ${secs}s`;
    const hours = Math.floor(minutes / 60);
    const mins = minutes % 60;
    return `${hours}h ${mins}m`;
  }

  function formatDurationHuman(seconds) {
    if (seconds < 10) return 'a few seconds';
    if (seconds < 60) return 'less than a minute';
    const minutes = Math.floor(seconds / 60);
    if (minutes === 1) return 'about a minute';
    if (minutes < 60) return minutes + ' minutes';
    const hours = Math.floor(minutes / 60);
    if (hours === 1) return 'about an hour';
    if (hours < 24) return hours + ' hours';
    const days = Math.floor(hours / 24);
    if (days === 1) return 'about a day';
    return days + ' days';
  }

  function updateBellState() {
    const bell = document.getElementById('notif-bell');
    if (!bell || !('Notification' in window)) {
      if (bell) bell.style.display = 'none';
      return;
    }
    const perm = Notification.permission;
    bell.setAttribute('data-perm', perm);
    if (perm === 'granted') {
      bell.textContent = '🔔';
      bell.title = 'browser notifications enabled';
      bell.setAttribute('aria-label', 'browser notifications enabled');
    } else if (perm === 'denied') {
      bell.textContent = '🔕';
      bell.title = 'notifications blocked — update in browser settings';
      bell.setAttribute('aria-label', 'notifications blocked — update in browser settings');
    } else {
      bell.textContent = '🔔';
      bell.title = 'enable browser notifications';
      bell.setAttribute('aria-label', 'enable browser notifications');
    }
  }

  const bellEl = document.getElementById('notif-bell');
  if (bellEl) {
    bellEl.addEventListener('click', async (e) => {
      e.stopPropagation();
      if (!('Notification' in window)) return;
      if (Notification.permission === 'default') {
        await AppServices.requestNotificationPermission();
        updateBellState();
      }
    });
  }

  // Update status pane every second
  setInterval(updateStatusPane, 1000);
  // Initial update
  setTimeout(updateStatusPane, 100);
})();
</script>
