<!-- Conversation Backdrop (focus mode — blurs convey content behind panel) -->
<div class="conversation-backdrop" id="conversationBackdrop"></div>

<!-- Chat Bar / Conversation Panel -->
<div class="app-bar" id="appBar">
  <!-- Conversation messages (visible in panel mode) -->
  <div class="conversation-messages" id="conversationMessages" aria-live="polite"></div>

  <!-- Inline response (visible in bar mode) -->
  <div class="chat-bar-response-panel" id="chatBarResponsePanel">
    <div class="chat-bar-thinking" id="chatBarThinking" style="display: none;" aria-live="assertive">
      <span class="chat-bar-thinking-dot"></span>
      thinking&hellip;
    </div>
    <div class="chat-bar-response" id="chatBarResponse" style="display: none;"></div>
    <button class="chat-bar-dismiss" id="chatBarDismiss" style="display: none;" title="dismiss">&times;</button>
    <div class="chat-bar-separator"></div>
  </div>

  <!-- Separator between messages and input (panel mode) -->
  <div class="conversation-separator"></div>

  <!-- Input row -->
  <div class="chat-bar-input-row">
    <button id="chatExpandBtn" class="chat-bar-expand" aria-label="expand conversation" aria-expanded="false">⤢</button>
    <form id="chatInputForm" style="display: contents;">
      <textarea id="chatMessageInput" class="chat-bar-input" rows="1"
        placeholder="{{ chat_bar_placeholder|default('send a message...') }}"></textarea>
      <button type="submit" class="chat-bar-send" id="chatBarSend" title="send"
        style="display: none;">&uarr;</button>
    </form>
  </div>
</div>
