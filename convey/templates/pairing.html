<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pair a phone - solstone</title>
  <link rel="stylesheet" href="{{ url_for('root.static', filename='app.css') }}">
  <link rel="stylesheet" href="{{ url_for('root.static', filename='pairing.css') }}">
</head>
<body class="pairing-page">
  <main class="pairing-shell">
    <section class="pairing-panel">
      <p class="pairing-kicker">Phone pairing</p>
      <h1>Pair a phone</h1>
      <p class="pairing-intro">
        Generate a short-lived code to pair your phone with this solstone journal.
        Paired phones show up below as listening devices, and you can remove them from here.
      </p>

      <div class="pairing-actions">
        <button id="pairing-generate" class="pairing-button" type="button">
          Generate pairing code
        </button>
        <p id="pairing-feedback" class="pairing-feedback" aria-live="polite"></p>
      </div>

      <section id="pairing-minted" class="pairing-minted" hidden>
        <div class="pairing-qr-wrap">
          <div id="pairing-qr" class="pairing-qr" aria-live="polite"></div>
        </div>
        <div class="pairing-code">
          <p class="pairing-label">Phone link</p>
          <code id="pairing-url" class="pairing-url"></code>
          <p id="pairing-countdown" class="pairing-countdown">Expires in 0s</p>
        </div>
      </section>
    </section>

    <section class="pairing-panel pairing-devices-panel">
      <div class="pairing-panel-head">
        <div>
          <p class="pairing-kicker">Listening devices</p>
          <h2>Paired phones</h2>
        </div>
      </div>

      <div id="pairing-devices-empty" class="pairing-empty">
        No phones are paired yet.
      </div>
      <div id="pairing-devices-list" class="pairing-devices-list"></div>
    </section>
  </main>

  <script src="{{ url_for('root.static', filename='pairing-qr.js') }}"></script>
  <script src="{{ url_for('root.static', filename='pairing.js') }}"></script>
</body>
</html>
