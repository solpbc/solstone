<!doctype html>
<html lang="en">
<meta charset="utf-8">
<title>websocket.js smoke</title>
<style>
  body { font: 14px/1.4 sans-serif; padding: 16px; }
  .pass { color: #166534; }
  .fail { color: #b91c1c; }
</style>
<div class="facet-bar"><button class="status-icon"><span id="quiet-notif-badge"></span></button></div>
<div id="results"></div>
<script>
  const parseLogs = [];
  class MockWebSocket {
    constructor(url) {
      this.url = url;
      MockWebSocket.instance = this;
      setTimeout(() => this.onopen && this.onopen(), 0);
    }
    emit(payload) { this.onmessage && this.onmessage({ data: payload }); }
  }
  window.WebSocket = MockWebSocket;
  window.AppServices = { notifications: { show() { return 1; }, dismiss() {} } };
  window.logError = function(error, context) { parseLogs.push({ error, context }); };
</script>
<script src="../websocket.js"></script>
<script>
  const results = document.getElementById('results');
  let failures = 0;

  function assert(name, condition, detail) {
    const row = document.createElement('div');
    row.className = condition ? 'pass' : 'fail';
    row.textContent = `${condition ? 'PASS' : 'FAIL'} ${name}${detail ? ` — ${detail}` : ''}`;
    results.appendChild(row);
    if (!condition) failures += 1;
  }

  function wait(ms) {
    return new Promise(resolve => setTimeout(resolve, ms));
  }

  (async function run() {
    await wait(0);
    const socket = window.WebSocket.instance;

    let seenAlpha = 0;
    const cleanupAlpha = window.appEvents.listen('alpha', (msg) => { if (msg.value === 1) seenAlpha += 1; });
    socket.emit(JSON.stringify({ tract: 'alpha', value: 1 }));
    assert('listen(tract, fn) remains compatible', seenAlpha === 1);

    let parseHits = 0;
    let dropped = 0;
    const offParseA = window.appEvents.onParseError(() => { parseHits += 1; });
    const offParseB = window.appEvents.onParseError(() => { parseHits += 1; });
    window.appEvents.listen('beta', { schema: ['use_id', 'event'], onDrop() { dropped += 1; } }, () => {});
    socket.emit(JSON.stringify({ tract: 'beta', use_id: 'abc' }));
    await wait(0);
    assert('schema array routes drops to onDrop', dropped === 1);
    assert('schema array fanout hits onParseError handlers', parseHits === 2);

    let schemaFnHits = 0;
    window.appEvents.listen('gamma', { schema: msg => msg.ok === true }, () => { schemaFnHits += 1; });
    socket.emit(JSON.stringify({ tract: 'gamma', ok: true }));
    socket.emit(JSON.stringify({ tract: 'gamma', ok: false }));
    await wait(0);
    assert('schema function accepts valid messages', schemaFnHits === 1);
    assert('schema function rejection routes through parse handlers', parseHits === 4);

    let timedOut = null;
    const timeoutCleanup = window.appEvents.listen('importer', { timeout: 10, onTimeout(id) { timedOut = id; } }, () => {});
    timeoutCleanup.pending.track('job-1');
    await wait(25);
    assert('pending.track triggers timeout callback', timedOut === 'job-1');

    let cancelledTimeout = false;
    const cancelCleanup = window.appEvents.listen('importer', { timeout: 10, onTimeout() { cancelledTimeout = true; } }, () => {});
    cancelCleanup.pending.track('job-2');
    cancelCleanup.pending.clear('job-2');
    await wait(25);
    assert('pending.clear cancels timeout', cancelledTimeout === false);

    const logCount = parseLogs.length;
    socket.emit('not-json');
    await wait(0);
    assert('invalid JSON fans out to onParseError handlers', parseHits === 6);
    assert('invalid JSON routes through window.logError', parseLogs.length === logCount + 1 && parseLogs.at(-1).context.context === 'websocket-parse');

    cleanupAlpha();
    timeoutCleanup();
    cancelCleanup();
    offParseA();
    offParseB();
    assert('summary', failures === 0, failures ? `${failures} failure(s)` : 'all checks passed');
  })();
</script>
</html>
