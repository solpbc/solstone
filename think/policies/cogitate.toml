# Scoped-yolo policy for non-write cogitate talents.
#
# Posture: start from yolo's default-allow, then subtract the two behaviors
# we don't want — direct filesystem writes, and arbitrary shell commands.
# Run `sol` invocations (including pipelines like `echo ... | sol call ...`)
# are the one shell surface cogitate talents legitimately need.
#
# Priority: highest matching priority wins regardless of allow/deny. The
# allow rule for sol run_shell_command (priority 200) overrides the blanket
# run_shell_command deny (priority 100). User-tier rules here override the
# engine's built-in yolo catch-all.
#
# Rationale: vpe/workspace/gemini-cli-tool-hallucination-research.md — plan
# mode strips run_shell_command from the tool registry, which caused the
# tool-name hallucination loop we saw in cortex. Scoped yolo keeps the
# registry intact without widening the blast radius to direct writes.

[[rule]]
toolName = ["write_file", "replace"]
decision = "deny"
priority = 200

[[rule]]
toolName = "run_shell_command"
commandRegex = "(^sol\\s|\\bsol call\\b)"
decision = "allow"
priority = 200

[[rule]]
toolName = "run_shell_command"
decision = "deny"
priority = 100
