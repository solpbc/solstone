<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Interactive 2025 Timeline</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #0d1b36;
        --muted: #5f6877;
        --soft-line: #e7ebf1;
        --paper: #fbfbf8;
        --panel: #ffffff;
        --blue: #2768c9;
        --teal: #168f8b;
        --amber: #bc7a17;
        --coral: #e75848;
        --shadow: 0 18px 45px rgba(16, 28, 52, 0.08);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.82), rgba(247, 248, 245, 0.96)),
          radial-gradient(circle at 50% 0%, #ffffff 0, var(--paper) 58%, #f0f2ec 100%);
        color: var(--ink);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
      }

      button {
        font: inherit;
      }

      main {
        width: min(100%, 2200px);
        margin: 0 auto;
        padding: clamp(18px, 2vw, 34px) 30px 44px;
      }

      .timeline-shell {
        overflow-x: auto;
        padding: 0 0 18px;
        scrollbar-gutter: stable;
      }

      .timeline-shell:focus-within {
        outline: 2px solid rgba(39, 104, 201, 0.16);
        outline-offset: 8px;
      }

      #timeline {
        transform-origin: center;
      }

      .cover-screen,
      .closing-screen {
        display: grid;
        place-items: center;
        min-height: calc(100vh - 96px);
        text-align: center;
      }

      .cover-button {
        display: grid;
        place-items: center;
        width: min(72vmin, 660px);
        border: 0;
        background: transparent;
        cursor: pointer;
        padding: 0;
      }

      .cover-button:focus-visible,
      .closing-logo:focus-visible {
        outline: 2px solid rgba(232, 146, 58, 0.55);
        outline-offset: 14px;
        border-radius: 50%;
      }

      .sol-logo {
        display: block;
        width: 100%;
        height: auto;
        filter: drop-shadow(0 22px 36px rgba(232, 146, 58, 0.12));
      }

      .closing-content {
        display: grid;
        justify-items: center;
        gap: clamp(34px, 5vw, 62px);
      }

      .closing-logo {
        display: block;
        width: min(34vmin, 320px);
        border: 0;
        background: transparent;
        padding: 0;
      }

      .install-url {
        margin: 0;
        color: #e8923a;
        font-size: clamp(3.2rem, 9vw, 8.5rem);
        font-weight: 850;
        line-height: 0.95;
        letter-spacing: 0;
      }

      .year-view {
        position: relative;
        display: grid;
        grid-template-columns: repeat(12, minmax(180px, 1fr));
        min-width: 2160px;
        min-height: 590px;
      }

      .year-view::before {
        content: "";
        position: absolute;
        z-index: 0;
        top: 294px;
        left: 24px;
        right: 28px;
        height: 2px;
        border-radius: 999px;
        background: linear-gradient(90deg, var(--ink), #263a5e);
        box-shadow: 0 1px 0 rgba(255, 255, 255, 0.7);
      }

      .year-view::after {
        content: "";
        position: absolute;
        z-index: 1;
        top: 286px;
        right: 0;
        width: 0;
        height: 0;
        border-top: 9px solid transparent;
        border-bottom: 9px solid transparent;
        border-left: 20px solid var(--ink);
      }

      .milestone {
        position: relative;
        z-index: 2;
        display: grid;
        grid-template-rows: 260px 70px 260px;
        justify-items: center;
        min-width: 0;
      }

      .card,
      .day-event,
      .hour-event,
      .minute-event,
      .micro-event {
        position: relative;
        width: min(100%, 230px);
        padding: 0 12px 0 18px;
        border-left: 2px solid var(--accent);
      }

      .card::before,
      .card::after,
      .day-event::before,
      .day-event::after,
      .hour-event::before,
      .hour-event::after,
      .minute-event::before,
      .minute-event::after,
      .micro-event::before,
      .micro-event::after {
        content: "";
        display: block;
        width: 42px;
        height: 2px;
        background: var(--accent);
      }

      .card::before,
      .day-event::before,
      .hour-event::before,
      .minute-event::before,
      .micro-event::before {
        margin: 0 0 10px -18px;
      }

      .card::after,
      .day-event::after,
      .hour-event::after,
      .minute-event::after,
      .micro-event::after {
        margin: 12px 0 0 -18px;
      }

      .top .card {
        align-self: end;
        grid-row: 1;
        margin-bottom: 34px;
      }

      .bottom .card {
        align-self: start;
        grid-row: 3;
        margin-top: 34px;
      }

      .date,
      .day-date {
        margin: 0 0 7px;
        color: var(--accent);
        font-size: clamp(0.78rem, 0.85vw, 0.94rem);
        font-weight: 800;
        line-height: 1.1;
      }

      h2,
      h3 {
        margin: 0;
        color: #0c1b36;
        font-size: clamp(1.02rem, 1.08vw, 1.22rem);
        font-weight: 850;
        line-height: 1.1;
      }

      p {
        margin: 10px 0 0;
        color: #303847;
        font-size: clamp(0.78rem, 0.82vw, 0.93rem);
        line-height: 1.38;
      }

      .node {
        position: relative;
        grid-row: 2;
        align-self: center;
        display: grid;
        place-items: center;
        width: 66px;
        height: 66px;
        border: 2px solid #11213d;
        border-radius: 999px;
        background: var(--panel);
        box-shadow: 0 0 0 5px rgba(255, 255, 255, 0.94);
        color: var(--ink);
        cursor: pointer;
        font-size: 1rem;
        font-weight: 850;
        transition:
          transform 180ms ease,
          border-color 180ms ease,
          color 180ms ease,
          box-shadow 180ms ease;
      }

      .node:hover,
      .node:focus-visible {
        border-color: var(--accent);
        color: var(--accent);
        outline: 0;
        transform: translateY(-2px);
        box-shadow:
          0 0 0 5px rgba(255, 255, 255, 0.94),
          0 10px 24px rgba(16, 28, 52, 0.13);
      }

      .node::before {
        content: "";
        position: absolute;
        left: 50%;
        width: 2px;
        height: 28px;
        transform: translateX(-50%);
        border-left: 2px dotted var(--accent);
      }

      .top .node::before {
        bottom: 66px;
      }

      .bottom .node::before {
        top: 66px;
      }

      .node::after {
        content: "";
        position: absolute;
        left: 50%;
        width: 10px;
        height: 10px;
        transform: translateX(-50%);
        border-radius: 50%;
        background: var(--accent);
      }

      .top .node::after {
        bottom: 90px;
      }

      .bottom .node::after {
        top: 90px;
      }

      .accent-blue {
        --accent: var(--blue);
      }

      .accent-teal {
        --accent: var(--teal);
      }

      .accent-amber {
        --accent: var(--amber);
      }

      .accent-coral {
        --accent: var(--coral);
      }

      .month-view {
        --axis-top: 304px;
        position: relative;
        min-width: 920px;
        min-height: 650px;
        overflow: hidden;
      }

      .month-view::before {
        content: "";
        position: absolute;
        top: var(--axis-top);
        left: 0;
        right: 0;
        z-index: 0;
        height: 2px;
        background: linear-gradient(90deg, var(--ink), #263a5e);
      }

      .edge-node,
      .focus-node {
        display: grid;
        place-items: center;
        border: 2px solid #11213d;
        border-radius: 999px;
        background: var(--panel);
        color: var(--ink);
        cursor: pointer;
        font-weight: 850;
        transition:
          transform 180ms ease,
          border-color 180ms ease,
          color 180ms ease,
          box-shadow 180ms ease;
      }

      .edge-node {
        position: absolute;
        z-index: 4;
        top: var(--axis-top);
        width: 78px;
        height: 78px;
        transform: translateY(-50%);
        box-shadow: 0 0 0 5px rgba(255, 255, 255, 0.94);
        font-size: 1rem;
      }

      .edge-node.prev {
        left: -16px;
      }

      .edge-node.next {
        right: -16px;
      }

      .edge-node:hover,
      .edge-node:focus-visible,
      .focus-node:hover,
      .focus-node:focus-visible {
        border-color: var(--accent);
        color: var(--accent);
        outline: 0;
        box-shadow:
          0 0 0 5px rgba(255, 255, 255, 0.94),
          0 10px 24px rgba(16, 28, 52, 0.13);
      }

      .edge-node:hover,
      .edge-node:focus-visible {
        transform: translateY(calc(-50% - 2px));
      }

      .focus-node:hover,
      .focus-node:focus-visible {
        transform: translateY(-2px);
      }

      .focus-panel {
        position: relative;
        z-index: 2;
        min-height: 650px;
        padding: 0 118px;
      }

      .focus-heading {
        position: absolute;
        top: 8px;
        left: 50%;
        transform: translateX(-50%);
        display: grid;
        justify-items: center;
        gap: 8px;
      }

      .focus-node {
        width: 74px;
        height: 74px;
        box-shadow: 0 0 0 6px rgba(255, 255, 255, 0.96);
        color: var(--accent);
        font-size: 1.06rem;
      }

      .focus-label {
        color: var(--accent);
        font-size: 0.86rem;
        font-weight: 850;
        white-space: nowrap;
      }

      .events-lane {
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
        width: min(calc(100% - 240px), 1180px);
        height: 170px;
        overflow: visible;
      }

      .events-lane.top {
        top: 108px;
      }

      .events-lane.bottom {
        top: 386px;
      }

      .month-connectors {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 1;
      }

      .day-event {
        position: absolute;
        width: 170px;
        z-index: 2;
      }

      .day-event.top {
        bottom: 18px;
      }

      .day-event.bottom {
        top: 18px;
      }

      .day-date {
        font-size: 0.78rem;
      }

      .day-event h3 {
        font-size: 1rem;
      }

      .day-event p {
        font-size: 0.78rem;
      }

      .day-grid {
        position: absolute;
        top: calc(var(--axis-top) - 16px);
        left: 50%;
        transform: translateX(-50%);
        display: grid;
        grid-template-columns: repeat(var(--days), minmax(0, 1fr));
        gap: 5px;
        width: min(calc(100% - 240px), 1180px);
        padding: 0;
      }

      .day-grid::before {
        display: none;
      }

      .day-cell {
        position: relative;
        z-index: 1;
        display: grid;
        place-items: center;
        width: 100%;
        height: 32px;
        border: 1px solid var(--soft-line);
        border-radius: 4px;
        background: rgba(255, 255, 255, 0.9);
        color: #3d4654;
        appearance: none;
        font-size: clamp(0.55rem, 0.75vw, 0.72rem);
        font-weight: 760;
        padding: 0;
      }

      .day-cell.weekend {
        border-color: #d9e1eb;
        background: #eef3f6;
        color: #475569;
      }

      .day-cell.holiday {
        border-color: color-mix(in srgb, var(--coral), white 48%);
        background:
          linear-gradient(135deg, color-mix(in srgb, var(--coral), white 84%) 0 28%, transparent 28%),
          rgba(255, 255, 255, 0.92);
      }

      .day-cell.weekend.holiday {
        background:
          linear-gradient(135deg, color-mix(in srgb, var(--coral), white 82%) 0 28%, transparent 28%),
          #eef3f6;
      }

      .holiday-mark {
        position: absolute;
        top: -5px;
        right: -4px;
        width: 8px;
        height: 8px;
        border: 1px solid rgba(255, 255, 255, 0.96);
        border-radius: 50%;
        background: var(--coral);
        box-shadow: 0 1px 4px rgba(15, 23, 42, 0.18);
      }

      .day-cell.has-event {
        border-color: var(--accent);
        background: color-mix(in srgb, var(--accent), white 89%);
        color: var(--accent);
        box-shadow: inset 0 -3px 0 var(--accent);
      }

      .day-cell.has-event.holiday {
        border-color: var(--accent);
        background:
          linear-gradient(135deg, color-mix(in srgb, var(--coral), white 78%) 0 28%, transparent 28%),
          color-mix(in srgb, var(--accent), white 89%);
      }

      /* day-cell perpendicular dotted-pip removed; SVG layer in
         .month-connectors now draws slanted connectors from each card to
         its anchor day cell. The .day-cell.has-event tint above remains
         as the chip-on-cell cue. */

      .day-cell {
        cursor: pointer;
        transition:
          transform 160ms ease,
          border-color 160ms ease,
          box-shadow 160ms ease;
      }

      .day-cell:hover,
      .day-cell:focus-visible {
        border-color: var(--accent);
        outline: 0;
        transform: translateY(-2px);
        box-shadow: 0 8px 18px rgba(16, 28, 52, 0.12);
      }

      .day-view {
        --axis-top: 304px;
        position: relative;
        min-width: 920px;
        min-height: 650px;
        overflow: hidden;
      }

      .day-view::before {
        content: "";
        position: absolute;
        top: var(--axis-top);
        left: 0;
        right: 0;
        z-index: 0;
        height: 2px;
        background: linear-gradient(90deg, var(--ink), #263a5e);
      }

      .edge-day,
      .day-focus-node {
        display: grid;
        place-items: center;
        border: 2px solid #11213d;
        background: var(--panel);
        color: var(--ink);
        cursor: pointer;
        font-weight: 850;
        transition:
          transform 180ms ease,
          border-color 180ms ease,
          color 180ms ease,
          box-shadow 180ms ease;
      }

      .edge-day {
        position: absolute;
        z-index: 4;
        top: var(--axis-top);
        width: 72px;
        height: 54px;
        border-radius: 8px;
        transform: translateY(-50%);
        box-shadow: 0 0 0 5px rgba(255, 255, 255, 0.94);
        font-size: 1rem;
      }

      .edge-day.prev {
        left: -18px;
      }

      .edge-day.next {
        right: -18px;
      }

      .day-focus-node {
        width: 86px;
        height: 62px;
        border-radius: 8px;
        box-shadow: 0 0 0 6px rgba(255, 255, 255, 0.96);
        color: var(--accent);
        font-size: 1.1rem;
      }

      .edge-day:hover,
      .edge-day:focus-visible,
      .day-focus-node:hover,
      .day-focus-node:focus-visible {
        border-color: var(--accent);
        color: var(--accent);
        outline: 0;
        box-shadow:
          0 0 0 5px rgba(255, 255, 255, 0.94),
          0 10px 24px rgba(16, 28, 52, 0.13);
      }

      .edge-day:hover,
      .edge-day:focus-visible {
        transform: translateY(calc(-50% - 2px));
      }

      .day-focus-node:hover,
      .day-focus-node:focus-visible {
        transform: translateY(-2px);
      }

      .hour-panel {
        position: relative;
        z-index: 2;
        min-height: 650px;
        padding: 0 118px;
      }

      .hour-lane {
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
        width: min(calc(100% - 240px), 1180px);
        height: 170px;
        overflow: visible;
      }

      .hour-lane.top {
        top: 108px;
      }

      .hour-lane.bottom {
        top: 386px;
      }

      .day-connectors {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 1;
      }

      .hour-grid {
        position: absolute;
        top: calc(var(--axis-top) - 18px);
        left: 50%;
        transform: translateX(-50%);
        display: grid;
        grid-template-columns: repeat(24, minmax(0, 1fr));
        gap: 5px;
        width: min(calc(100% - 240px), 1180px);
      }

      .hour-cell {
        position: relative;
        z-index: 1;
        display: grid;
        place-items: center;
        min-width: 0;
        height: 36px;
        border: 1px solid var(--soft-line);
        border-radius: 4px;
        background: rgba(255, 255, 255, 0.9);
        color: #3d4654;
        appearance: none;
        cursor: pointer;
        font-size: clamp(0.5rem, 0.72vw, 0.68rem);
        font-weight: 760;
        padding: 0;
        transition:
          transform 160ms ease,
          border-color 160ms ease,
          box-shadow 160ms ease;
      }

      .hour-cell:hover,
      .hour-cell:focus-visible {
        border-color: var(--accent);
        outline: 0;
        transform: translateY(-2px);
        box-shadow: 0 8px 18px rgba(16, 28, 52, 0.12);
      }

      .hour-cell.personal {
        background: #eef3f6;
      }

      .hour-cell.work {
        background: #ffffff;
      }

      .hour-cell.has-hour-event {
        border-color: var(--accent);
        background: color-mix(in srgb, var(--accent), white 90%);
        color: var(--accent);
        box-shadow: inset 0 -3px 0 var(--accent);
      }

      /* hour-cell perpendicular dotted-pip removed; SVG layer in
         .day-connectors now draws slanted connectors anchored to each card's
         actual position. The .hour-cell.has-hour-event tint above remains
         as the chip-on-cell cue. */

      .hour-event {
        position: absolute;
        width: 170px;
        z-index: 2;
      }

      .hour-event.top {
        bottom: 18px;
      }

      .hour-event.bottom {
        top: 18px;
      }

      /* Origin is internal-only: kept on the .day-event/.hour-event/.minute-event
         title attribute (for hover/inspection) and on data-anchor-* (for layout),
         never rendered as visible chrome. */

      .hour-time {
        margin: 0 0 7px;
        color: var(--accent);
        font-size: 0.78rem;
        font-weight: 800;
        line-height: 1.1;
      }

      .hour-event h3 {
        font-size: 1rem;
      }

      .hour-event p {
        font-size: 0.78rem;
      }

      .minute-view {

        min-width: 920px;
        min-height: 650px;
        overflow: hidden;
      }

        left: 0;
        right: 0;

      }

        position: absolute;

        width: 72px;

        border-radius: 8px;
        transform: translateY(-50%);
        box-shadow: 0 0 0 5px rgba(255, 255, 255, 0.94);
        font-size: 1rem;
      }

      .edge-hour.prev {
        left: -18px;
      }

      .edge-hour.next {
        right: -18px;
      }

      .minute-focus-node {
        width: 100px;
        height: 62px;
        border-radius: 8px;
        box-shadow: 0 0 0 6px rgba(255, 255, 255, 0.96);
        color: var(--accent);
        font-size: 1.02rem;
      }

      .edge-hour:hover,
      .edge-hour:focus-visible,
      .minute-focus-node:hover,
      .minute-focus-node:focus-visible {
        border-color: var(--accent);
        color: var(--accent);
        outline: 0;
        box-shadow:

          0 10px 24px rgba(16, 28, 52, 0.13);
      }

        transform: translateY(calc(-50% - 2px));
      }

      .minute-focus-node:hover,

        transform: translateY(-2px);
      }

      .minute-panel {

        min-height: 650px;
        padding: 0 118px;
      }

      .minute-lane {
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
        width: min(calc(100% - 300px), 980px);
        height: 170px;

      }

      .minute-lane.top {

      }

      .minute-grid {

        transform: translateX(-50%);
        display: grid;
        grid-template-columns: repeat(12, minmax(0, 1fr));
        gap: 8px;
        width: min(calc(100% - 300px), 980px);
      }

      .segment-cell {
        position: relative;
        z-index: 1;
        display: grid;
        place-items: center;
        min-width: 0;
        height: 36px;

      }

      .segment-cell:hover,
      .segment-cell:focus-visible {
        border-color: var(--accent);
        outline: 0;
        transform: translateY(-2px);
        box-shadow: 0 8px 18px rgba(16, 28, 52, 0.12);
      }

      .segment-cell.focus {
        border-color: var(--accent);
        background: color-mix(in srgb, var(--accent), white 90%);
        color: var(--accent);
        box-shadow: inset 0 -3px 0 var(--accent);
      }

      /* Per-cell availability tints (set by renderMinute from the day
         endpoint's hours_avail.buckets). The .focus tint above (curated
         pick lands here) wins when both are present. */
      .segment-cell.avail-screen:not(.focus) {
        background: color-mix(in srgb, var(--teal), white 92%);
        border-color: color-mix(in srgb, var(--teal), white 65%);
        color: color-mix(in srgb, var(--teal), var(--ink) 50%);
      }
      .segment-cell.avail-audio:not(.focus) {
        background: color-mix(in srgb, var(--coral), white 92%);
        border-color: color-mix(in srgb, var(--coral), white 65%);
        color: color-mix(in srgb, var(--coral), var(--ink) 50%);
      }
      .segment-cell.avail-both:not(.focus) {
        background: color-mix(in srgb, var(--accent), white 90%);
        border-color: color-mix(in srgb, var(--accent), white 60%);
        color: color-mix(in srgb, var(--accent), var(--ink) 30%);
        box-shadow: inset 0 -2px 0 color-mix(in srgb, var(--accent), white 60%);
      }
      .segment-cell.avail-none {
        background: rgba(245, 247, 250, 0.7);
        border-color: var(--soft-line);
        color: rgba(61, 70, 84, 0.35);
        cursor: not-allowed;
      }
      .segment-cell.avail-none:hover,
      .segment-cell.avail-none:focus-visible {
        transform: none;
        box-shadow: none;
        border-color: var(--soft-line);
      }
      .segment-cell:disabled {
        pointer-events: none;
      }

      /* Empty-state river when a 5-min cell has no underlying segment data. */
      .segment-empty {
        margin: 240px auto 0;
        text-align: center;
        font-style: italic;
        color: var(--muted);
        opacity: 0.55;
        font-size: 0.9rem;
      }

      /* segment-cell perpendicular dotted-pip removed; SVG layer in
         .minute-connectors now draws slanted connectors anchored to each
         card's actual position. The .segment-cell.focus tint above remains
         as the chip-on-segment cue. */

      .minute-event {
        position: absolute;
        width: 170px;
        z-index: 2;
      }

      .minute-event.top {
        bottom: 18px;
      }

      .minute-event.bottom {
        top: 18px;
      }

      .minute-time {
        margin: 0 0 7px;
        color: var(--accent);
        font-size: 0.78rem;
        font-weight: 800;
        line-height: 1.1;
      }

      .minute-event h3 {
        font-size: 1rem;
      }

      .minute-event p {
        font-size: 0.78rem;
      }

      .five-view {
        --axis-top: 304px;
        position: relative;
        min-width: 920px;
        min-height: 650px;
        overflow: hidden;
      }

      .five-view::before {
        content: "";
        position: absolute;
        top: var(--axis-top);
        left: 0;
        right: 0;
        z-index: 0;
        height: 2px;
        background: linear-gradient(90deg, var(--ink), #263a5e);
      }

      /* 5-min "segment" view — river of observations.
         Replaces the curated-cards pattern of higher levels with a direct
         visualization of what sol observed in the slice. The .segment-view
         wrapper REUSES the .five-view edge-button / focus-node CSS by also
         carrying the .five-view class? No — it's a sibling. We re-declare
         minimum styling so edge-segment buttons still work via reused class. */
      .segment-view {
        --axis-top: 304px;
        position: relative;
        min-width: 920px;
        min-height: 650px;
        overflow: hidden;
      }

      .segment-panel {
        position: relative;
        z-index: 2;
        min-height: 650px;
        padding: 56px 118px 24px;
      }

      /* The five-focus-node (the JAN 9 9:25a pill) needs a placement origin */
      .segment-view .focus-heading {
        position: absolute;
        top: 12px;
        left: 50%;
        transform: translateX(-50%);
      }

      /* Header strip */
      .segment-header {
        display: flex;
        flex-direction: column;
        gap: 10px;
        margin-top: 78px;
        margin-bottom: 14px;
        padding: 0 4px;
      }

      .seg-header-row {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        gap: 18px;
        font-size: 0.84rem;
        color: var(--muted);
        letter-spacing: 0.02em;
      }
      .seg-header-time {
        color: var(--ink);
        font-weight: 700;
      }
      .seg-header-mid, .seg-header-end {
        font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
        font-size: 0.78rem;
      }

      .seg-topics {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }
      .topic-chip {
        display: inline-block;
        padding: 2px 9px;
        border-radius: 999px;
        background: color-mix(in srgb, var(--accent), white 87%);
        color: var(--accent);
        border: 1px solid color-mix(in srgb, var(--accent), white 70%);
        font-size: 0.7rem;
        font-weight: 600;
        letter-spacing: 0.01em;
      }

      /* The river — central time axis with screen above and audio below. */
      .segment-river {
        position: relative;
        height: 240px;
        margin: 0 auto 18px;
        max-width: 1180px;
      }

      .river-axis {
        position: absolute;
        top: 50%;
        left: 0;
        right: 0;
        height: 1px;
        background: linear-gradient(90deg,
          color-mix(in srgb, var(--ink), transparent 80%),
          var(--ink) 6%,
          var(--ink) 94%,
          color-mix(in srgb, var(--ink), transparent 80%));
        z-index: 1;
      }
      .axis-mark {
        position: absolute;
        top: 100%;
        transform: translate(-50%, 6px);
        text-align: center;
      }
      .axis-mark::before {
        content: "";
        display: block;
        margin: -10px auto 4px;
        width: 1px;
        height: 6px;
        background: var(--ink);
        opacity: 0.3;
      }
      .axis-mark span {
        font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
        font-size: 0.66rem;
        color: var(--muted);
        letter-spacing: 0.04em;
      }

      .river-screen {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 50%;
        z-index: 2;
      }

      .river-tick {
        position: absolute;
        bottom: 0;
        transform: translateX(-50%);
        background: transparent;
        border: 0;
        padding: 0;
        cursor: pointer;
        text-align: center;
      }

      .river-tick-bar {
        display: block;
        margin: 0 auto;
        width: 2px;
        height: 16px;
        background: var(--cat, var(--muted));
        opacity: 0.6;
        border-radius: 1px;
        transition: opacity 140ms ease, height 140ms ease, transform 140ms ease;
      }

      .river-tick.is-featured .river-tick-bar {
        height: 36px;
        opacity: 0.9;
      }

      .river-tick:hover .river-tick-bar,
      .river-tick:focus-visible .river-tick-bar,
      .river-tick.is-active .river-tick-bar {
        opacity: 1;
        height: 56px;
        transform: scaleX(1.8);
      }

      /* A faint pip above featured ticks — signals "more content here, click
         to see" without burning real estate on text. */
      .river-tick-pip {
        position: absolute;
        bottom: 100%;
        left: 50%;
        transform: translate(-50%, -2px);
        width: 4px;
        height: 4px;
        border-radius: 50%;
        background: var(--cat, var(--muted));
        opacity: 0.5;
        pointer-events: none;
      }
      .river-tick:hover .river-tick-pip,
      .river-tick.is-active .river-tick-pip {
        opacity: 1;
        transform: translate(-50%, -6px) scale(1.4);
      }

      .river-audio {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        height: 50%;
        z-index: 2;
      }

      .river-audio-dot {
        position: absolute;
        top: 8px;
        transform: translateX(-50%);
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--cat, var(--muted));
        opacity: 0.7;
        border: 0;
        padding: 0;
        cursor: pointer;
        transition: opacity 140ms ease, transform 140ms ease;
      }
      .river-audio-dot:hover,
      .river-audio-dot:focus-visible,
      .river-audio-dot.is-active {
        opacity: 1;
        transform: translateX(-50%) scale(1.6);
      }
      .river-empty {
        position: absolute;
        top: 24px;
        left: 50%;
        transform: translateX(-50%);
        font-style: italic;
        color: var(--muted);
        opacity: 0.55;
        font-size: 0.85rem;
      }

      /* Inline detail panel — populated when a tick is clicked. */
      .segment-detail {
        max-width: 1180px;
        margin: 0 auto 14px;
        padding: 14px 18px;
        background: var(--panel);
        border: 1px solid var(--soft-line);
        border-left: 3px solid var(--accent);
        border-radius: 5px;
        min-height: 80px;
      }
      .seg-detail-empty {
        color: var(--muted);
        font-style: italic;
        font-size: 0.82rem;
        text-align: center;
        padding: 14px 0;
      }
      .seg-detail-meta {
        display: flex;
        gap: 12px;
        align-items: center;
        margin-bottom: 6px;
        font-size: 0.74rem;
        color: var(--muted);
      }
      .seg-detail-time {
        font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
        color: var(--ink);
        font-weight: 600;
      }
      .seg-detail-cat {
        display: inline-block;
        padding: 1px 8px;
        border-radius: 999px;
        background: color-mix(in srgb, var(--cat, var(--muted)), white 86%);
        color: var(--cat, var(--muted));
        border: 1px solid color-mix(in srgb, var(--cat, var(--muted)), white 60%);
        font-weight: 600;
        font-size: 0.66rem;
        letter-spacing: 0.04em;
      }
      .seg-detail-frame {
        font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
        opacity: 0.7;
      }
      .seg-detail-desc {
        font-size: 0.86rem;
        line-height: 1.4;
        color: var(--ink);
        margin-bottom: 10px;
      }
      .seg-detail-content {
        margin-top: 8px;
        padding: 6px 0;
        border-top: 1px dashed var(--soft-line);
      }
      .seg-detail-content-tag {
        font-size: 0.65rem;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.06em;
        margin-bottom: 4px;
      }
      .seg-detail-content-body {
        margin: 0;
        font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
        font-size: 0.72rem;
        color: var(--ink);
        white-space: pre-wrap;
        line-height: 1.4;
        max-height: 280px;
        overflow: auto;
      }

      /* Audio detail — three transcript lines (prev/focus/next) for context. */
      .seg-detail-lines {
        display: flex;
        flex-direction: column;
        gap: 4px;
        margin-top: 6px;
      }
      .seg-detail-line {
        display: grid;
        grid-template-columns: 76px 32px 1fr auto;
        gap: 10px;
        padding: 4px 6px;
        font-size: 0.84rem;
        color: var(--muted);
        border-left: 2px solid transparent;
      }
      .seg-detail-line.is-focus {
        color: var(--ink);
        background: color-mix(in srgb, var(--accent), white 92%);
        border-left-color: var(--accent);
      }
      .seg-detail-line-time {
        font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
        font-size: 0.72rem;
        opacity: 0.85;
      }
      .seg-detail-line-sp {
        font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
        font-size: 0.72rem;
        font-weight: 700;
        opacity: 0.65;
      }
      .seg-detail-line-text {
        font-family: ui-serif, Georgia, "Times New Roman", serif;
        font-style: italic;
        line-height: 1.4;
      }
      .seg-detail-line-emotion {
        font-size: 0.66rem;
        color: var(--muted);
        opacity: 0.7;
        text-transform: lowercase;
      }

      .segment-footer {
        max-width: 1180px;
        margin: 0 auto;
        text-align: center;
        font-size: 0.74rem;
        color: var(--muted);
        font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
        opacity: 0.7;
      }


      .edge-segment,
      .five-focus-node {
        display: grid;
        place-items: center;
        border: 2px solid #11213d;
        background: var(--panel);
        color: var(--ink);
        cursor: pointer;
        font-weight: 850;
        transition:
          transform 180ms ease,
          border-color 180ms ease,
          color 180ms ease,
          box-shadow 180ms ease;
      }

      .edge-segment {
        position: absolute;
        z-index: 4;
        top: var(--axis-top);
        width: 88px;
        height: 54px;
        border-radius: 8px;
        transform: translateY(-50%);
        box-shadow: 0 0 0 5px rgba(255, 255, 255, 0.94);
        font-size: 0.95rem;
      }

      .edge-segment.prev {
        left: -22px;
      }

      .edge-segment.next {
        right: -22px;
      }

      .five-focus-node {
        width: 124px;
        height: 62px;
        border-radius: 8px;
        box-shadow: 0 0 0 6px rgba(255, 255, 255, 0.96);
        color: var(--accent);
        font-size: 0.96rem;
      }

      .edge-segment:hover,
      .edge-segment:focus-visible,
      .five-focus-node:hover,
      .five-focus-node:focus-visible {
        border-color: var(--accent);
        color: var(--accent);
        outline: 0;
        box-shadow:
          0 0 0 5px rgba(255, 255, 255, 0.94),
          0 10px 24px rgba(16, 28, 52, 0.13);
      }

      .edge-segment:hover,
      .edge-segment:focus-visible {
        transform: translateY(calc(-50% - 2px));
      }

      .five-focus-node:hover,
      .five-focus-node:focus-visible {
        transform: translateY(-2px);
      }

      .five-panel {
        position: relative;
        z-index: 2;
        min-height: 650px;
        padding: 0 118px;
      }

      .micro-lane {
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
        display: grid;
        grid-template-columns: repeat(5, minmax(0, 1fr));
        gap: 0 12px;
        width: min(calc(100% - 340px), 860px);
        align-items: end;
      }

      .micro-lane.top {
        top: 108px;
      }

      .micro-lane.bottom {
        top: 386px;
        align-items: start;
      }

      .five-bar {
        position: absolute;
        top: calc(var(--axis-top) - 24px);
        left: 50%;
        transform: translateX(-50%);
        display: grid;
        grid-template-columns: repeat(5, minmax(0, 1fr));
        gap: 8px;
        width: min(calc(100% - 340px), 860px);
      }

      .micro-cell {
        position: relative;
        z-index: 1;
        display: grid;
        place-items: center;
        min-width: 0;
        height: 48px;
        border: 1px solid var(--soft-line);
        border-radius: 5px;
        background: rgba(255, 255, 255, 0.92);
        color: #3d4654;
        appearance: none;
        cursor: pointer;
        font-size: clamp(0.64rem, 0.9vw, 0.82rem);
        font-weight: 780;
        padding: 0;
        transition:
          transform 160ms ease,
          border-color 160ms ease,
          box-shadow 160ms ease;
      }

      .micro-cell:hover,
      .micro-cell:focus-visible {
        border-color: var(--accent);
        outline: 0;
        transform: translateY(-2px);
        box-shadow: 0 8px 18px rgba(16, 28, 52, 0.12);
      }

      .micro-cell.focus {
        border-color: var(--accent);
        background: color-mix(in srgb, var(--accent), white 90%);
        color: var(--accent);
        box-shadow: inset 0 -3px 0 var(--accent);
      }

      .micro-cell.focus::before,
      .micro-cell.focus::after {
        content: "";
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
      }

      .micro-cell.focus::before {
        width: 2px;
        height: 22px;
        border-left: 2px dotted var(--accent);
      }

      .micro-cell.focus::after {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--accent);
      }

      .micro-cell.focus.top::before {
        bottom: 49px;
      }

      .micro-cell.focus.top::after {
        bottom: 70px;
      }

      .micro-cell.focus.bottom::before {
        top: 49px;
      }

      .micro-cell.focus.bottom::after {
        top: 70px;
      }

      .micro-event {
        width: min(100%, 220px);
      }

      .micro-event.top {
        align-self: end;
        margin-bottom: 18px;
      }

      .micro-event.bottom {
        align-self: start;
        margin-top: 18px;
      }

      .micro-time {
        margin: 0 0 7px;
        color: var(--accent);
        font-size: 0.78rem;
        font-weight: 800;
        line-height: 1.1;
      }

      .micro-event h3 {
        font-size: 1rem;
      }

      .micro-event p {
        font-size: 0.78rem;
      }

      @media (max-width: 760px) {
        main {
          width: min(100% - 28px, 520px);
          padding: 24px 0 34px;
        }

        .timeline-shell {
          overflow: visible;
          padding: 0;
        }

        .year-view {
          display: block;
          min-width: 0;
          min-height: 0;
          padding-left: 30px;
        }

        .year-view::before {
          top: 6px;
          bottom: 6px;
          left: 11px;
          right: auto;
          width: 2px;
          height: auto;
          background: var(--ink);
        }

        .year-view::after {
          top: auto;
          right: auto;
          bottom: -2px;
          left: 3px;
          border-left: 10px solid transparent;
          border-right: 10px solid transparent;
          border-top: 18px solid var(--ink);
          border-bottom: 0;
        }

        .milestone {
          display: block;
          min-height: 0;
          margin: 0 0 26px;
          padding-left: 8px;
        }

        .card {
          width: 100%;
          margin: 0;
          padding: 0 8px 0 18px;
        }

        .card::before,
        .card::after {
          width: 34px;
        }

        .top .card,
        .bottom .card {
          align-self: auto;
          grid-row: auto;
          margin: 0;
        }

        .date {
          font-size: 0.84rem;
        }

        h2 {
          max-width: 18rem;
          font-size: 1.08rem;
        }

        p {
          max-width: 24rem;
          font-size: 0.9rem;
        }

        .node {
          position: absolute;
          top: -1px;
          left: -48px;
          width: 40px;
          height: 40px;
          font-size: 0.75rem;
          box-shadow: 0 0 0 4px var(--paper);
        }

        .node::before,
        .node::after {
          display: none;
        }

        .month-view {
          display: block;
          min-width: 0;
          min-height: 0;
          overflow: visible;
        }

        .month-view::before {
          display: none;
        }

        .edge-node {
          position: static;
          display: inline-grid;
          width: 44px;
          height: 44px;
          margin: 0 8px 16px 0;
          transform: none;
          font-size: 0.68rem;
        }

        .edge-node:hover,
        .edge-node:focus-visible {
          transform: translateY(-2px);
        }

        .focus-panel {
          display: block;
          min-height: 0;
          padding: 0;
          padding-top: 0;
        }

        .focus-heading {
          position: static;
          transform: none;
          justify-items: start;
          margin: 4px 0 18px;
        }

        .focus-node {
          width: 58px;
          height: 58px;
          font-size: 0.88rem;
        }

        .events-lane {
          position: static;
          display: block;
          transform: none;
          width: auto;
          min-width: 0;
        }

        .day-event,
        .day-event.top,
        .day-event.bottom {
          width: 100%;
          margin: 0 0 18px;
        }

        .day-grid {
          grid-template-columns: repeat(7, minmax(34px, 1fr));
          width: 100%;
          min-width: 0;
          margin: 8px 0 24px;
        }

        .day-cell {
          width: 100%;
        }

        .day-cell.has-event::before,
        .day-cell.has-event::after {
          display: none;
        }

        .day-view {
          display: block;
          min-width: 0;
          min-height: 0;
          overflow: visible;
        }

        .day-view::before {
          display: none;
        }

        .edge-day {
          position: static;
          display: inline-grid;
          width: 50px;
          height: 38px;
          margin: 0 8px 16px 0;
          transform: none;
          font-size: 0.8rem;
        }

        .edge-day:hover,
        .edge-day:focus-visible {
          transform: translateY(-2px);
        }

        .hour-panel {
          display: block;
          min-height: 0;
          padding: 0;
        }

        .hour-lane {
          position: static;
          display: block;
          transform: none;
          width: auto;
          min-width: 0;
        }

        .hour-event,
        .hour-event.top,
        .hour-event.bottom {
          width: 100%;
          margin: 0 0 18px;
        }

        .hour-grid {
          position: static;
          grid-template-columns: repeat(6, minmax(34px, 1fr));
          transform: none;
          width: 100%;
          min-width: 0;
          margin: 8px 0 24px;
        }

        .hour-cell {
          width: 100%;
        }

        .hour-cell.has-hour-event::before,
        .hour-cell.has-hour-event::after {
          display: none;
        }

        .minute-view {
          display: block;
          min-width: 0;
          min-height: 0;
          overflow: visible;
        }

        .minute-view::before {
          display: none;
        }

        .edge-hour {
          position: static;
          display: inline-grid;
          width: 50px;
          height: 38px;
          margin: 0 8px 16px 0;
          transform: none;
          font-size: 0.8rem;
        }

        .edge-hour:hover,
        .edge-hour:focus-visible {
          transform: translateY(-2px);
        }

        .minute-panel {
          display: block;
          min-height: 0;
          padding: 0;
        }

        .minute-lane {
          position: static;
          display: block;
          transform: none;
          width: auto;
          min-width: 0;
        }

        .minute-event,
        .minute-event.top,
        .minute-event.bottom {
          width: 100%;
          margin: 0 0 18px;
        }

        .minute-grid {
          position: static;
          grid-template-columns: repeat(4, minmax(54px, 1fr));
          transform: none;
          width: 100%;
          min-width: 0;
          margin: 8px 0 24px;
        }

        .segment-cell {
          width: 100%;
        }

        .segment-cell.focus::before,
        .segment-cell.focus::after {
          display: none;
        }

        .five-view {
          display: block;
          min-width: 0;
          min-height: 0;
          overflow: visible;
        }

        .five-view::before {
          display: none;
        }

        .edge-segment {
          position: static;
          display: inline-grid;
          width: 68px;
          height: 38px;
          margin: 0 8px 16px 0;
          transform: none;
          font-size: 0.76rem;
        }

        .edge-segment:hover,
        .edge-segment:focus-visible {
          transform: translateY(-2px);
        }

        .five-panel {
          display: block;
          min-height: 0;
          padding: 0;
        }

        .micro-lane {
          position: static;
          display: block;
          transform: none;
          width: auto;
          min-width: 0;
        }

        .micro-event,
        .micro-event.top,
        .micro-event.bottom {
          width: 100%;
          margin: 0 0 18px;
        }

        .five-bar {
          position: static;
          grid-template-columns: repeat(5, minmax(48px, 1fr));
          transform: none;
          width: 100%;
          min-width: 0;
          margin: 8px 0 24px;
        }

        .micro-cell {
          width: 100%;
        }

        .micro-cell.focus::before,
        .micro-cell.focus::after {
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="timeline-shell" aria-label="Interactive 2025 founder-engineer timeline">
        <div id="timeline"></div>
      </section>
    </main>

    <script src="data-mock.js"></script>
    <script>
      // Mock data is the baseline used when the API server is unreachable.
      // loadIndex() (below) replaces months[] entirely with the 12 most-recent
      // real months from the server, and loadDay()/loadSegment() lazy-fetch
      // per-day rollups + per-segment audio/screen jsonl on demand.
      let months = window.timelineData.months;
      let realHourPlan = {};
      let realDayPlan = {};
      const segmentAvail = {};        // "monthIdx:day:hour" → buckets (12 entries)
      const dayCache = new Map();      // "YYYYMMDD" → /api/day response
      const segCache = new Map();      // "<day>/<stream>/<seg>" → /api/segment response

      const ACCENT_ROTATION = ["blue", "teal", "amber", "coral"];
      const MONTH_FULL_NAMES = ["January","February","March","April","May","June","July","August","September","October","November","December"];

      function isoDay(monthIndex, day) {
        const m = months[monthIndex];
        if (!m || !m.ym) return null;
        return m.ym + String(day).padStart(2, "0");
      }
      function isoToMonthIdx(yyyymm) {
        return months.findIndex((m) => m.ym === yyyymm);
      }
      function dayFromOrigin(origin) {
        const day8 = (origin || "").slice(0, 8);
        return /^\d{8}$/.test(day8) ? parseInt(day8.slice(6, 8), 10) : null;
      }
      function minuteFromOrigin(origin) {
        const seg = (origin || "").split("/").pop() || "";
        if (seg.length < 6 || !/^\d{6}/.test(seg)) return null;
        return parseInt(seg.slice(2, 4), 10);
      }

      // Compose a wall-clock label from a "seconds-from-segment-start" offset
      // anchored to a per-call meta {startSec}. Used by the river view.
      function segmentTimeLabel(meta, secondsFromStart) {
        const total = meta.startSec + Math.floor(secondsFromStart);
        const hh = Math.floor(total / 3600) % 24;
        const mm = Math.floor((total % 3600) / 60);
        const ss = total % 60;
        return String(hh).padStart(2, "0") + ":" +
               String(mm).padStart(2, "0") + ":" +
               String(ss).padStart(2, "0");
      }

      // ── Data loaders (lazy, cached) ──────────────────────────────────────

      async function loadIndex() {
        try {
          const res = await fetch("/api/index", { cache: "no-store" });
          if (!res.ok) {
            console.info(`/api/index failed (${res.status}); falling back to mock months`);
            return;
          }
          const idx = await res.json();
          rebuildMonthsFromIndex(idx);
          console.info(`loaded /api/index (${idx.months.length} months, year_top=${idx.year_top.length})`);
        } catch (e) {
          console.warn("/api/index fetch failed; falling back to mock months", e);
        }
      }

      function rebuildMonthsFromIndex(idx) {
        const newMonths = idx.months.map((m, i) => {
          const fullName = MONTH_FULL_NAMES[m.month_num - 1];
          const head = (m.month_top || [])[0] || null;
          const yearEvent = head
            ? { title: head.title, text: head.description, origin: head.origin || "" }
            : { title: `${fullName} ${m.year}`,
                text: m.day_count ? `${m.day_count} day${m.day_count === 1 ? "" : "s"} captured` : "no observations yet",
                _empty: true };
          let toggle = true;
          const dayEvents = (m.month_top || []).map((p) => {
            const d = dayFromOrigin(p.origin);
            if (!d) return null;
            const ev = {
              day: d, side: toggle ? "top" : "bottom",
              title: p.title, text: p.description, origin: p.origin || "",
            };
            toggle = !toggle;
            return ev;
          }).filter(Boolean);
          return {
            name: fullName,
            short: fullName.slice(0, 3).toUpperCase(),
            year: m.year,
            month_num: m.month_num,
            ym: m.ym,
            accent: ACCENT_ROTATION[i % 4],
            days: m.days_in_month,
            first_weekday: m.first_weekday,
            side: i % 2 === 0 ? "top" : "bottom",
            yearEvent,
            dayEvents,
            day_count: m.day_count,
            days_with_data: new Set(m.days_with_data || []),
          };
        });
        months = newMonths;
        // Stash on the global so console-debugging is easier.
        window.timelineData.months = months;
      }

      async function loadDay(yyyymmdd) {
        if (dayCache.has(yyyymmdd)) return dayCache.get(yyyymmdd);
        let data = null;
        try {
          const res = await fetch(`/api/day/${yyyymmdd}`, { cache: "no-store" });
          if (res.ok) data = await res.json();
        } catch (e) { console.warn("loadDay failed", yyyymmdd, e); }
        if (!data) data = { day: yyyymmdd, day_top: [], hours: {}, hours_avail: {} };
        dayCache.set(yyyymmdd, data);
        // Populate the prototype's per-render lookups.
        const monthIdx = isoToMonthIdx(yyyymmdd.slice(0, 6));
        if (monthIdx >= 0) populateDayLookups(monthIdx, yyyymmdd, data);
        return data;
      }

      function populateDayLookups(monthIdx, yyyymmdd, data) {
        const dayInt = parseInt(yyyymmdd.slice(6, 8), 10);
        // Day-view hour events: first pick of each hour with picks, alternating sides.
        const dayPlan = [];
        let toggle = true;
        for (const hh of Object.keys(data.hours || {}).sort()) {
          const picks = data.hours[hh].picks || [];
          if (!picks.length) continue;
          const p = picks[0];
          dayPlan.push({
            hour: parseInt(hh, 10),
            side: toggle ? "top" : "bottom",
            kind: "work",
            title: p.title, text: p.description, origin: p.origin || "",
          });
          toggle = !toggle;
        }
        if (dayPlan.length) realDayPlan[`${monthIdx}:${dayInt}`] = dayPlan;
        // Hour view minute events.
        for (const [hh, hd] of Object.entries(data.hours || {})) {
          const picks = hd.picks || [];
          if (!picks.length) continue;
          realHourPlan[`${monthIdx}:${dayInt}:${parseInt(hh, 10)}`] = pickListToMinutePlan(picks);
        }
        // Per-cell availability: drives hour-view tinting + click gating.
        for (const [hh, ha] of Object.entries(data.hours_avail || {})) {
          segmentAvail[`${monthIdx}:${dayInt}:${parseInt(hh, 10)}`] = ha.buckets;
        }
      }

      function pickListToMinutePlan(picks) {
        const used = new Set();
        const fallbackSlots = [5, 20, 35, 50];
        const out = [];
        picks.slice(0, 4).forEach((p, i) => {
          let slot;
          const m = minuteFromOrigin(p.origin);
          if (m == null) slot = fallbackSlots[i];
          else slot = Math.max(0, Math.min(55, Math.floor(m / 5) * 5));
          const orig = slot;
          while (used.has(slot) && slot < 55) slot += 5;
          if (used.has(slot)) {
            slot = orig;
            while (used.has(slot) && slot > 0) slot -= 5;
          }
          used.add(slot);
          out.push({
            minute: slot,
            side: i % 2 === 0 ? "top" : "bottom",
            title: p.title, text: p.description, origin: p.origin || "",
          });
        });
        out.sort((a, b) => a.minute - b.minute);
        return out;
      }

      async function loadSegment(origin) {
        if (segCache.has(origin)) return segCache.get(origin);
        try {
          const res = await fetch(`/api/segment/${origin}`, { cache: "no-store" });
          if (!res.ok) return null;
          const data = await res.json();
          segCache.set(origin, data);
          return data;
        } catch (e) { console.warn("loadSegment failed", origin, e); return null; }
      }

      // Frame category → CSS color variable (shared with the prototype palette).
      const SCREEN_CATEGORY_COLOR = {
        terminal:    "var(--ink)",
        code:        "var(--ink)",
        coding:      "var(--ink)",
        browsing:    "var(--teal)",
        productivity:"var(--amber)",
        reading:     "var(--muted)",
        messaging:   "var(--coral)",
        meeting:     "var(--teal)",
        media:       "var(--coral)",
        other:       "var(--muted)",
      };
      function categoryColor(primary) {
        return SCREEN_CATEGORY_COLOR[(primary || "").toLowerCase()] || "var(--muted)";
      }

      // Featured = frames with extracted text content (the meaningful ones to
      // surface as visible serif marginalia). Non-featured render as ticks only.
      function isFeatured(frame) {
        return !!(frame.content && Object.keys(frame.content).length);
      }

      // Excerpt the most important content from a frame for the inline detail
      // panel — visual_description first, then any text content.
      function frameDetailText(frame) {
        const a = frame.analysis || {};
        const c = frame.content || {};
        const parts = [];
        if (a.visual_description) parts.push(a.visual_description);
        for (const [k, v] of Object.entries(c)) {
          if (typeof v === "string") parts.push(`[${k}]\n${v}`);
        }
        return parts.join("\n\n");
      }

      function clearActiveMarks() {
        for (const el of document.querySelectorAll(".river-tick.is-active, .river-audio-dot.is-active")) {
          el.classList.remove("is-active");
        }
      }

      // The river renderer stashes the rendered segment's data here so the
      // click-driven detail handlers can find frames + transcript lines
      // without re-fetching.
      let _activeSegment = null;
      let _activeMeta = null;

      function showSegmentDetail(frameId) {
        const detail = document.getElementById("segment-detail");
        if (!detail || !_activeSegment || !_activeSegment.screen) return;
        const frame = _activeSegment.screen.frames.find((f) => f.frame_id === frameId);
        if (!frame) return;
        const a = frame.analysis || {};
        const tLabel = segmentTimeLabel(_activeMeta, frame.timestamp || 0);
        const featured = isFeatured(frame);
        detail.innerHTML = `
          <div class="seg-detail-meta">
            <span class="seg-detail-time">${tLabel}</span>
            <span class="seg-detail-cat" style="--cat:${categoryColor(a.primary)}">${escapeHtml(a.primary || "?")}</span>
            <span class="seg-detail-frame">frame #${frame.frame_id}</span>
          </div>
          <div class="seg-detail-desc">${escapeHtml(a.visual_description || "")}</div>
          ${featured ? Object.entries(frame.content).map(([k, v]) =>
            `<div class="seg-detail-content">
               <div class="seg-detail-content-tag">${escapeHtml(k)}</div>
               <pre class="seg-detail-content-body">${escapeHtml(typeof v === "string" ? v : JSON.stringify(v, null, 2))}</pre>
             </div>`).join("") : ""}
        `;
        clearActiveMarks();
        const active = document.querySelector(`.river-tick[data-frame-id="${frameId}"]`);
        if (active) active.classList.add("is-active");
      }

      function showSegmentAudioDetail(audioIndex) {
        const detail = document.getElementById("segment-detail");
        if (!detail || !_activeSegment || !_activeSegment.audio) return;
        const lines = _activeSegment.audio.lines;
        const line = lines[audioIndex];
        if (!line) return;
        const sp = line.speaker || 1;
        const speakerColor = ["var(--blue)","var(--teal)","var(--coral)","var(--amber)"][sp - 1] || "var(--muted)";
        // Stitch together a small context window: 1 line before + this + 1 after
        const before = lines[audioIndex - 1];
        const after = lines[audioIndex + 1];
        const renderLine = (l, isFocus) =>
          l ? `<div class="seg-detail-line ${isFocus ? "is-focus" : ""}">
                 <span class="seg-detail-line-time">${escapeHtml(l.start || "")}</span>
                 <span class="seg-detail-line-sp">s${l.speaker || "?"}</span>
                 <span class="seg-detail-line-text">${escapeHtml(l.corrected || l.text || "")}</span>
                 ${l.emotion ? `<span class="seg-detail-line-emotion">${escapeHtml(l.emotion)}</span>` : ""}
               </div>` : "";
        detail.innerHTML = `
          <div class="seg-detail-meta">
            <span class="seg-detail-time">${escapeHtml(line.start || "")}</span>
            <span class="seg-detail-cat" style="--cat:${speakerColor}">speaker ${sp}</span>
            <span class="seg-detail-frame">audio #${audioIndex + 1} of ${lines.length}</span>
          </div>
          <div class="seg-detail-lines">
            ${renderLine(before, false)}
            ${renderLine(line, true)}
            ${renderLine(after, false)}
          </div>
        `;
        clearActiveMarks();
        const active = document.querySelector(`.river-audio-dot[data-audio-index="${audioIndex}"]`);
        if (active) active.classList.add("is-active");
      }

      function clearSegmentDetail() {
        const detail = document.getElementById("segment-detail");
        if (detail) detail.innerHTML = `<div class="seg-detail-empty">click a tick or audio dot on the river to see what sol observed at that moment</div>`;
        clearActiveMarks();
      }

      const timeline = document.querySelector("#timeline");
      let selectedMonth = null;
      let selectedDay = null;
      let selectedHour = null;
      let selectedMinute = null;
      let appScreen = "cover";
      let transitionToken = 0;

      const holidays = new Map(
        [
          [0, 1, "New Year's Day"],
          [0, 20, "Martin Luther King Jr. Day"],
          [1, 14, "Valentine's Day"],
          [1, 17, "Presidents' Day"],
          [2, 17, "St. Patrick's Day"],
          [3, 20, "Easter"],
          [4, 11, "Mother's Day"],
          [4, 26, "Memorial Day"],
          [5, 15, "Father's Day"],
          [5, 19, "Juneteenth"],
          [6, 4, "Independence Day"],
          [8, 1, "Labor Day"],
          [9, 13, "Indigenous Peoples' Day"],
          [9, 31, "Halloween"],
          [10, 11, "Veterans Day"],
          [10, 27, "Thanksgiving"],
          [11, 24, "Christmas Eve"],
          [11, 25, "Christmas Day"],
          [11, 31, "New Year's Eve"],
        ].map(([monthIndex, day, name]) => [`${monthIndex}-${day}`, name]),
      );

      function escapeHtml(value) {
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;");
      }

      function solLogoSvg(className = "sol-logo") {
        return `
          <svg class="${className}" xmlns="http://www.w3.org/2000/svg" viewBox="2.5 2.5 27 27" role="img" aria-label="sol logo">
            <title>sol</title>
            <path fill="#F5C740" d="M16.0 2.5 L18.6 7.3 A9.1 9.1 0 0 0 13.4 7.3 Z M23.9 5.1 L23.2 10.5 A9.1 9.1 0 0 0 19.0 7.4 Z M28.8 11.8 L25.1 15.8 A9.1 9.1 0 0 0 23.5 10.9 Z M28.8 20.2 L23.5 21.1 A9.1 9.1 0 0 0 25.1 16.2 Z M23.9 26.9 L19.0 24.6 A9.1 9.1 0 0 0 23.2 21.5 Z M16.0 29.5 L13.4 24.7 A9.1 9.1 0 0 0 18.6 24.7 Z M8.1 26.9 L8.8 21.5 A9.1 9.1 0 0 0 13.0 24.6 Z M3.2 20.2 L6.9 16.2 A9.1 9.1 0 0 0 8.5 21.1 Z M3.2 11.8 L8.5 10.9 A9.1 9.1 0 0 0 6.9 15.8 Z M8.1 5.1 L13.0 7.4 A9.1 9.1 0 0 0 8.8 10.5 Z"/>
            <circle cx="16" cy="16" r="8.0" fill="none" stroke="#E8923A" stroke-width="1.2"/>
            <path fill="#E8923A" fill-rule="evenodd" d="M12.079 18.795C13.489 18.795 14.229 18.065 14.229 17.155C14.229 16.365 13.729 15.835 12.229 15.535C11.149 15.315 10.939 15.095 10.939 14.725C10.939 14.345 11.399 14.135 11.989 14.135C12.499 14.135 12.859 14.235 13.199 14.555C13.399 14.745 13.729 14.815 13.949 14.665C14.159 14.505 14.169 14.255 13.989 14.035C13.589 13.545 12.889 13.245 12.009 13.245C10.989 13.245 9.959 13.735 9.959 14.755C9.959 15.525 10.529 16.075 11.879 16.335C12.919 16.525 13.249 16.815 13.239 17.215C13.229 17.615 12.809 17.895 12.039 17.895C11.429 17.895 10.889 17.625 10.659 17.375C10.469 17.175 10.189 17.125 9.929 17.335C9.699 17.515 9.659 17.825 9.859 18.035C10.299 18.475 11.149 18.795 12.079 18.795Z M16.999 18.795C18.609 18.795 19.749 17.645 19.749 16.025C19.739 14.395 18.599 13.245 16.999 13.245C15.379 13.245 14.239 14.395 14.239 16.025C14.239 17.645 15.379 18.795 16.999 18.795ZM16.999 17.895C15.959 17.895 15.219 17.125 15.219 16.025C15.219 14.925 15.959 14.145 16.999 14.145C18.039 14.145 18.769 14.925 18.769 16.025C18.769 17.125 18.039 17.895 16.999 17.895Z M21.569 18.755H21.589C21.989 18.755 22.269 18.545 22.269 18.255C22.269 17.965 22.079 17.755 21.819 17.755H21.569C21.279 17.755 21.069 17.405 21.069 16.905V11.445C21.069 11.155 20.859 10.945 20.569 10.945C20.279 10.945 20.069 11.155 20.069 11.445V16.905C20.069 17.985 20.689 18.755 21.569 18.755Z"/>
          </svg>
        `;
      }

      function getTransitionFrames(mode, phase) {
        const enter = phase === "enter";
        const frames = {
          "zoom-in": enter
            ? [{ opacity: 0, transform: "scale(0.985) translateY(8px)" }, { opacity: 1, transform: "scale(1) translateY(0)" }]
            : [{ opacity: 1, transform: "scale(1) translateY(0)" }, { opacity: 0, transform: "scale(1.015) translateY(-8px)" }],
          "zoom-out": enter
            ? [{ opacity: 0, transform: "scale(1.015) translateY(-8px)" }, { opacity: 1, transform: "scale(1) translateY(0)" }]
            : [{ opacity: 1, transform: "scale(1) translateY(0)" }, { opacity: 0, transform: "scale(0.985) translateY(8px)" }],
          lateral: enter
            ? [{ opacity: 0, transform: "translateX(18px)" }, { opacity: 1, transform: "translateX(0)" }]
            : [{ opacity: 1, transform: "translateX(0)" }, { opacity: 0, transform: "translateX(-18px)" }],
        };

        return frames[mode] || frames["zoom-in"];
      }

      async function setTimeline(markup, mode = "zoom-in") {
        const token = ++transitionToken;
        const shouldReduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
        const currentView = timeline.firstElementChild;

        if (!currentView || mode === "none" || shouldReduceMotion) {
          timeline.innerHTML = markup;
          return;
        }

        await currentView
          .animate(getTransitionFrames(mode, "leave"), {
            duration: 95,
            easing: "cubic-bezier(.2, 0, .2, 1)",
            fill: "forwards",
          })
          .finished.catch(() => {});

        if (token !== transitionToken) return;

        timeline.innerHTML = markup;
        const nextView = timeline.firstElementChild;
        if (!nextView) return;

        nextView.animate(getTransitionFrames(mode, "enter"), {
          duration: 145,
          easing: "cubic-bezier(.2, 0, .2, 1)",
          fill: "both",
        });
      }

      function renderCover(mode = "zoom-out") {
        appScreen = "cover";
        selectedMonth = null;
        selectedDay = null;
        selectedHour = null;
        selectedMinute = null;

        setTimeline(`
          <div class="cover-screen">
            <button class="cover-button" type="button" data-start-demo onclick="event.stopPropagation(); showTimeline('zoom-in');" aria-label="Start timeline demo">
              ${solLogoSvg()}
            </button>
          </div>
        `, mode);
      }

      function renderClosing(mode = "zoom-in") {
        appScreen = "closing";

        setTimeline(`
          <div class="closing-screen">
            <div class="closing-content">
              <div class="closing-logo" aria-hidden="true">${solLogoSvg()}</div>
              <p class="install-url">solstone.app/install</p>
            </div>
          </div>
        `, mode);
      }

      function showTimeline(mode = "zoom-in") {
        selectedMonth = null;
        selectedDay = null;
        selectedHour = null;
        selectedMinute = null;
        renderYear(mode);
      }

      function goNextScreen() {
        if (appScreen === "cover") {
          showTimeline("zoom-in");
          return;
        }

        if (appScreen === "timeline") {
          renderClosing("zoom-in");
        }
      }

      function goPreviousScreen() {
        if (appScreen === "closing") {
          showTimeline("zoom-out");
          return;
        }

        if (appScreen === "timeline") {
          renderCover("zoom-out");
        }
      }

      function eventColumn(day, span, days) {
        const start = Math.max(1, Math.min(day - 2, days - span + 1));
        return `${start} / span ${span}`;
      }

      function hourColumn(hour, span = 4) {
        const start = Math.max(1, Math.min(hour + 1, 25 - span));
        return `${start} / span ${span}`;
      }

      function segmentColumn(minute, span = 3) {
        const index = Math.floor(minute / 5) + 1;
        const start = Math.max(1, Math.min(index, 13 - span));
        return `${start} / span ${span}`;
      }

      function getDayMeta(monthIndex, day) {
        // Use the real year from the dynamically-built months[] entry so
        // weekend computation matches the actual calendar (e.g., Jun 14
        // 2025 is a Saturday, but Jun 14 2026 is a Sunday).
        const m = months[monthIndex] || {};
        const year = m.year || 2025;
        const monthNum = (m.month_num != null ? m.month_num - 1 : monthIndex);
        const date = new Date(year, monthNum, day);
        const weekday = date.getDay();
        const holiday = holidays.get(`${monthIndex}-${day}`);
        return {
          dayType: weekday === 0 || weekday === 6 ? "weekend" : "weekday",
          holiday,
        };
      }

      function formatHour(hour) {
        if (hour === 0) return "12a";
        if (hour < 12) return `${hour}a`;
        if (hour === 12) return "12p";
        return `${hour - 12}p`;
      }

      function formatTime(hour, minute = 0) {
        const suffix = hour < 12 ? "a" : "p";
        const normalizedHour = hour % 12 === 0 ? 12 : hour % 12;
        return `${normalizedHour}:${String(minute).padStart(2, "0")}${suffix}`;
      }

      function getDayEvent(monthIndex, day) {
        return months[monthIndex].dayEvents.find((event) => event.day === day);
      }

      function getDayPlan(monthIndex, day) {
        // Real per-day rollup data overrides the synthetic plan when populated.
        const realKey = `${monthIndex}:${day}`;
        if (realDayPlan[realKey]) {
          return realDayPlan[realKey];
        }

        const { dayType, holiday } = getDayMeta(monthIndex, day);
        const keyEvent = getDayEvent(monthIndex, day);
        const isWeekend = dayType === "weekend";
        const base = isWeekend
          ? [
              { hour: 7, side: "top", kind: "personal", title: "Slow Start", text: "Breakfast, a walk, and a lighter read on the week." },
              { hour: 10, side: "bottom", kind: "personal", title: "Personal Block", text: "Errands, family time, or a longer reset away from the desk." },
              { hour: 19, side: "bottom", kind: "personal", title: "Evening Offline", text: "Dinner, downtime, and a clear stop before the next week." },
            ]
          : [
              { hour: 6, side: "top", kind: "personal", title: "Morning Reset", text: "Walk, breakfast, and a quick scan of the day's shape." },
              { hour: 8, side: "bottom", kind: "work", title: "Deep Work", text: "Protected build time before calls and inbox pressure arrive." },
              { hour: 13, side: "bottom", kind: "personal", title: "Lunch Walk", text: "A short reset between maker work and afternoon coordination." },
              { hour: 16, side: "top", kind: "work", title: "Calls & Follow-up", text: "Customer notes, investor replies, or team coordination." },
              { hour: 20, side: "bottom", kind: "personal", title: "Home Block", text: "Dinner, cleanup, and a cleaner boundary around the evening." },
            ];

        if (keyEvent) {
          base.splice(isWeekend ? 2 : 2, 0, {
            hour: isWeekend ? 12 : 11,
            side: "top",
            kind: "work",
            title: keyEvent.title,
            text: keyEvent.text,
            featured: true,
          });
        }

        if (holiday) {
          base.splice(1, 0, {
            hour: 9,
            side: "bottom",
            kind: "personal",
            title: holiday,
            text: "Keeps the day lighter and protects space around the holiday.",
            featured: true,
          });
        }

        return base.sort((a, b) => a.hour - b.hour);
      }

      function getHourEvent(monthIndex, day, hour) {
        return getDayPlan(monthIndex, day).find((event) => event.hour === hour);
      }

      function getMinutePlan(monthIndex, day, hour) {
        // Real per-segment data overrides the synthetic plan when populated.
        const realKey = `${monthIndex}:${day}:${hour}`;
        if (realHourPlan[realKey]) {
          return realHourPlan[realKey];
        }

        const hourEvent = getHourEvent(monthIndex, day, hour);
        const isWorkHour = hour >= 8 && hour <= 17;
        const base = hourEvent
          ? [
              { minute: 0, side: "top", title: "Set Context", text: "Opens notes, names the goal, and removes small distractions." },
              { minute: 20, side: "bottom", title: hourEvent.title, text: hourEvent.text, featured: true },
              { minute: 45, side: "top", title: "Capture Next Step", text: "Writes the decision, owner, and next concrete action before moving on." },
            ]
          : isWorkHour
            ? [
                { minute: 5, side: "top", title: "Focus Setup", text: "Chooses one concrete task and closes unrelated tabs." },
                { minute: 20, side: "bottom", title: "Build / Decide", text: "Uses the middle of the hour for the hardest work or decision." },
                { minute: 50, side: "top", title: "Commit Notes", text: "Leaves the workspace in a state that is easy to resume." },
              ]
            : [
                { minute: 5, side: "top", title: "Transition", text: "Moves out of the previous context and checks what the body needs." },
                { minute: 25, side: "bottom", title: "Personal Reset", text: "Walks, eats, reads, or handles home logistics without rushing." },
                { minute: 50, side: "top", title: "Light Plan", text: "Sets up the next hour without turning the break into work." },
              ];

        return base;
      }

      function getSegmentEvent(monthIndex, day, hour, minute) {
        return getMinutePlan(monthIndex, day, hour).find((event) => event.minute === minute);
      }

      function getFiveMinutePlan(monthIndex, day, hour, minute) {
        const segmentEvent = getSegmentEvent(monthIndex, day, hour, minute);
        const isWorkHour = hour >= 8 && hour <= 17;
        const base = segmentEvent
          ? [
              { offset: 0, side: "top", title: "Orient", text: "Reads the immediate cue and decides what this tiny window is for." },
              { offset: 2, side: "bottom", title: segmentEvent.title, text: segmentEvent.text, featured: true },
              { offset: 4, side: "top", title: "Leave Trace", text: "Captures the result so the next block starts with context." },
            ]
          : isWorkHour
            ? [
                { offset: 0, side: "top", title: "Open Thread", text: "Pulls up the exact file, note, or message needed now." },
                { offset: 2, side: "bottom", title: "Make Progress", text: "Uses the middle minutes for one concrete edit or decision." },
                { offset: 4, side: "top", title: "Close Loop", text: "Saves the small result and names the next action." },
              ]
            : [
                { offset: 0, side: "top", title: "Pause", text: "Steps out of the previous context and slows the pace." },
                { offset: 2, side: "bottom", title: "Reset", text: "Takes care of the small personal need that this break is for." },
                { offset: 4, side: "top", title: "Return Cue", text: "Sets up the next transition without over-planning." },
              ];

        return base;
      }

      function renderYear(mode = "zoom-out") {
        appScreen = "timeline";
        setTimeline(`
          <div class="year-view">
            ${months
              .map(
                (month, index) => `
                  <article class="milestone ${month.side} accent-${month.accent}" style="grid-column: ${index + 1}">
                    <div class="card">
                      <div class="date">${month.name} ${month.year || ""}</div>
                      <h2>${escapeHtml(month.yearEvent.title)}</h2>
                      <p>${escapeHtml(month.yearEvent.text)}</p>
                    </div>
                    <button class="node" type="button" data-month="${index}" aria-label="Open ${month.name} ${month.year || ""}">
                      ${month.short}
                    </button>
                  </article>
                `,
              )
              .join("")}
          </div>
        `, mode);
      }

      async function renderMonth(index, mode = "zoom-in") {
        appScreen = "timeline";
        const month = months[index];
        const previous = index > 0 ? months[index - 1] : null;
        const next = index < months.length - 1 ? months[index + 1] : null;
        const topEvents = month.dayEvents.filter((event) => event.side === "top");
        const bottomEvents = month.dayEvents.filter((event) => event.side === "bottom");
        const eventDays = new Map(month.dayEvents.map((event) => [event.day, event.side]));

        await setTimeline(`
          <div class="month-view accent-${month.accent}" style="--days: ${month.days}">
            ${previous ? renderEdgeMonth(previous, index - 1, "prev") : ""}
            ${next ? renderEdgeMonth(next, index + 1, "next") : ""}

            <section class="focus-panel" aria-label="${month.name} ${month.year || ""} daily timeline">
              <svg class="month-connectors" aria-hidden="true"></svg>

              <div class="focus-heading">
                <button class="focus-node" type="button" data-month="${index}" aria-label="Return to year view">
                  ${month.short}
                </button>
              </div>

              <div class="events-lane top" aria-label="${month.name} highlighted events above the daily timeline">
                ${topEvents.map((event) => renderDayEvent(event, month.days, "top")).join("")}
              </div>

              <div class="day-grid" aria-label="${month.name} ${month.year || ""} days">
                ${Array.from({ length: month.days }, (_, dayIndex) => {
                  const day = dayIndex + 1;
                  const side = eventDays.get(day);
                  const { dayType, holiday } = getDayMeta(index, day);
                  const classes = ["day-cell", dayType, holiday ? "holiday" : "", side ? `has-event ${side}` : ""]
                    .filter(Boolean)
                    .join(" ");
                  const label = `${month.name} ${day}, ${month.year || ""}${holiday ? `, ${holiday}` : ""}`;
                  return `
                    <button class="${classes}" type="button" data-month="${index}" data-day="${day}" title="${escapeHtml(label)}" aria-label="Open ${escapeHtml(label)}">
                      ${day}
                      ${holiday ? '<span class="holiday-mark" aria-hidden="true"></span>' : ""}
                    </button>
                  `;
                }).join("")}
              </div>

              <div class="events-lane bottom" aria-label="${month.name} highlighted events below the daily timeline">
                ${bottomEvents.map((event) => renderDayEvent(event, month.days, "bottom")).join("")}
              </div>
            </section>
          </div>
        `, mode);
        layoutMonth();
        const view = document.querySelector(".month-view");
        if (view && view.getAnimations) {
          Promise.all(view.getAnimations().map((a) => a.finished.catch(() => {})))
            .then(() => layoutMonth());
        }
      }

      async function renderDay(monthIndex, day, mode = "zoom-in") {
        appScreen = "timeline";
        const month = months[monthIndex];
        const previous = day > 1 ? day - 1 : null;
        const next = day < month.days ? day + 1 : null;
        // Lazy-fetch the day's rollup so realDayPlan/realHourPlan/segmentAvail
        // are populated before the day-view renders.
        const yyyymmdd = isoDay(monthIndex, day);
        if (yyyymmdd) await loadDay(yyyymmdd);
        const plan = getDayPlan(monthIndex, day);
        const topEvents = plan.filter((event) => event.side === "top");
        const bottomEvents = plan.filter((event) => event.side === "bottom");
        const eventHours = new Map(plan.map((event) => [event.hour, event]));
        const { dayType, holiday } = getDayMeta(monthIndex, day);
        const dayLabel = `${month.short} ${day}`;

        await setTimeline(`
          <div class="day-view accent-${month.accent}">
            ${previous ? renderEdgeDay(monthIndex, previous, "prev") : ""}
            ${next ? renderEdgeDay(monthIndex, next, "next") : ""}

            <section class="hour-panel" aria-label="${month.name} ${day}, ${month.year || ""} hourly timeline">
              <svg class="day-connectors" aria-hidden="true"></svg>

              <div class="focus-heading">
                <button class="day-focus-node" type="button" data-month="${monthIndex}" data-return-month="true" aria-label="Return to ${month.name} ${month.year || ""}">
                  ${dayLabel}
                </button>
              </div>

              <div class="hour-lane top" aria-label="${month.name} ${day} highlighted events above the hourly timeline">
                ${topEvents.map(renderHourEvent).join("")}
              </div>

              <div class="hour-grid" aria-label="${month.name} ${day}, ${month.year || ""} hours">
                ${Array.from({ length: 24 }, (_, hour) => {
                  const event = eventHours.get(hour);
                  const hourKind = hour >= 8 && hour <= 17 ? "work" : "personal";
