<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Weekly Reflection</title>
  <style>
    body {
      font-family: "Palatino Linotype", "Book Antiqua", Georgia, serif;
      color: #1f2937;
      margin: 0;
      padding: 0;
    }

    main {
      padding: 2.5rem 2.75rem 3rem;
    }

    .pdf-kicker {
      margin: 0 0 0.3rem;
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #92400e;
    }

    h1 {
      margin: 0 0 1.5rem;
      font-size: 1.9rem;
      line-height: 1.1;
      color: #111827;
    }

    h2, h3 {
      color: #111827;
    }

    p, li {
      line-height: 1.6;
    }

    blockquote {
      margin: 1.25rem 0;
      padding-left: 1rem;
      border-left: 3px solid #f59e0b;
      color: #6b7280;
    }

    code {
      font-size: 0.9em;
    }
  </style>
</head>
<body>
  <main>
    <p class="pdf-kicker">weekly reflection</p>
    <h1>week of {{ week_label }}</h1>
    {{ reflection_html|safe }}
  </main>
</body>
</html>
