<!doctype html>
<html lang="en">
<meta charset="utf-8">
<title>api.js smoke</title>
<style>
  body { font: 14px/1.4 sans-serif; padding: 16px; }
  .pass { color: #166534; }
  .fail { color: #b91c1c; }
</style>
<h1>api.js smoke</h1>
<label><input id="save-toggle" type="checkbox"> save toggle</label>
<div id="results"></div>
<script src="../api.js"></script>
<script>
  const results = document.getElementById('results');
  let failures = 0;

  function assert(name, condition, detail) {
    const row = document.createElement('div');
    row.className = condition ? 'pass' : 'fail';
    row.textContent = `${condition ? 'PASS' : 'FAIL'} ${name}${detail ? ` — ${detail}` : ''}`;
    results.appendChild(row);
    if (!condition) failures += 1;
  }

  function response({ status = 200, statusText = 'OK', body = '' }) {
    return { status, statusText, ok: status >= 200 && status < 300, text: async () => body };
  }

  async function withFetch(impl, fn) {
    const originalFetch = window.fetch;
    window.fetch = impl;
    try {
      return await fn();
    } finally {
      window.fetch = originalFetch;
    }
  }

  async function expectApiError(name, fn, check) {
    try {
      await fn();
      assert(name, false, 'did not throw');
    } catch (error) {
      assert(name, error instanceof window.ApiError && check(error), error.message);
    }
  }

  async function run() {
    await withFetch(async () => response({ body: '{"ok":true}' }), async () => {
      const payload = await window.apiJson('/ok');
      assert('2xx json', payload.ok === true);
    });

    await withFetch(async () => response({ body: '' }), async () => {
      const payload = await window.apiJson('/empty');
      assert('2xx empty body', Object.keys(payload).length === 0);
    });

    await expectApiError('2xx bad json', () => withFetch(
      async () => response({ body: '{bad json' }),
      () => window.apiJson('/parse')
    ), error => error.cause === 'parse' && error.serverMessage === 'Malformed server response');

    await expectApiError('400 with error', () => withFetch(
      async () => response({ status: 400, statusText: 'Bad', body: '{"error":"broken"}' }),
      () => window.apiJson('/bad')
    ), error => error.status === 400 && error.serverMessage === 'broken');

    await expectApiError('400 with message', () => withFetch(
      async () => response({ status: 400, statusText: 'Bad', body: '{"message":"nope"}' }),
      () => window.apiJson('/bad')
    ), error => error.serverMessage === 'nope');

    await expectApiError('400 fallback message', () => withFetch(
      async () => response({ status: 400, statusText: 'Bad', body: '' }),
      () => window.apiJson('/bad')
    ), error => error.serverMessage === 'Request failed (HTTP 400)');

    await expectApiError('401 no redirect', () => withFetch(
      async () => response({ status: 401, statusText: 'Unauthorized', body: '{"error":"login"}' }),
      () => window.apiJson('/auth', { noAuthRedirect: true })
    ), error => error.status === 401 && error.serverMessage === 'login');

    await expectApiError('403 no redirect', () => withFetch(
      async () => response({ status: 403, statusText: 'Forbidden', body: '{"message":"disabled"}' }),
      () => window.apiJson('/auth', { noAuthRedirect: true })
    ), error => error.status === 403 && error.serverMessage === 'disabled');

    const checkbox = document.getElementById('save-toggle');

    await withFetch(async () => response({ body: '{"saved":true}' }), async () => {
      checkbox.checked = true;
      await window.saveControl({ el: checkbox, fetchArgs: ['/save', { method: 'POST' }] });
      assert('saveControl success keeps checkbox state', checkbox.checked === true);
      assert('saveControl success clears error', !document.querySelector('[data-control-save-error]'));
    });

    await withFetch(async () => response({ status: 400, statusText: 'Bad', body: '{"error":"first fail"}' }), async () => {
      checkbox.checked = false;
      try { await window.saveControl({ el: checkbox, fetchArgs: ['/save', { method: 'POST' }] }); } catch (_) {}
      const errorEl = document.querySelector('[data-control-save-error]');
      assert('saveControl revert on failure', checkbox.checked === true);
      assert('saveControl failure renders error', !!errorEl && errorEl.textContent.includes('first fail'));
    });

    await withFetch(async () => response({ status: 400, statusText: 'Bad', body: '{"error":"second fail"}' }), async () => {
      checkbox.checked = false;
      try { await window.saveControl({ el: checkbox, fetchArgs: ['/save', { method: 'POST' }] }); } catch (_) {}
      const errors = document.querySelectorAll('[data-control-save-error]');
      assert('saveControl replaces existing error span', errors.length === 1 && errors[0].textContent.includes('second fail'));
    });

    await withFetch(async () => response({ body: '{"saved":true}' }), async () => {
      checkbox.checked = false;
      await window.saveControl({ el: checkbox, fetchArgs: ['/save', { method: 'POST' }] });
      assert('saveControl success clears prior error', !document.querySelector('[data-control-save-error]'));
      assert('saveControl stores new stable value', checkbox.checked === false);
    });

    assert('summary', failures === 0, failures ? `${failures} failure(s)` : 'all checks passed');
  }

  run();
</script>
</html>
