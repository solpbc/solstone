{# Calendar day view - events timeline + activities #}

<style>
.day-view {
  position: relative;
  border-left: 60px solid transparent;
  overflow-x: auto;
}

.hour-line {
  position: absolute;
  left: 0;
  right: 0;
  border-top: 1px solid #eee;
  font-size: 0.75em;
  color: #777;
}

.hour-line span {
  position: absolute;
  left: -55px;
  top: -0.6em;
}

.occ {
  position: absolute;
  left: 0;
  right: 0;
  min-width: 40px;
  border-radius: 4px;
  opacity: 0.9;
  display: block;
  text-decoration: none;
  cursor: pointer;
}

/* Activity blocks on timeline */
.occ-activity {
  opacity: 0.35;
  border: 2px solid;
  border-radius: 6px;
  display: flex;
  align-items: flex-start;
  padding: 2px 6px;
  font-size: 0.75em;
  overflow: hidden;
  white-space: nowrap;
}

.modal {
  display: none;
  position: fixed;
  z-index: 1000;
  left: 0;
  top: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.5);
}

.modal-content {
  background: white;
  margin: 5% auto;
  padding: 1em;
  border-radius: 8px;
  max-width: 600px;
  position: relative;
}

.close {
  position: absolute;
  top: 10px;
  right: 15px;
  cursor: pointer;
  font-size: 24px;
}

.occ-field {
  margin-bottom: 0.5em;
}

.occ-field strong {
  display: inline-block;
  width: 90px;
}

.occ-desc {
  margin-top: 0.5em;
  white-space: pre-wrap;
}

h1 {
  font-size: 1.5em;
  font-weight: 600;
  letter-spacing: -0.01em;
  margin: 0 0 0.25em 0;
}

.day-summary {
  font-size: 0.9em;
  color: #888;
  margin-bottom: 1em;
  max-width: 65ch;
}

.events-empty {
  color: #888;
  padding: 1.5em 2em 3em;
  text-align: center;
}
.empty-icon {
  margin-bottom: 0.25em;
}
.empty-heading {
  font-size: 1.1em;
  font-weight: 600;
  margin-bottom: 0.25em;
}
.empty-desc {
  font-size: 0.9em;
  color: #aaa;
  margin-top: 0.5em;
}

/* Planned/anticipated events - dotted outline, faded */
.occ-planned {
  opacity: 0.6;
  background: transparent !important;
  border: 2px dotted;
}

/* All-day section for untimed events */
.all-day-section {
  margin-bottom: 1.5em;
  padding: 0.75em;
  background: #f8f9fa;
  border-radius: 6px;
}

.all-day-section h2 {
  margin: 0 0 0.5em 0;
  font-size: 0.85em;
  color: #666;
}

.all-day-cards {
  display: flex;
  flex-wrap: wrap;
  gap: 0.5em;
}

.all-day-card {
  padding: 0.5em 0.75em;
  border-radius: 4px;
  font-size: 0.9em;
  cursor: pointer;
  border-left: 3px solid;
  background: white;
}

.all-day-card.planned {
  border-style: dotted;
  opacity: 0.7;
}

.all-day-card .card-title {
  font-weight: 500;
}

.all-day-card .card-badge {
  font-size: 0.75em;
  color: #666;
  margin-left: 0.5em;
}

.allday-expand {
  display: inline-flex;
  align-items: center;
  padding: 0.4em 0.75em;
  border: 1px solid #ddd;
  border-radius: 4px;
  background: #f8f9fa;
  color: #666;
  font-size: 0.85em;
  cursor: pointer;
}

.allday-expand:hover {
  background: #e9ecef;
  color: #333;
}

/* Activities section */
.activities-section {
  margin-top: 2em;
  padding-top: 1em;
  border-top: 1px solid #eee;
}

.activities-section h2 {
  margin: 0 0 0.75em 0;
  font-size: 1em;
  color: #555;
}

.activity-cards {
  display: flex;
  flex-direction: column;
  gap: 0.5em;
}

.activity-card {
  display: flex;
  align-items: center;
  gap: 0.75em;
  padding: 0.6em 0.75em;
  border-radius: 6px;
  background: #f8f9fa;
  cursor: pointer;
  border-left: 3px solid #6c757d;
  transition: background 0.15s;
}

.activity-card:hover {
  background: #e9ecef;
}

.activity-card .act-icon {
  font-size: 1.3em;
  flex-shrink: 0;
}

.activity-card .act-body {
  flex: 1;
  min-width: 0;
}

.activity-card .act-name {
  font-weight: 500;
  font-size: 0.95em;
}

.activity-card .act-desc {
  font-size: 0.8em;
  color: #666;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.activity-card .act-meta {
  flex-shrink: 0;
  text-align: right;
  font-size: 0.8em;
  color: #888;
}

.activity-card .act-duration {
  font-weight: 500;
}

.activity-card .act-level {
  display: inline-block;
  width: 8px;
  height: 8px;
  border-radius: 50%;
  margin-left: 4px;
  vertical-align: middle;
}

/* Activity detail view */
.activity-detail {
  max-width: 700px;
}

.activity-detail-back {
  display: inline-flex;
  align-items: center;
  gap: 0.3em;
  font-size: 0.85em;
  color: #666;
  cursor: pointer;
  margin-bottom: 0.75em;
  padding: 0.25em 0;
}

.activity-detail-back:hover {
  color: #333;
}

.activity-detail-header {
  margin-bottom: 1em;
}

.activity-detail-header h2 {
  margin: 0 0 0.25em 0;
  font-size: 1.3em;
}

.activity-detail-header .ad-subtitle {
  color: #666;
  font-size: 0.9em;
}

.ad-fields {
  display: grid;
  grid-template-columns: auto 1fr;
  gap: 0.3em 1em;
  margin-bottom: 1em;
  font-size: 0.9em;
}

.ad-fields dt {
  color: #888;
  font-weight: 500;
}

.ad-fields dd {
  margin: 0;
}

.ad-entities {
  display: flex;
  flex-wrap: wrap;
  gap: 0.3em;
}

.ad-entity {
  padding: 0.15em 0.5em;
  background: #e9ecef;
  border-radius: 3px;
  font-size: 0.85em;
}

.ad-description {
  margin: 1em 0;
  padding: 0.75em;
  background: #f8f9fa;
  border-radius: 6px;
  white-space: pre-wrap;
  line-height: 1.5;
}

/* Tabs */
.ad-tabs {
  display: flex;
  border-bottom: 2px solid #dee2e6;
  margin-bottom: 1em;
  gap: 0;
}

.ad-tab {
  padding: 0.5em 1em;
  border: none;
  background: none;
  cursor: pointer;
  font-size: 0.9em;
  color: #666;
  border-bottom: 2px solid transparent;
  margin-bottom: -2px;
}

.ad-tab:hover {
  color: #333;
}

.ad-tab.active {
  color: #333;
  border-bottom-color: #333;
  font-weight: 500;
}

.ad-tab-pane {
  display: none;
}

.ad-tab-pane.active {
  display: block;
}

.ad-output-loading {
  color: #888;
  font-style: italic;
  padding: 1em 0;
}

.rendered-markdown {
  line-height: 1.6;
}

.rendered-markdown h1,
.rendered-markdown h2,
.rendered-markdown h3 {
  margin-top: 1em;
  margin-bottom: 0.5em;
}

.rendered-markdown h1 { font-size: 1.3em; }
.rendered-markdown h2 { font-size: 1.15em; }
.rendered-markdown h3 { font-size: 1.05em; }

.rendered-markdown ul, .rendered-markdown ol {
  padding-left: 1.5em;
}

.rendered-markdown pre {
  background: #f4f4f4;
  padding: 0.75em;
  border-radius: 4px;
  overflow-x: auto;
}

.rendered-markdown code {
  background: #f4f4f4;
  padding: 0.1em 0.3em;
  border-radius: 3px;
  font-size: 0.9em;
}

.rendered-markdown pre code {
  background: none;
  padding: 0;
}

/* Level colors */
.level-high { background: #2ecc71; }
.level-medium { background: #f39c12; }
.level-low { background: #95a5a6; }

/* Focus-visible for interactive elements */
.occ:focus-visible,
.occ-activity:focus-visible {
  outline: 2px solid var(--facet-color, #b06a1a);
  outline-offset: 1px;
}
.all-day-card:focus-visible,
.activity-card:focus-visible {
  outline: 2px solid var(--facet-color, #b06a1a);
  outline-offset: 2px;
}
/* Button reset for back link */
button.activity-detail-back {
  border: none;
  background: none;
  font: inherit;
  color: inherit;
  padding: 0.25em 0;
  text-align: left;
}

.sr-only {
  position: absolute;
  width: 1px;
  height: 1px;
  padding: 0;
  margin: -1px;
  overflow: hidden;
  clip: rect(0, 0, 0, 0);
  white-space: nowrap;
  border: 0;
}

.calendar-breadcrumb {
  display: flex;
  align-items: center;
  gap: 0.4em;
  font-size: 0.85em;
  color: #888;
  margin-bottom: 0.5em;
}
.breadcrumb-link {
  color: #888;
  text-decoration: none;
}
.breadcrumb-link:hover {
  color: #555;
  text-decoration: underline;
}
.breadcrumb-link:active {
  color: #333;
}
.breadcrumb-sep {
  color: #aaa;
}
.breadcrumb-current {
  color: #888;
}
.today-chip {
  font-size: 0.8em;
  color: #888;
  background: #f0f0f0;
  padding: 2px 8px;
  border-radius: 4px;
  line-height: 1;
  transition: background 0.15s, color 0.15s;
  text-decoration: none;
  margin-left: 0.5em;
  white-space: nowrap;
}
.today-chip:hover {
  background: #e4e4e4;
  color: #555;
}
.today-chip:active {
  background: #d9d9d9;
  color: #333;
}
.timeline-legend {
  display: flex;
  flex-wrap: wrap;
  gap: 0.5em 1em;
  padding: 0.3em 0.5em;
  font-size: 0.8em;
  color: #666;
}
.legend-item {
  display: inline-flex;
  align-items: center;
  gap: 0.3em;
  white-space: nowrap;
}
.legend-dot {
  display: inline-block;
  width: 0.7em;
  height: 0.7em;
  border-radius: 50%;
  flex-shrink: 0;
}

/* Responsive: tablet */
@media (max-width: 768px) {
  .workspace-content-wide {
    padding: 0.5em;
  }
  .all-day-cards,
  .allday-overflow {
    flex-direction: column;
  }
  .modal-content {
    margin: 2% auto;
    max-width: 95%;
  }
}

/* Responsive: mobile */
@media (max-width: 480px) {
  .day-view {
    border-left-width: 40px;
    overflow-x: auto;
  }
  .hour-line span {
    left: -38px;
    font-size: 0.65em;
  }
  h1 {
    font-size: 1.3em;
  }
  .occ {
    min-height: 30px;
  }
  .all-day-card {
    min-height: 44px;
    display: flex;
    align-items: center;
  }
  .activity-card {
    min-height: 44px;
  }
  .modal-content {
    margin: 0;
    max-width: 100%;
    min-height: 100vh;
    border-radius: 0;
  }
  .calendar-breadcrumb {
    font-size: 0.75em;
    gap: 0.3em;
  }
  .day-summary {
    font-size: 0.8em;
  }
  .timeline-legend {
    font-size: 0.7em;
  }
  .activities-section {
    margin-top: 1em;
  }
  .ad-fields {
    grid-template-columns: 1fr;
  }
  .ad-tabs {
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }
  .ad-tab {
    white-space: nowrap;
    flex-shrink: 0;
  }
}
</style>

<div class="workspace-content-wide">
  <nav class="calendar-breadcrumb" aria-label="calendar navigation">
    <a href="#" id="breadcrumbMonth" class="breadcrumb-link"></a>
    <span class="breadcrumb-sep" aria-hidden="true">/</span>
    <span class="breadcrumb-current" aria-current="page"></span>
    <a href="#" id="todayChip" class="today-chip" style="display:none"></a>
  </nav>
  <h1>{{ title }}</h1>
  <div id="daySummary" class="day-summary"></div>

  <div id="dayView">
    <div id="eventsView">
      <div class="events-empty">Loading...</div>
    </div>
    <div id="activitiesView"></div>
  </div>

  <div id="activityDetail" class="activity-detail" style="display:none"></div>

  <div id="eventModal" class="modal" role="dialog" aria-modal="true">
    <div class="modal-content">
      <button type="button" class="close" aria-label="Close">&times;</button>
      <div id="modalBody"></div>
    </div>
  </div>
</div>

<script src="{{ url_for('root.static', filename='colors.js') }}"></script>
<script src="{{ vendor_lib('marked') }}"></script>
<script>
(function() {
  const day = '{{ day }}';

  // Breadcrumb month link
  const monthLink = document.getElementById('breadcrumbMonth');
  if (monthLink) {
    const year = parseInt(day.slice(0, 4), 10);
    const month = parseInt(day.slice(4, 6), 10) - 1;
    const monthName = new Date(year, month, 1).toLocaleString('default', { month: 'long' });
    monthLink.textContent = monthName + ' ' + year;
    monthLink.addEventListener('click', function(e) {
      e.preventDefault();
      if (window.MonthPicker) MonthPicker.show();
    });
  }

  // Breadcrumb current — date without weekday
  const dayNum = parseInt(day.slice(6, 8), 10);
  const mod100 = dayNum % 100;
  const suffix = (mod100 >= 11 && mod100 <= 13) ? 'th'
    : (dayNum % 10 === 1) ? 'st'
    : (dayNum % 10 === 2) ? 'nd'
    : (dayNum % 10 === 3) ? 'rd' : 'th';
  const bcMonth = new Date(parseInt(day.slice(0, 4), 10), parseInt(day.slice(4, 6), 10) - 1, 1)
    .toLocaleString('default', { month: 'long' });
  const bcCurrent = document.querySelector('.breadcrumb-current');
  if (bcCurrent) {
    bcCurrent.textContent = bcMonth + ' ' + dayNum + suffix;
  }

  // Today chip — show relative distance when viewing a non-today date
  const todayChip = document.getElementById('todayChip');
  if (todayChip) {
    const now = new Date();
    const todayStr = String(now.getFullYear()) + String(now.getMonth() + 1).padStart(2, '0') + String(now.getDate()).padStart(2, '0');
    if (day !== todayStr) {
      const dayDate = new Date(parseInt(day.slice(0, 4)), parseInt(day.slice(4, 6)) - 1, parseInt(day.slice(6, 8)));
      const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
      const diffDays = Math.round((dayDate - today) / 86400000);
      const abs = Math.abs(diffDays);
      let label;
      if (abs === 1) {
        label = diffDays < 0 ? 'yesterday' : 'tomorrow';
      } else if (abs <= 30) {
        label = diffDays < 0 ? abs + ' days ago' : 'in ' + abs + ' days';
      } else if (abs <= 90) {
        const weeks = Math.round(abs / 7);
        label = diffDays < 0 ? weeks + ' weeks ago' : 'in ' + weeks + ' weeks';
      } else {
        const months = Math.round(abs / 30);
        label = diffDays < 0 ? months + ' months ago' : 'in ' + months + ' months';
      }
      todayChip.textContent = '\u21a9 today (' + label + ')';
      todayChip.href = '/app/calendar/' + todayStr;
      todayChip.style.display = '';
    }
  }

  let allEvents = [];
  let allActivities = [];
  let events = [];
  let activities = [];
  let modalTrigger = null;
  let currentActivityId = null;
  const outputCache = {};

  // ── Utilities ──

  function filterByFacet(list) {
    const facet = window.selectedFacet;
    if (!facet) return list;
    return list.filter(e => e.facet === facet);
  }

  function escapeHtml(text) {
    const d = document.createElement('div');
    d.textContent = text;
    return d.innerHTML;
  }

  function fmtTime(ts) {
    const d = new Date(ts);
    let h = d.getHours();
    const m = d.getMinutes();
    const suf = h >= 12 ? 'p' : 'a';
    h = h % 12 || 12;
    return m ? `${h}:${String(m).padStart(2, '0')}${suf}` : `${h}${suf}`;
  }

  function fmtDuration(mins) {
    if (mins >= 60) {
      const h = Math.floor(mins / 60);
      const m = mins % 60;
      return m ? `${h}h ${m}m` : `${h}h`;
    }
    return `${mins}m`;
  }

  function fmtLength(start, end) {
    const s = new Date(start);
    const e = end ? new Date(end) : new Date(s.getTime() + 5 * 60000);
    return fmtDuration(Math.max(1, Math.round((e - s) / 60000)));
  }

  function levelLabel(avg) {
    if (avg >= 0.75) return 'high';
    if (avg >= 0.4) return 'medium';
    return 'low';
  }

  function levelColor(avg) {
    if (avg >= 0.75) return '#2ecc71';
    if (avg >= 0.4) return '#f39c12';
    return '#95a5a6';
  }

  function parseCreatedDate(source) {
    const match = source && source.match(/^(\d{8})\//);
    if (match) {
      const d = match[1];
      return `${d.slice(0,4)}-${d.slice(4,6)}-${d.slice(6,8)}`;
    }
    return null;
  }

  function renderSummary() {
    const el = document.getElementById('daySummary');
    const ec = events.length;
    const ac = activities.length;

    if (!ec && !ac) {
      el.textContent = 'no recorded events';
      el.style.display = '';
      return;
    }

    el.style.display = '';

    const parts = [];
    if (ec) parts.push(ec === 1 ? '1 event' : `${ec} events`);
    if (ac) parts.push(ac === 1 ? '1 activity' : `${ac} activities`);
    const counts = parts.join(', ');

    const times = []
      .concat(events, activities)
      .filter(x => x.startTime)
      .map(x => new Date(x.startTime));

    if (!times.length) {
      el.textContent = counts;
      return;
    }

    times.sort((a, b) => a - b);
    const earliest = times[0];
    const latest = times[times.length - 1];
    const eh = earliest.getHours();
    const lh = latest.getHours();

    let timeLabel;
    if (lh < 12) {
      timeLabel = 'morning';
    } else if (eh >= 12 && lh < 17) {
      timeLabel = 'afternoon';
    } else if (eh >= 17) {
      timeLabel = 'evening';
    } else {
      timeLabel = `${fmtTime(earliest)} to ${fmtTime(latest)}`;
    }

    el.textContent = `${counts} — ${timeLabel}`;
  }

  // ── Events rendering ──

  function renderEvents(list) {
    const div = document.getElementById('eventsView');
    if (!list.length && !activities.length) {
      div.innerHTML = '<div class="events-empty"><div class="empty-icon"><svg width="32" height="32" viewBox="0 0 32 32" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="6" width="24" height="22" rx="3"/><line x1="10" y1="3" x2="10" y2="9"/><line x1="22" y1="3" x2="22" y2="9"/><line x1="4" y1="14" x2="28" y2="14"/><line x1="11" y1="19" x2="11" y2="19.01"/><line x1="16" y1="19" x2="16" y2="19.01"/><line x1="21" y1="19" x2="21" y2="19.01"/><line x1="11" y1="24" x2="11" y2="24.01"/><line x1="16" y1="24" x2="16" y2="24.01"/></svg></div><div class="empty-heading">no events or activities</div><div class="empty-desc">nothing recorded for this day</div></div>';
      return;
    }
    if (!list.length) {
      div.innerHTML = '';
      return;
    }

    const timedEvents = list.filter(o => o.startTime);
    const untimedEvents = list.filter(o => !o.startTime);
    let html = '';

    if (untimedEvents.length) {
      const MAX_ALLDAY_VISIBLE = 5;
      html += '<section class="all-day-section" aria-labelledby="all-day-heading"><h2 id="all-day-heading">all day / scheduled</h2><div class="all-day-cards">';
      untimedEvents.forEach((o, i) => {
        const idx = list.indexOf(o);
        const isPlanned = o.occurred === false;
        const cardClass = isPlanned ? 'all-day-card planned' : 'all-day-card';
        const badge = isPlanned ? '<span class="card-badge">planned</span>' : '';
        const title = escapeHtml(o.title || o.summary || o.agent || 'Event');
        if (i === MAX_ALLDAY_VISIBLE && untimedEvents.length > MAX_ALLDAY_VISIBLE) {
          const overflow = untimedEvents.length - MAX_ALLDAY_VISIBLE;
          html += `<button type="button" class="allday-expand" data-expanded="false" aria-expanded="false">+${overflow} more</button>`;
          html += '<div class="allday-overflow" style="display:none;flex-wrap:wrap;gap:0.5em;width:100%">';
        }
        html += `<div class="${cardClass}" data-index="${idx}" tabindex="0" role="button" style="border-color:${o.color || '#6c757d'}">`;
        html += `<span class="card-title">${title}</span>${badge}</div>`;
      });
      if (untimedEvents.length > MAX_ALLDAY_VISIBLE) {
        html += '</div>';
      }
      html += '</div></section>';
    }

    // Collect all timed items (events + activities) for unified timeline range
    const timedActivities = activities.filter(a => a.startTime);
    const allTimed = [...timedEvents, ...timedActivities];

    if (!allTimed.length) {
      div.innerHTML = html;
      return;
    }

    let start = Infinity, end = -Infinity;
    allTimed.forEach(o => {
      const s = new Date(o.startTime);
      const e = o.endTime ? new Date(o.endTime) : new Date(s.getTime() + 3600000);
      const startMinutes = s.getHours() * 60 + s.getMinutes();
      if (startMinutes === 0) return;
      start = Math.min(start, startMinutes);
      end = Math.max(end, e.getHours() * 60 + e.getMinutes());
    });

    let startHour = Math.max(Math.floor(start / 60) - 1, 0);
    let endHour = Math.min(Math.ceil(end / 60) + 1, 24);
    const pxPerHour = 66.7;
    const totalMinutes = (endHour - startHour) * 60;

    html += `<section class='day-view' aria-label='timeline' style='height:${(endHour - startHour) * pxPerHour}px'>`;

    for (let h = startHour; h <= endHour; h++) {
      const label = h === 0 ? '12am' : h < 12 ? h + 'am' : h === 12 ? '12pm' : (h - 12) + 'pm';
      html += `<div class='hour-line' style='top:${((h - startHour) / (endHour - startHour)) * 100}%'><span>${label}</span></div>`;
    }

    // Render activity blocks (behind events, full width)
    timedActivities.forEach(a => {
      const s = new Date(a.startTime);
      const e = a.endTime ? new Date(a.endTime) : new Date(s.getTime() + 5 * 60000);
      let sMin = s.getHours() * 60 + s.getMinutes();
      let eMin = e.getHours() * 60 + e.getMinutes();
      sMin = Math.max(sMin, startHour * 60);
      eMin = Math.min(eMin, endHour * 60);
      if (eMin <= sMin) return;

      const top = ((sMin - startHour * 60) / totalMinutes) * 100;
      const height = Math.max((eMin - sMin) / totalMinutes * 100, 0.4);
      const color = levelColor(a.level_avg);
      html += `<a class='occ occ-activity' data-activity-id='${escapeHtml(a.id)}' tabindex='0' role='button' style='top:${top}%;height:${height}%;left:0;width:100%;border-color:${color};background:${color}' title='${escapeHtml(a.icon + " " + a.name)}'>${escapeHtml(a.icon)} ${escapeHtml(a.name)}</a>`;
    });

    // Process event blocks for column layout
    const processedEvents = [];
    const agents = [];

    timedEvents.forEach(o => {
      const idx = list.indexOf(o);
      const startTime = new Date(o.startTime);
      const endTime = o.endTime ? new Date(o.endTime) : new Date(startTime.getTime() + 5 * 60000);
      let s = startTime.getHours() * 60 + startTime.getMinutes();
      let e = endTime.getHours() * 60 + endTime.getMinutes();
      s = Math.max(s, startHour * 60);
      e = Math.min(e, endHour * 60);
      if (e <= s) return;

      const agent = o.agent || 'other';
      if (!agents.includes(agent)) agents.push(agent);

      processedEvents.push({
        startMinutes: s, endMinutes: e, agent: agent,
        title: escapeHtml(o.title || o.summary || agent),
        color: o.color || '#6c757d', index: idx,
        isPlanned: o.occurred === false
      });
    });

    // Build color legend
    const legendPairs = [];
    const seenAgents = new Set();
    processedEvents.forEach(ev => {
      if (!seenAgents.has(ev.agent)) {
        seenAgents.add(ev.agent);
        legendPairs.push({ label: ev.agent, color: ev.color });
      }
    });
    if (timedActivities.length > 0) {
      legendPairs.push({ label: 'activity', color: '#6c757d' });
    }
    let legendHtml = '';
    if (legendPairs.length > 0) {
      legendHtml += `<div class="timeline-legend" role="list" aria-label="timeline color legend">`;
      legendPairs.forEach(p => {
        legendHtml += `<span class="legend-item" role="listitem"><span class="legend-dot" style="background:${p.color}" aria-hidden="true"></span>${escapeHtml(p.label)}</span>`;
      });
      legendHtml += `</div>`;
    }

    const eventsByAgent = {};
    agents.forEach(agent => {
      eventsByAgent[agent] = processedEvents.filter(e => e.agent === agent);
      eventsByAgent[agent].sort((a, b) => a.startMinutes - b.startMinutes);
    });

    const agentColumnCounts = {};
    agents.forEach(agent => {
      const agentEvents = eventsByAgent[agent];
      const agentColumns = [];
      agentEvents.forEach(event => {
        let columnIndex = 0;
        while (columnIndex < agentColumns.length &&
               agentColumns[columnIndex].some(existing =>
                 event.startMinutes < existing.endMinutes &&
                 event.endMinutes > existing.startMinutes)) {
          columnIndex++;
        }
        if (columnIndex === agentColumns.length) agentColumns.push([]);
        agentColumns[columnIndex].push(event);
        event.slugColumn = columnIndex;
      });
      agentColumnCounts[agent] = agentColumns.length;
    });

    let globalColumnOffset = 0;
    const agentColumnOffsets = {};
    agents.forEach(agent => {
      agentColumnOffsets[agent] = globalColumnOffset;
      globalColumnOffset += agentColumnCounts[agent];
    });

    const totalColumns = globalColumnOffset;
    const columnWidth = totalColumns > 0 ? 100 / totalColumns : 100;

    processedEvents.forEach(event => {
      event.column = agentColumnOffsets[event.agent] + event.slugColumn;
    });

    processedEvents.forEach(event => {
      const top = ((event.startMinutes - startHour * 60) / totalMinutes) * 100;
      const height = Math.max((event.endMinutes - event.startMinutes) / totalMinutes * 100, 0.4);
      const left = event.column * columnWidth;
      const width = columnWidth * 0.95;
      const plannedClass = event.isPlanned ? ' occ-planned' : '';
      const bgStyle = event.isPlanned ? `border-color:${event.color}` : `background:${event.color}`;
      const titlePrefix = event.isPlanned ? '▸ ' : '';
      html += `<a class='occ${plannedClass}' data-index='${event.index}' tabindex='0' role='button' style='top:${top}%;height:${height}%;left:${left}%;width:${width}%;${bgStyle}' title='${titlePrefix}${event.title}'></a>`;
    });

    html += '</section>';
    if (legendHtml) html = html.replace("<section class='day-view'", legendHtml + "<section class='day-view'");
    div.innerHTML = html;
  }

  // ── Activities cards ──

  function renderActivities(list) {
    const div = document.getElementById('activitiesView');
    if (!list.length) {
      div.innerHTML = '';
      return;
    }

    let html = '<section class="activities-section" aria-labelledby="activities-heading"><h2 id="activities-heading">activities</h2><div class="activity-cards">';
    list.forEach(a => {
      const dur = fmtDuration(a.duration_minutes);
      const lvl = levelLabel(a.level_avg);
      const timeStr = a.startTime ? fmtTime(a.startTime) : '';
      const color = levelColor(a.level_avg);
      html += `<div class="activity-card" data-activity-id="${escapeHtml(a.id)}" tabindex="0" role="button" style="border-left-color:${color}">`;
      html += `<span class="act-icon">${escapeHtml(a.icon || '')}</span>`;
      html += `<div class="act-body">`;
      html += `<div class="act-name">${escapeHtml(a.name)}</div>`;
      if (a.description) html += `<div class="act-desc">${escapeHtml(a.description)}</div>`;
      html += `</div>`;
      html += `<div class="act-meta">`;
      if (timeStr) html += `<div>${timeStr}</div>`;
      html += `<div class="act-duration">${dur}<span class="act-level level-${lvl}" aria-hidden="true"></span><span class="sr-only">${lvl} engagement</span></div>`;
      if (a.outputs.length) html += `<div>${a.outputs.length} output${a.outputs.length > 1 ? 's' : ''}</div>`;
      html += `</div></div>`;
    });
    html += '</div></section>';
    div.innerHTML = html;
  }

  // ── Event modal ──

  function openModal(idx) {
    const occ = events[idx];
    if (!occ) return;
    modalTrigger = document.activeElement;
    const body = document.getElementById('modalBody');
    const isPlanned = occ.occurred === false;
    const agent = occ.agent ? occ.agent.charAt(0).toUpperCase() + occ.agent.slice(1) : '';
    const titleText = `${agent ? agent + ': ' : ''}${occ.title || ''}`.trim();
    const subtitle = occ.subject || occ.summary || '';

    let html = '';
    if (titleText) html += `<h3>${escapeHtml(titleText)}</h3>`;
    if (subtitle) html += `<h4>${escapeHtml(subtitle)}</h4>`;
    if (occ.startTime) {
      const when = fmtTime(occ.startTime);
      const len = fmtLength(occ.startTime, occ.endTime);
      const timeLabel = isPlanned ? 'planned' : 'started';
      html += `<div class="occ-field"><strong>${timeLabel}</strong> ${when} - ${len}</div>`;
    }
    if (occ.facet) {
      html += `<div class="occ-field"><strong>facet</strong> ${escapeHtml(occ.facet)}</div>`;
    }
    if (Array.isArray(occ.participants) && occ.participants.length > 0) {
      const participantsLabel = isPlanned ? 'expected' : 'participants';
      html += `<div class="occ-field"><strong>${participantsLabel}</strong> ${escapeHtml(occ.participants.join(', '))}</div>`;
    }
    if (isPlanned) {
      const createdOn = parseCreatedDate(occ.source);
      if (createdOn) {
        html += `<div class="occ-field"><strong>created</strong> ${createdOn}</div>`;
      }
    }
    if (occ.details) {
      const det = typeof occ.details === 'string' ? occ.details : JSON.stringify(occ.details, null, 2);
      html += `<div class="occ-desc">${escapeHtml(det)}</div>`;
    }
    body.innerHTML = html;
    document.getElementById('eventModal').style.display = 'block';
    const modal = document.getElementById('eventModal');
    const eventTitle = occ.title || occ.summary || 'Event details';
    modal.setAttribute('aria-label', eventTitle);
    modal.querySelector('.close').focus();
    document.addEventListener('keydown', handleModalKeys);
  }

  function closeModal() {
    const modal = document.getElementById('eventModal');
    modal.style.display = 'none';
    document.removeEventListener('keydown', handleModalKeys);
    if (modalTrigger && document.contains(modalTrigger)) {
      modalTrigger.focus();
    }
    modalTrigger = null;
  }

  function handleModalKeys(e) {
    if (e.key === 'Escape') {
      closeModal();
      return;
    }
    if (e.key === 'Tab') {
      const modal = document.getElementById('eventModal');
      const focusable = [...modal.querySelectorAll('button:not([disabled]), [tabindex="0"]')];
      if (focusable.length === 0) return;
      const currentIndex = focusable.indexOf(document.activeElement);
      if (e.shiftKey) {
        e.preventDefault();
        focusable[currentIndex <= 0 ? focusable.length - 1 : currentIndex - 1].focus();
      } else {
        e.preventDefault();
        focusable[currentIndex >= focusable.length - 1 ? 0 : currentIndex + 1].focus();
      }
    }
  }

  // ── Activity detail view ──

  function showActivityDetail(activityId) {
    const a = activities.find(x => x.id === activityId);
    if (!a) {
      // Try allActivities (might be filtered out by facet)
      const fromAll = allActivities.find(x => x.id === activityId);
      if (!fromAll) return;
      // Show it even if not in current facet filter
      renderActivityDetail(fromAll);
      return;
    }
    renderActivityDetail(a);
  }

  function renderActivityDetail(a) {
    currentActivityId = a.id;
    document.getElementById('dayView').style.display = 'none';
    const detail = document.getElementById('activityDetail');
    detail.style.display = 'block';

    const lvl = levelLabel(a.level_avg);
    const timeRange = a.startTime
      ? `${fmtTime(a.startTime)}${a.endTime ? ' – ' + fmtTime(a.endTime) : ''}`
      : '';

    let html = '';
    html += `<button type="button" class="activity-detail-back">← Back to day</button>`;
    html += `<div class="activity-detail-header">`;
    html += `<h2>${escapeHtml(a.icon || '')} ${escapeHtml(a.name)}</h2>`;
    html += `<div class="ad-subtitle">${escapeHtml(a.facet)}</div>`;
    html += `</div>`;

    // Build tabs
    html += `<div class="ad-tabs">`;
    html += `<button type="button" class="ad-tab active" data-tab="summary">Summary</button>`;
    a.outputs.forEach((out, i) => {
      const label = out.filename.replace(/\.\w+$/, '').replace(/[_-]/g, ' ');
      html += `<button type="button" class="ad-tab" data-tab="output-${i}">${escapeHtml(label)}</button>`;
    });
    html += `</div>`;

    // Summary pane
    html += `<div class="ad-tab-pane active" id="pane-summary">`;
    html += `<dl class="ad-fields">`;
    if (timeRange) {
      html += `<dt>Time</dt><dd>${timeRange}</dd>`;
    }
    html += `<dt>Duration</dt><dd>${fmtDuration(a.duration_minutes)}</dd>`;
    html += `<dt>Engagement</dt><dd><span class="act-level level-${lvl}" aria-hidden="true"></span> ${lvl}</dd>`;
    html += `<dt>Segments</dt><dd>${a.segments.length}</dd>`;
    if (a.active_entities && a.active_entities.length) {
      html += `<dt>Entities</dt><dd><div class="ad-entities">`;
      a.active_entities.forEach(e => {
        html += `<span class="ad-entity">${escapeHtml(e)}</span>`;
      });
      html += `</div></dd>`;
    }
    html += `</dl>`;
    if (a.description) {
      html += `<div class="ad-description">${escapeHtml(a.description)}</div>`;
    }
    html += `</div>`;

    // Output panes (lazy loaded)
    a.outputs.forEach((out, i) => {
      html += `<div class="ad-tab-pane" id="pane-output-${i}">`;
      html += `<div class="ad-output-loading">Loading...</div>`;
      html += `</div>`;
    });

    detail.innerHTML = html;
    detail.querySelector('.activity-detail-back').addEventListener('click', () => {
      location.hash = '';
    });

    // Tab click handler
    detail.querySelector('.ad-tabs').addEventListener('click', function(e) {
      const tab = e.target.closest('.ad-tab');
      if (!tab) return;
      const tabId = tab.dataset.tab;

      detail.querySelectorAll('.ad-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tabId));
      detail.querySelectorAll('.ad-tab-pane').forEach(p => {
        p.classList.toggle('active', p.id === 'pane-' + tabId);
      });

      // Lazy-load output content
      const match = tabId.match(/^output-(\d+)$/);
      if (match) {
        loadOutputTab(a, parseInt(match[1]));
      }
    });
  }

  async function loadOutputTab(activity, idx) {
    const out = activity.outputs[idx];
    if (!out) return;

    const pane = document.getElementById(`pane-output-${idx}`);
    const cacheKey = out.path;
    if (outputCache[cacheKey]) {
      pane.innerHTML = outputCache[cacheKey];
      return;
    }

    const encodedPath = out.path.split('/').map(p => encodeURIComponent(p)).join('/');
    try {
      const resp = await fetch(`/app/calendar/api/activity_output/${encodedPath}`);
      const data = await resp.json();
      if (data.error) {
        pane.innerHTML = `<div class="ad-output-loading">Error: ${escapeHtml(data.error)}</div>`;
        return;
      }

      let rendered;
      if (data.format === 'md') {
        rendered = `<div class="rendered-markdown">${marked.parse(data.content, { breaks: true, gfm: true })}</div>`;
      } else if (data.format === 'json') {
        let pretty;
        try { pretty = JSON.stringify(JSON.parse(data.content), null, 2); } catch (e) { pretty = data.content; }
        rendered = `<pre>${escapeHtml(pretty)}</pre>`;
      } else {
        rendered = `<pre>${escapeHtml(data.content)}</pre>`;
      }

      pane.innerHTML = rendered;
      outputCache[cacheKey] = rendered;
    } catch (err) {
      pane.innerHTML = '<div class="ad-output-loading">Failed to load output.</div>';
    }
  }

  function hideActivityDetail() {
    currentActivityId = null;
    document.getElementById('activityDetail').style.display = 'none';
    document.getElementById('dayView').style.display = 'block';
  }

  // ── Data loading ──

  function applyFilters() {
    events = filterByFacet(allEvents);
    activities = filterByFacet(allActivities);

    renderSummary();

    if (currentActivityId) {
      // Stay on detail if it still exists
      const hash = location.hash.slice(1);
      if (hash.startsWith('activity/')) {
        showActivityDetail(hash.slice(9));
        return;
      }
    }

    renderEvents(events);
    renderActivities(activities);
  }

  function loadData() {
    Promise.all([
      fetch(`/app/calendar/api/day/${day}/events`).then(r => r.json()),
      fetch(`/app/calendar/api/day/${day}/activities`).then(r => r.json()),
    ]).then(([evts, acts]) => {
      allEvents = evts || [];
      allActivities = acts || [];
      applyFilters();

      // Check for initial hash
      handleHashChange();

      // Click handlers
      document.getElementById('eventsView').onclick = e => {
        const expandBtn = e.target.closest('.allday-expand');
        if (expandBtn) {
          const overflow = expandBtn.nextElementSibling;
          const isExpanded = expandBtn.dataset.expanded === 'true';
          if (isExpanded) {
            overflow.style.display = 'none';
            expandBtn.dataset.expanded = 'false';
            expandBtn.setAttribute('aria-expanded', 'false');
            expandBtn.textContent = '+' + overflow.children.length + ' more';
          } else {
            overflow.style.display = 'flex';
            expandBtn.dataset.expanded = 'true';
            expandBtn.setAttribute('aria-expanded', 'true');
            expandBtn.textContent = 'show fewer';
          }
          return;
        }
        const actEl = e.target.closest('.occ-activity');
        if (actEl) {
          e.preventDefault();
          location.hash = 'activity/' + actEl.dataset.activityId;
          return;
        }
        const evtEl = e.target.closest('.occ') || e.target.closest('.all-day-card');
        if (evtEl && evtEl.dataset.index !== undefined) {
          e.preventDefault();
          openModal(parseInt(evtEl.dataset.index));
        }
      };

      document.getElementById('activitiesView').onclick = e => {
        const card = e.target.closest('.activity-card');
        if (card) {
          location.hash = 'activity/' + card.dataset.activityId;
        }
      };

      // Keyboard activation
      document.getElementById('eventsView').onkeydown = e => {
        if (e.key === 'Enter' || e.key === ' ') {
          const el = e.target.closest('.occ-activity, .occ, .all-day-card');
          if (el) {
            e.preventDefault();
            el.click();
          }
        }
      };
      document.getElementById('activitiesView').onkeydown = e => {
        if (e.key === 'Enter' || e.key === ' ') {
          const el = e.target.closest('.activity-card');
          if (el) {
            e.preventDefault();
            el.click();
          }
        }
      };
    }).catch(() => {
      document.getElementById('eventsView').innerHTML = '<div class="events-empty">Failed to load data.</div>';
    });
  }

  // ── Hash routing ──

  function handleHashChange() {
    const hash = location.hash.startsWith('#') ? location.hash.slice(1) : location.hash;
    if (hash.startsWith('activity/')) {
      const id = decodeURIComponent(hash.slice(9));
      if (id) {
        showActivityDetail(id);
        return;
      }
    }
    hideActivityDetail();
  }

  window.addEventListener('hashchange', handleHashChange);

  // ── Init ──

  window.addEventListener('facet.switch', () => {
    applyFilters();
  });

  document.querySelector('#eventModal .close').onclick = () => {
    closeModal();
  };
  window.onclick = e => {
    const modal = document.getElementById('eventModal');
    if (e.target === modal) closeModal();
  };

  loadData();
})();
</script>
