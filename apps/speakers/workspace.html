{# Speaker attribution review workspace #}

<style>
/* Speakers app styles - all classes prefixed with .spk- */

.spk-wrap {
  max-width: 1200px;
  margin: 0 auto;
  padding: 16px 24px;
}

.spk-layout {
  display: grid;
  grid-template-columns: 280px 1fr;
  gap: 24px;
  min-height: 400px;
}

.spk-segments {
  background: #fff;
  border-radius: 12px;
  border: 1px solid #e5e7eb;
  overflow: hidden;
}

.spk-segments-header {
  padding: 12px 16px;
  border-bottom: 1px solid #e5e7eb;
  font-weight: 600;
  font-size: 14px;
  color: #374151;
}

.spk-segments-list {
  max-height: 500px;
  overflow-y: auto;
}

.spk-segment {
  padding: 12px 16px;
  border-bottom: 1px solid #f3f4f6;
  cursor: pointer;
  transition: background 0.15s;
}

.spk-segment:hover {
  background: #f9fafb;
}

.spk-segment.active {
  background: #eff6ff;
  border-left: 3px solid #3b82f6;
}

.spk-segment-time {
  font-weight: 500;
  font-size: 14px;
  color: #1f2937;
}

.spk-segment-meta {
  font-size: 12px;
  color: #6b7280;
  margin-top: 4px;
}

.spk-segment-sources {
  display: flex;
  gap: 6px;
  margin-top: 6px;
  flex-wrap: wrap;
}

.spk-source-badge {
  display: inline-block;
  padding: 2px 8px;
  background: #e5e7eb;
  border-radius: 12px;
  font-size: 11px;
  color: #4b5563;
}

.spk-empty {
  padding: 24px;
  text-align: center;
  color: #9ca3af;
  font-size: 14px;
}

.spk-detail {
  background: #fff;
  border-radius: 12px;
  border: 1px solid #e5e7eb;
  padding: 20px;
}

.spk-detail-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}

.spk-detail-title {
  font-size: 18px;
  font-weight: 600;
  color: #1f2937;
}

.spk-source-tabs {
  display: flex;
  gap: 8px;
  margin-bottom: 16px;
  border-bottom: 1px solid #e5e7eb;
  padding-bottom: 12px;
}

.spk-source-tab {
  padding: 6px 14px;
  border: 1px solid #d1d5db;
  border-radius: 6px;
  font-size: 13px;
  cursor: pointer;
  background: #fff;
  color: #374151;
  transition: all 0.15s;
}

.spk-source-tab:hover {
  background: #f9fafb;
}

.spk-source-tab.active {
  background: #3b82f6;
  border-color: #3b82f6;
  color: #fff;
}

.spk-audio-player {
  margin-bottom: 20px;
  padding: 12px;
  background: #f9fafb;
  border-radius: 8px;
}

.spk-audio-player audio {
  width: 100%;
}

.spk-player-controls {
  display: flex;
  align-items: center;
  gap: 8px;
}

.spk-player-controls audio {
  flex: 1;
  min-width: 0;
}

.spk-skip-back,
.spk-speed-toggle {
  padding: 4px 8px;
  background: #e5e7eb;
  border: none;
  border-radius: 4px;
  font-size: 12px;
  cursor: pointer;
  white-space: nowrap;
  color: #374151;
  transition: background 0.15s;
}

.spk-skip-back:hover,
.spk-speed-toggle:hover {
  background: #d1d5db;
}

.spk-sentences {
  margin-top: 16px;
}

.spk-sentences-title {
  display: flex;
  align-items: center;
  gap: 12px;
  font-size: 14px;
  font-weight: 600;
  color: #374151;
  margin-bottom: 12px;
}

.spk-filter-bar {
  display: flex;
  gap: 8px;
  margin-bottom: 12px;
  flex-wrap: wrap;
}

.spk-seeding-prompt {
  padding: 12px;
  margin-bottom: 12px;
  background: var(--bg-info, #e8f4fd);
  border: 1px solid var(--border-info, #b3d9f2);
  border-radius: 6px;
  font-size: 13px;
  line-height: 1.5;
  color: var(--text-primary, #333);
}

.spk-filter-btn {
  padding: 6px 10px;
  border: 1px solid #d1d5db;
  border-radius: 999px;
  background: #fff;
  color: #4b5563;
  font-size: 12px;
  cursor: pointer;
}

.spk-filter-btn.active {
  background: #1f2937;
  border-color: #1f2937;
  color: #fff;
}

.spk-sentence {
  display: grid;
  grid-template-columns: 60px 1fr auto;
  gap: 12px;
  padding: 12px;
  border-bottom: 1px solid #f3f4f6;
  align-items: start;
}

.spk-sentence:hover {
  background: #fafafa;
}

.spk-sentence.spk-playing {
  background: #eff6ff;
  border-left: 3px solid #3b82f6;
  margin-left: -3px;
}

.spk-sentence-time {
  font-family: monospace;
  font-size: 12px;
  color: #6b7280;
  padding-top: 2px;
}

.spk-sentence-text {
  font-size: 14px;
  color: #1f2937;
  line-height: 1.5;
}

.spk-sentence-speaker {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-top: 6px;
  font-size: 12px;
  color: #4b5563;
  flex-wrap: wrap;
}

.spk-confidence-dot {
  width: 10px;
  height: 10px;
  border-radius: 999px;
  display: inline-block;
  background: #d1d5db;
}

.spk-confidence-high {
  background: #16a34a;
}

.spk-confidence-medium {
  background: #eab308;
}

.spk-correction-original {
  text-decoration: line-through;
  color: #9ca3af;
}

.spk-review-state {
  color: #9ca3af;
  font-style: italic;
}

.spk-sentence-actions {
  display: flex;
  gap: 6px;
  align-items: center;
  flex-wrap: wrap;
}

.spk-btn {
  padding: 4px 10px;
  border: none;
  border-radius: 4px;
  font-size: 12px;
  cursor: pointer;
  transition: background 0.15s;
}

.spk-btn-icon {
  padding: 4px 8px;
  background: #f3f4f6;
  color: #374151;
}

.spk-btn-icon:hover {
  background: #e5e7eb;
}

.spk-btn-primary {
  background: #3b82f6;
  color: #fff;
}

.spk-btn-primary:hover {
  background: #2563eb;
}

.spk-btn-secondary {
  background: #f3f4f6;
  color: #374151;
}

.spk-btn-secondary:hover {
  background: #e5e7eb;
}

.spk-select-small {
  padding: 4px 8px;
  border: 1px solid #d1d5db;
  border-radius: 4px;
  font-size: 12px;
  background: #fff;
  min-width: 150px;
}

.spk-status {
  padding: 6px 10px;
  border-radius: 4px;
  font-size: 12px;
  margin-top: 8px;
}

.spk-status-success {
  background: #dcfce7;
  color: #166534;
}

.spk-status-error {
  background: #fee2e2;
  color: #991b1b;
}

.spk-speaker-count {
  display: inline-block;
  padding: 2px 8px;
  background: #dbeafe;
  border-radius: 12px;
  font-size: 11px;
  color: #1d4ed8;
  margin-left: 6px;
}

.spk-review-badge {
  display: inline-block;
  margin-top: 6px;
  padding: 2px 8px;
  border-radius: 999px;
  background: #fef3c7;
  color: #92400e;
  font-size: 11px;
}

.spk-speakers {
  margin-bottom: 20px;
}

.spk-speakers-title {
  font-size: 14px;
  font-weight: 600;
  color: #374151;
  margin-bottom: 10px;
}

.spk-speaker-cards {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

.spk-speaker-card {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 12px;
  border-radius: 8px;
  font-size: 13px;
}

.spk-speaker-matched {
  background: #dcfce7;
  border: 1px solid #86efac;
  color: #166534;
}

.spk-speaker-unmatched {
  background: #f3f4f6;
  border: 1px solid #d1d5db;
  color: #6b7280;
}

.spk-speaker-entity {
  font-weight: 500;
}

.spk-speaker-detected {
  font-size: 11px;
  opacity: 0.8;
}

.spk-owner-banner {
  display: none;
  margin-bottom: 20px;
  padding: 16px 18px;
  border-radius: 12px;
  border: 1px solid #bfdbfe;
  background: linear-gradient(135deg, #eff6ff 0%, #e0f2fe 100%);
}

.spk-owner-panel {
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.spk-owner-title {
  font-size: 18px;
  font-weight: 600;
  color: #1e3a8a;
}

.spk-owner-copy {
  font-size: 14px;
  color: #1f2937;
  line-height: 1.5;
}

.spk-owner-samples {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 12px;
}

.spk-owner-sample {
  padding: 12px;
  border-radius: 10px;
  border: 1px solid #dbeafe;
  background: rgba(255, 255, 255, 0.8);
}

.spk-owner-sample-title {
  font-size: 12px;
  font-weight: 600;
  color: #1d4ed8;
  margin-bottom: 8px;
}

.spk-owner-sample-meta {
  font-size: 12px;
  color: #475569;
  margin-bottom: 8px;
}

.spk-owner-sample audio {
  width: 100%;
}

.spk-owner-actions {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}

.spk-owner-btn {
  padding: 8px 14px;
  border-radius: 8px;
  border: 1px solid transparent;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
}

.spk-owner-btn:disabled {
  opacity: 0.65;
  cursor: wait;
}

.spk-owner-btn-confirm {
  background: #16a34a;
  color: #fff;
}

.spk-owner-btn-reject {
  background: #fff;
  border-color: #93c5fd;
  color: #1d4ed8;
}

.spk-discovery-banner {
  display: none;
  margin-bottom: 20px;
  padding: 16px 18px;
  border-radius: 12px;
  border: 1px solid #bbf7d0;
  background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 100%);
}

.spk-discovery-panel {
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.spk-discovery-title {
  font-size: 18px;
  font-weight: 600;
  color: #14532d;
}

.spk-discovery-copy {
  font-size: 14px;
  color: #1f2937;
  line-height: 1.5;
}

.spk-discovery-clusters {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 14px;
}

.spk-discovery-cluster {
  padding: 14px;
  border-radius: 10px;
  border: 1px solid #bbf7d0;
  background: rgba(255, 255, 255, 0.8);
}

.spk-discovery-cluster-title {
  font-size: 13px;
  font-weight: 600;
  color: #166534;
  margin-bottom: 10px;
}

.spk-discovery-sample {
  margin-bottom: 8px;
}

.spk-discovery-sample-text {
  font-size: 12px;
  color: #475569;
  margin-bottom: 4px;
  font-style: italic;
}

.spk-discovery-sample audio {
  width: 100%;
}

.spk-discovery-form {
  display: flex;
  gap: 8px;
  margin-top: 10px;
}

.spk-discovery-input {
  flex: 1;
  padding: 6px 10px;
  border-radius: 6px;
  border: 1px solid #d1d5db;
  font-size: 13px;
}

.spk-discovery-btn {
  padding: 6px 14px;
  border-radius: 6px;
  border: 1px solid transparent;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  background: #16a34a;
  color: #fff;
}

.spk-discovery-btn:disabled {
  opacity: 0.65;
  cursor: wait;
}

.spk-discovery-status {
  font-size: 12px;
  color: #166534;
  margin-top: 6px;
}
</style>

<div class="spk-wrap">
  <div id="spkOwnerBanner" class="spk-owner-banner"></div>
  <div id="spkDiscoveryBanner" class="spk-discovery-banner"></div>
  <div class="spk-layout">
    <div class="spk-segments">
      <div class="spk-segments-header">
        Segments
      </div>
      <div class="spk-segments-list" id="spkSegmentList">
        <div class="spk-empty">Loading...</div>
      </div>
    </div>

    <div class="spk-detail" id="spkDetail">
      <div class="spk-empty">
        Select a segment to review
      </div>
    </div>
  </div>
</div>

<script>
(() => {
  const day = '{{ day }}';
  const segmentList = document.getElementById('spkSegmentList');
  const detailPanel = document.getElementById('spkDetail');
  const ownerBanner = document.getElementById('spkOwnerBanner');
  const discoveryBanner = document.getElementById('spkDiscoveryBanner');

  let segments = [];
  let selectedSegment = null;
  let selectedSource = null;
  let audioPlayer = null;
  let currentSentences = [];
  let reviewEntities = [];
  let hasLabels = false;
  let reviewSummary = null;
  let currentFilter = 'all';
  let playingSentenceId = null;
  let ownerDetectionInFlight = false;

  checkOwnerStatus();
  loadSegments();

  window.addEventListener('hashchange', () => {
    const hash = window.location.hash.slice(1);
    if (hash) selectSegmentByKey(hash);
  });

  discoveryBanner.addEventListener('click', e => {
    const btn = e.target.closest('.spk-discovery-btn');
    if (!btn) return;

    const card = btn.closest('.spk-discovery-cluster');
    if (!card) return;

    const clusterId = parseInt(card.dataset.clusterId, 10);
    const input = card.querySelector('.spk-discovery-input');
    const status = card.querySelector('.spk-discovery-status');
    const name = input.value.trim();

    if (!name) {
      status.textContent = 'Please enter a name.';
      return;
    }

    btn.disabled = true;
    input.disabled = true;
    status.textContent = 'Identifying...';

    fetch('/app/speakers/api/discovery/identify', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ cluster_id: clusterId, name: name }),
    })
      .then(r => r.json())
      .then(data => {
        if (data.error) {
          status.textContent = data.error;
          btn.disabled = false;
          input.disabled = false;
          return;
        }

        status.textContent = `Identified as ${data.entity_name} (${data.voiceprints_saved} voiceprints, ${data.segments_updated} segments updated)`;
        card.style.opacity = '0.5';
        loadSegments();
        if (selectedSegment && selectedSource) {
          loadReview(selectedSegment, selectedSource);
        }
        setTimeout(() => {
          card.remove();
          if (!discoveryBanner.querySelector('.spk-discovery-cluster')) {
            hideDiscovery();
          }
        }, 3000);
      })
      .catch(() => {
        status.textContent = 'Failed to identify. Try again.';
        btn.disabled = false;
        input.disabled = false;
      });
  });

  function checkOwnerStatus() {
    fetch('/app/speakers/api/owner/status')
      .then(r => r.json())
      .then(data => {
        if (data.status === 'needs_detection') {
          hideDiscovery();
          renderOwnerBanner('Analyzing voice patterns...');
          if (!ownerDetectionInFlight) {
            ownerDetectionInFlight = true;
            fetch('/app/speakers/api/owner/detect', { method: 'POST' })
              .then(r => r.json())
              .then(() => {
                ownerDetectionInFlight = false;
                checkOwnerStatus();
              })
              .catch(() => {
                ownerDetectionInFlight = false;
                hideOwnerBanner();
              });
          }
          return;
        }

        ownerDetectionInFlight = false;
        if (data.status === 'no_cluster') {
          hideDiscovery();
          hideOwnerBanner();
          return;
        }
        if (data.status === 'candidate') {
          hideDiscovery();
          renderOwnerCandidate(data);
          return;
        }

        hideOwnerBanner();
        checkDiscovery();
      })
      .catch(() => {
        hideDiscovery();
        hideOwnerBanner();
      });
  }

  function renderOwnerBanner(message) {
    ownerBanner.style.display = 'block';
    ownerBanner.innerHTML = `
      <div class="spk-owner-panel">
        <div class="spk-owner-title">Owner voiceprint</div>
        <div class="spk-owner-copy">${escapeHtml(message)}</div>
      </div>
    `;
  }

  function hideOwnerBanner() {
    ownerBanner.style.display = 'none';
    ownerBanner.innerHTML = '';
  }

  function renderOwnerCandidate(data) {
    const samples = data.samples || [];
    ownerBanner.style.display = 'block';
    ownerBanner.innerHTML = `
      <div class="spk-owner-panel">
        <div class="spk-owner-title">Is this your voice?</div>
        <div class="spk-owner-copy">
          We found a likely owner voice pattern from ${escapeHtml(data.cluster_size || 0)} voice samples. Review a few examples before confirming.
        </div>
        <div class="spk-owner-samples">
          ${samples.map((sample, index) => `
            <div class="spk-owner-sample">
              <div class="spk-owner-sample-title">Sample ${index + 1}</div>
              <div class="spk-owner-sample-meta">
                ${escapeHtml(sample.day)} · ${escapeHtml(sample.stream)} · ${escapeHtml(sample.segment_key)}
              </div>
              <audio controls preload="metadata" src="${sample.audio_url}"></audio>
            </div>
          `).join('')}
        </div>
        <div class="spk-owner-actions">
          <button class="spk-owner-btn spk-owner-btn-confirm" id="spkOwnerConfirm">Yes, that's me</button>
          <button class="spk-owner-btn spk-owner-btn-reject" id="spkOwnerReject">No, try again</button>
        </div>
      </div>
    `;

    document.getElementById('spkOwnerConfirm')?.addEventListener('click', () => {
      submitOwnerChoice('/app/speakers/api/owner/confirm');
    });
    document.getElementById('spkOwnerReject')?.addEventListener('click', () => {
      submitOwnerChoice('/app/speakers/api/owner/reject');
    });
  }

  function submitOwnerChoice(path) {
    ownerBanner.querySelectorAll('button').forEach(btn => { btn.disabled = true; });
    fetch(path, { method: 'POST' })
      .then(r => r.json())
      .then(() => {
        checkOwnerStatus();
      })
      .catch(() => {
        ownerBanner.querySelectorAll('button').forEach(btn => { btn.disabled = false; });
      });
  }

  function checkDiscovery() {
    fetch('/app/speakers/api/discovery/scan', { method: 'POST' })
      .then(r => r.json())
      .then(data => {
        if (data.clusters && data.clusters.length > 0) {
          renderDiscovery(data.clusters);
        } else {
          hideDiscovery();
        }
      })
      .catch(() => {
        hideDiscovery();
      });
  }

  function renderDiscovery(clusters) {
    discoveryBanner.style.display = 'block';
    discoveryBanner.innerHTML = `
      <div class="spk-discovery-panel">
        <div class="spk-discovery-title">New speakers found</div>
        <div class="spk-discovery-copy">
          We found ${clusters.length} recurring voice pattern${clusters.length > 1 ? 's' : ''} that ${clusters.length > 1 ? "don't" : "doesn't"} match any known speaker. Listen to samples and name them.
        </div>
        <div class="spk-discovery-clusters">
          ${clusters.map(cluster => `
            <div class="spk-discovery-cluster" data-cluster-id="${cluster.cluster_id}">
              <div class="spk-discovery-cluster-title">
                Unknown speaker &middot; ${cluster.size} samples &middot; ${cluster.segment_count} segments
              </div>
              ${cluster.samples.map(sample => `
                <div class="spk-discovery-sample">
                  <div class="spk-discovery-sample-text">${escapeHtml(sample.text || '(no transcript)')}</div>
                  <audio controls preload="metadata" src="${sample.audio_url}"></audio>
                </div>
              `).join('')}
              <div class="spk-discovery-form">
                <input type="text" class="spk-discovery-input" placeholder="Enter speaker name..." />
                <button class="spk-discovery-btn">Name</button>
              </div>
              <div class="spk-discovery-status"></div>
            </div>
          `).join('')}
        </div>
      </div>
    `;
  }

  function hideDiscovery() {
    discoveryBanner.style.display = 'none';
    discoveryBanner.innerHTML = '';
  }

  function loadSegments() {
    fetch(`/app/speakers/api/segments/${day}`)
      .then(r => r.json())
      .then(data => {
        segments = data.segments || [];
        renderSegmentList();
        if (window.location.hash) {
          selectSegmentByKey(window.location.hash.slice(1));
        }
      })
      .catch(() => {
        segmentList.innerHTML = '<div class="spk-empty">Failed to load segments</div>';
      });
  }

  function renderSegmentList() {
    if (segments.length === 0) {
      segmentList.innerHTML = '<div class="spk-empty">No segments with embeddings found for this day</div>';
      return;
    }

    // Sort segments: by null proportion when needs_review, otherwise by key (chronological)
    const sorted = [...segments].sort((a, b) => {
      if (currentFilter === 'needs_review') {
        const aProp = a.attribution_total ? a.attribution_null / a.attribution_total : 0;
        const bProp = b.attribution_total ? b.attribution_null / b.attribution_total : 0;
        if (bProp !== aProp) return bProp - aProp;
      }
      return a.key.localeCompare(b.key);
    });

    segmentList.innerHTML = sorted.map(seg => `
      <div class="spk-segment${selectedSegment?.key === seg.key ? ' active' : ''}" data-key="${seg.key}">
        <div class="spk-segment-time">
          ${seg.start} - ${seg.end}
          ${seg.speaker_count > 0 ? `<span class="spk-speaker-count">${seg.speaker_count} speakers</span>` : ''}
        </div>
        <div class="spk-segment-meta">${formatDuration(seg.duration)}</div>
        <div class="spk-segment-sources">
          ${seg.sources.map(s => `<span class="spk-source-badge">${formatSource(s)}</span>`).join('')}
        </div>
        ${seg.attribution_needs_review > 0 ? `<div class="spk-review-badge">${seg.attribution_needs_review} to review</div>` : ''}
      </div>
    `).join('');

    segmentList.querySelectorAll('.spk-segment').forEach(el => {
      el.addEventListener('click', () => {
        const seg = segments.find(s => s.key === el.dataset.key);
        if (seg) {
          window.location.hash = seg.key;
          selectSegment(seg);
        }
      });
    });
  }

  function selectSegmentByKey(key) {
    const seg = segments.find(s => s.key === key);
    if (seg) selectSegment(seg);
  }

  function selectSegment(seg) {
    selectedSegment = seg;
    selectedSource = seg.sources[0] || null;
    currentFilter = 'all';
    renderSegmentList();
    renderDetail(seg);
  }

  function renderDetail(seg) {
    if (!seg.sources.length) {
      detailPanel.innerHTML = '<div class="spk-empty">No audio sources found</div>';
      return;
    }

    let html = `
      <div class="spk-detail-header">
        <div class="spk-detail-title">${seg.start} - ${seg.end}</div>
      </div>
    `;

    html += '<div class="spk-speakers" id="spkSpeakers"><div class="spk-empty">Loading speakers...</div></div>';

    if (seg.sources.length > 1) {
      html += `
        <div class="spk-source-tabs">
          ${seg.sources.map(s => `
            <button class="spk-source-tab${s === selectedSource ? ' active' : ''}" data-source="${s}">
              ${formatSource(s)}
            </button>
          `).join('')}
        </div>
      `;
    }

    html += '<div class="spk-audio-player" id="spkAudioContainer"></div>';
    html += '<div class="spk-sentences" id="spkSentences"><div class="spk-empty">Loading...</div></div>';
    detailPanel.innerHTML = html;

    detailPanel.querySelectorAll('.spk-source-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        selectedSource = tab.dataset.source;
        detailPanel.querySelectorAll('.spk-source-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        loadReview(seg, selectedSource);
      });
    });

    loadSpeakers(seg);
    loadReview(seg, selectedSource);
  }

  function loadSpeakers(seg) {
    const container = document.getElementById('spkSpeakers');
    if (!container) return;

    fetch(`/app/speakers/api/speakers/${day}/${seg.stream}/${seg.key}`)
      .then(r => r.json())
      .then(data => {
        if (data.error) {
          container.innerHTML = `<div class="spk-empty">${escapeHtml(data.error)}</div>`;
          return;
        }
        renderSpeakerCards(data);
      })
      .catch(() => {
        container.innerHTML = '<div class="spk-empty">Failed to load speakers</div>';
      });
  }

  function renderSpeakerCards(data) {
    const container = document.getElementById('spkSpeakers');
    if (!container) return;

    const { matched, unmatched } = data;
    const hasMatched = matched && matched.length > 0;
    const hasUnmatched = unmatched && unmatched.length > 0;
    const matchedCount = matched ? matched.length : 0;
    const unmatchedCount = unmatched ? unmatched.length : 0;

    if (!hasMatched && !hasUnmatched) {
      container.innerHTML = '<div class="spk-empty">No speakers in this segment</div>';
      return;
    }

    let titleParts = [];
    if (matchedCount > 0) titleParts.push(`${matchedCount} matched`);
    if (unmatchedCount > 0) titleParts.push(`${unmatchedCount} unmatched`);
    const title = `Speakers (${titleParts.join(', ')})`;

    let html = `<div class="spk-speakers-title">${title}</div><div class="spk-speaker-cards">`;
    if (hasMatched) {
      matched.forEach(m => {
        html += `
          <div class="spk-speaker-card spk-speaker-matched">
            <span class="spk-speaker-entity">${escapeHtml(m.entity_name)}</span>
            ${m.detected_name !== m.entity_name ? `<span class="spk-speaker-detected">(${escapeHtml(m.detected_name)})</span>` : ''}
          </div>
        `;
      });
    }

    if (hasUnmatched) {
      unmatched.forEach(name => {
        html += `<div class="spk-speaker-card spk-speaker-unmatched">${escapeHtml(name)}</div>`;
      });
    }

    html += '</div>';
    container.innerHTML = html;
  }

  function loadReview(seg, source) {
    const container = document.getElementById('spkSentences');
    if (container) {
      container.innerHTML = '<div class="spk-empty">Loading...</div>';
    }

    fetch(`/app/speakers/api/review/${day}/${seg.stream}/${seg.key}/${source}`)
      .then(r => r.json())
      .then(data => {
        if (data.error) {
          if (container) {
            container.innerHTML = `<div class="spk-empty">${escapeHtml(data.error)}</div>`;
          }
          return;
        }

        currentSentences = data.sentences || [];
        reviewEntities = data.all_entities || [];
        hasLabels = Boolean(data.has_labels);
        reviewSummary = data.summary || null;
        playingSentenceId = null;
        renderReview(data);
      })
      .catch(() => {
        if (container) {
          container.innerHTML = '<div class="spk-empty">Failed to load review data</div>';
        }
      });
  }

  function renderReview(data) {
    const { audio_file } = data;
    const audioContainer = document.getElementById('spkAudioContainer');
    if (audio_file) {
      audioContainer.innerHTML = `
        <div class="spk-player-controls">
          <button class="spk-skip-back" id="spkSkipBack" title="Back 5s">&#8634; 5s</button>
          <audio id="spkAudio" controls preload="metadata">
            <source src="${audio_file}" type="audio/flac">
          </audio>
          <button class="spk-speed-toggle" id="spkSpeedToggle" title="Playback speed">1x</button>
        </div>
      `;
      audioPlayer = document.getElementById('spkAudio');
      setupAudioListeners();
    } else {
      audioContainer.innerHTML = '<div class="spk-empty">No audio file available</div>';
      audioPlayer = null;
    }

    renderReviewList();
  }

  function renderReviewList() {
    const container = document.getElementById('spkSentences');
    if (!container) return;

    const sentences = filteredSentences();
    const total = currentSentences.length;
    const countLabel = countLabelForFilter(sentences.length, total);

    if (total === 0) {
      container.innerHTML = '<div class="spk-empty">No sentences with embeddings found</div>';
      return;
    }

    container.innerHTML = `
      <div class="spk-sentences-title">
        <span id="spkSentenceCount">${escapeHtml(countLabel)}</span>
      </div>
      <div class="spk-filter-bar">
        <button class="spk-filter-btn${currentFilter === 'all' ? ' active' : ''}" data-filter="all">All</button>
        <button class="spk-filter-btn${currentFilter === 'needs_review' ? ' active' : ''}" data-filter="needs_review">Needs Review</button>
        <button class="spk-filter-btn${currentFilter === 'corrections' ? ' active' : ''}" data-filter="corrections">Corrections</button>
      </div>
      ${(() => {
        const seg = selectedSegment;
        const nonOwnerTotal = seg?.attribution_non_owner_total || 0;
        const nullCount = seg?.attribution_null || 0;
        const showPrompt = seg?.speaker_count > 0 && nonOwnerTotal > 0 && (nullCount / nonOwnerTotal) > 0.5;
        return showPrompt ? `<div class="spk-seeding-prompt">This meeting has ${seg.speaker_count} named speakers but I can't match voices yet. Assigning even a few sentences will help me learn their voices for future meetings.</div>` : '';
      })()}
      ${!hasLabels ? '<div class="spk-status spk-status-error">Not yet attributed</div>' : ''}
      ${sentences.length === 0 ? '<div class="spk-empty">No sentences match this filter</div>' : sentences.map(renderSentence).join('')}
    `;

    container.querySelectorAll('.spk-filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        currentFilter = btn.dataset.filter;
        renderReviewList();
        renderSegmentList();
      });
    });

    setupSentenceHandlers();
  }

  function filteredSentences() {
    if (currentFilter === 'needs_review') {
      return currentSentences.filter(s => s.needs_review);
    }
    if (currentFilter === 'corrections') {
      return currentSentences.filter(s => s.is_correction);
    }
    return currentSentences;
  }

  function countLabelForFilter(visible, total) {
    if (currentFilter === 'all') {
      return `Sentences (${total})`;
    }
    return `Sentences (${visible} of ${total})`;
  }

  function renderSentence(sentence) {
    const timeStr = formatOffset(sentence.offset);
    const speakerHtml = renderSpeakerDisplay(sentence);
    const actionsHtml = renderActions(sentence);

    return `
      <div class="spk-sentence" data-id="${sentence.id}" data-offset="${sentence.offset}">
        <div class="spk-sentence-time">${timeStr}</div>
        <div class="spk-sentence-content">
          <div class="spk-sentence-text">${escapeHtml(sentence.text)}</div>
          <div class="spk-sentence-speaker">${speakerHtml}</div>
          <div class="spk-status-container" id="status-${sentence.id}"></div>
        </div>
        <div class="spk-sentence-actions">
          <button class="spk-btn spk-btn-icon spk-play-btn" title="Play from here">&#9654;</button>
          ${actionsHtml}
        </div>
      </div>
    `;
  }

  function renderSpeakerDisplay(sentence) {
    if (!sentence.speaker_name) {
      return '<span class="spk-review-state">Unassigned</span>';
    }

    let dotClass = '';
    if (sentence.confidence === 'high') {
      dotClass = ' spk-confidence-high';
    } else if (sentence.confidence === 'medium') {
      dotClass = ' spk-confidence-medium';
    }

    let html = '';
    if (dotClass) {
      html += `<span class="spk-confidence-dot${dotClass}"></span>`;
    }

    if (sentence.is_correction && sentence.original_speaker_name) {
      html += `<span class="spk-correction-original">${escapeHtml(sentence.original_speaker_name)}</span>`;
    }

    html += `<span>${escapeHtml(sentence.speaker_name)}</span>`;

    if (sentence.needs_review) {
      html += '<span class="spk-review-state">Needs review</span>';
    } else if (sentence.method) {
      html += `<span class="spk-review-state">${escapeHtml(sentence.method)}</span>`;
    }

    return html;
  }

  function renderActions(sentence) {
    if (!hasLabels) {
      return '<span class="spk-review-state">Not yet attributed</span>';
    }

    const options = reviewEntities.map(entity => (
      `<option value="${escapeHtml(entity.entity_id)}">${escapeHtml(entity.name)}</option>`
    )).join('');

    if (sentence.speaker_entity_id) {
      const correctSelect = `
        <select class="spk-select-small spk-correct-select" data-sentence-id="${sentence.id}">
          <option value="">Correct...</option>
          ${options}
        </select>
      `;

      if (sentence.confidence === 'medium') {
        return `
          <button class="spk-btn spk-btn-primary spk-confirm-btn" data-sentence-id="${sentence.id}">Confirm &#10003;</button>
          ${correctSelect}
        `;
      }

      return correctSelect;
    }

    return `
      <select class="spk-select-small spk-assign-select" data-sentence-id="${sentence.id}">
        <option value="">Assign...</option>
        ${options}
      </select>
    `;
  }

  function setupSentenceHandlers() {
    detailPanel.querySelectorAll('.spk-play-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const row = btn.closest('.spk-sentence');
        const sentenceId = parseInt(row.dataset.id, 10);
        const offset = parseFloat(row.dataset.offset);

        if (!audioPlayer) return;

        if (sentenceId === playingSentenceId && !audioPlayer.paused) {
          audioPlayer.pause();
        } else {
          audioPlayer.currentTime = offset;
          audioPlayer.play();
        }
      });
    });

    detailPanel.querySelectorAll('.spk-confirm-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const sentenceId = parseInt(btn.dataset.sentenceId, 10);
        confirmAttribution(sentenceId);
      });
    });

    detailPanel.querySelectorAll('.spk-correct-select').forEach(select => {
      select.addEventListener('change', () => {
        if (!select.value) return;
        const sentenceId = parseInt(select.dataset.sentenceId, 10);
        correctAttribution(sentenceId, select.value);
      });
    });

    detailPanel.querySelectorAll('.spk-assign-select').forEach(select => {
      select.addEventListener('change', () => {
        if (!select.value) return;
        const sentenceId = parseInt(select.dataset.sentenceId, 10);
        assignAttribution(sentenceId, select.value);
      });
    });
  }

  function confirmAttribution(sentenceId) {
    fetch('/app/speakers/api/confirm-attribution', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        day,
        stream: selectedSegment.stream,
        segment_key: selectedSegment.key,
        source: selectedSource,
        sentence_id: sentenceId,
      }),
    })
      .then(r => r.json())
      .then(data => {
        if (data.error) {
          showStatusBySentence(sentenceId, data.error, 'error');
          return;
        }

        const sentence = currentSentences.find(s => s.id === sentenceId);
        if (sentence) {
          sentence.confidence = 'high';
          sentence.method = 'user_confirmed';
          sentence.needs_review = false;
          sentence.is_correction = true;
        }
        renderReviewList();
        showStatusBySentence(sentenceId, 'Attribution confirmed', 'success');
        loadSegments();
      })
      .catch(() => {
        showStatusBySentence(sentenceId, 'Failed to confirm attribution', 'error');
      });
  }

  function correctAttribution(sentenceId, newSpeaker) {
    fetch('/app/speakers/api/correct-attribution', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        day,
        stream: selectedSegment.stream,
        segment_key: selectedSegment.key,
        source: selectedSource,
        sentence_id: sentenceId,
        new_speaker: newSpeaker,
      }),
    })
      .then(r => r.json())
      .then(data => {
        if (data.error) {
          showStatusBySentence(sentenceId, data.error, 'error');
          return;
        }
        loadReview(selectedSegment, selectedSource);
        loadSegments();
      })
      .catch(() => {
        showStatusBySentence(sentenceId, 'Failed to correct attribution', 'error');
      });
  }

  function assignAttribution(sentenceId, speaker) {
    fetch('/app/speakers/api/assign-attribution', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        day,
        stream: selectedSegment.stream,
        segment_key: selectedSegment.key,
        source: selectedSource,
        sentence_id: sentenceId,
        speaker,
      }),
    })
      .then(r => r.json())
      .then(data => {
        if (data.error) {
          showStatusBySentence(sentenceId, data.error, 'error');
          return;
        }
        loadReview(selectedSegment, selectedSource);
        loadSegments();
      })
      .catch(() => {
        showStatusBySentence(sentenceId, 'Failed to assign attribution', 'error');
      });
  }

  function showStatusBySentence(sentenceId, message, type) {
    const container = document.getElementById(`status-${sentenceId}`);
    if (!container) return;
    container.innerHTML = `<div class="spk-status spk-status-${type}">${escapeHtml(message)}</div>`;
    setTimeout(() => {
      const current = document.getElementById(`status-${sentenceId}`);
      if (current) current.innerHTML = '';
    }, 3000);
  }

  function setupAudioListeners() {
    if (!audioPlayer) return;

    audioPlayer.addEventListener('timeupdate', () => {
      updateActiveSentence(audioPlayer.currentTime);
    });

    audioPlayer.addEventListener('play', () => {
      if (playingSentenceId !== null) {
        const btn = detailPanel.querySelector(`.spk-sentence[data-id="${playingSentenceId}"] .spk-play-btn`);
        if (btn) btn.innerHTML = '&#9208;';
      }
    });

    audioPlayer.addEventListener('pause', () => {
      if (playingSentenceId !== null) {
        const btn = detailPanel.querySelector(`.spk-sentence[data-id="${playingSentenceId}"] .spk-play-btn`);
        if (btn) btn.innerHTML = '&#9654;';
      }
    });

    audioPlayer.addEventListener('ended', () => {
      if (playingSentenceId !== null) {
        const row = detailPanel.querySelector(`.spk-sentence[data-id="${playingSentenceId}"]`);
        if (row) {
          row.classList.remove('spk-playing');
          row.querySelector('.spk-play-btn').innerHTML = '&#9654;';
        }
        playingSentenceId = null;
      }
    });

    const skipBackBtn = document.getElementById('spkSkipBack');
    if (skipBackBtn) {
      skipBackBtn.addEventListener('click', () => {
        audioPlayer.currentTime = Math.max(0, audioPlayer.currentTime - 5);
      });
    }

    const speedToggleBtn = document.getElementById('spkSpeedToggle');
    if (speedToggleBtn) {
      const speeds = [1, 1.5, 2];
      speedToggleBtn.addEventListener('click', () => {
        const currentIndex = speeds.indexOf(audioPlayer.playbackRate);
        const nextIndex = (currentIndex + 1) % speeds.length;
        audioPlayer.playbackRate = speeds[nextIndex];
        speedToggleBtn.textContent = speeds[nextIndex] + 'x';
      });
    }
  }

  function updateActiveSentence(currentTime) {
    let activeSentence = null;
    for (let i = 0; i < currentSentences.length; i++) {
      const sentence = currentSentences[i];
      const nextOffset = currentSentences[i + 1]?.offset ?? Infinity;
      if (currentTime >= sentence.offset && currentTime < nextOffset) {
        activeSentence = sentence;
        break;
      }
    }

    const newId = activeSentence?.id ?? null;
    if (newId === playingSentenceId) return;

    if (playingSentenceId !== null) {
      const prevRow = detailPanel.querySelector(`.spk-sentence[data-id="${playingSentenceId}"]`);
      if (prevRow) {
        prevRow.classList.remove('spk-playing');
        prevRow.querySelector('.spk-play-btn').innerHTML = '&#9654;';
      }
    }

    playingSentenceId = newId;
    if (playingSentenceId !== null) {
      const newRow = detailPanel.querySelector(`.spk-sentence[data-id="${playingSentenceId}"]`);
      if (newRow) {
        newRow.classList.add('spk-playing');
        if (!audioPlayer.paused) {
          newRow.querySelector('.spk-play-btn').innerHTML = '&#9208;';
        }
        newRow.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      }
    }
  }

  function formatDuration(seconds) {
    const mins = Math.floor(seconds / 60);
    const secs = seconds % 60;
    if (mins === 0) return `${secs}s`;
    return secs > 0 ? `${mins}m ${secs}s` : `${mins}m`;
  }

  function formatOffset(seconds) {
    const mins = Math.floor(seconds / 60);
    const secs = seconds % 60;
    return `${mins}:${secs.toString().padStart(2, '0')}`;
  }

  function formatSource(source) {
    return source
      .replace(/_audio$/, '')
      .replace(/^sys$/, 'system')
      .replace(/^mic$/, 'microphone')
      .replace(/_/g, ' ');
  }

  function escapeHtml(value) {
    return String(value ?? '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }
})();
</script>
