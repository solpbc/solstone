<style>
.import-detail-content { padding: 1.5rem 2rem 2rem; }
.back-link { display: inline-block; margin-bottom: 1em; color: var(--facet-color, #0f4c81); text-decoration: none; }
.back-link:hover { text-decoration: underline; }
.back-link:active { color: #0056b3; }
.import-header { margin-bottom: 2em; }
.import-header h1 { margin: 0 0 0.5em 0; }
.import-meta { color: #666; font-size: 0.9em; }

/* Tabs */
.tabs { display: flex; border-bottom: 2px solid #ddd; margin-bottom: 1em; }
.tab { padding: 10px 20px; cursor: pointer; border-bottom: 3px solid transparent; margin-bottom: -2px; min-height: 44px; display: inline-flex; align-items: center; transition: background 0.1s ease, border-bottom-color 0.1s ease; }
.tab:hover { background: #f7f9fc; }
.tab:active { background: #e5e7eb; }
.tab:focus-visible { outline: 2px solid var(--facet-color, #b06a1a); outline-offset: -2px; }
.tab.active { border-bottom-color: var(--facet-color, #0f4c81); font-weight: bold; }
.tab-content { display: none; }
.tab-content.active { display: block; }

/* JSON viewer */
.json-viewer { background: #f5f7fa; border: 1px solid var(--facet-border, #e5e0db); border-radius: 8px; padding: 1em; overflow-x: auto; }
.json-viewer pre { margin: 0; font-family: monospace; font-size: 0.9em; }
.json-key { color: #881391; }
.json-string { color: #1a1aa6; }
.json-number { color: #098658; }
.json-boolean { color: #d73a49; }
.json-null { color: #666; }

/* Links section */
.links-section { margin-top: 2em; padding: 1em; background: #f9f9f9; border-radius: 4px; }
.links-section h3 { margin-top: 0; }
.link-item { margin: 0.5em 0; }
.link-item a { color: var(--facet-color, #0f4c81); text-decoration: none; }
.link-item a:hover { text-decoration: underline; }

/* Files list */
.files-list { margin-top: 1em; }
.files-list h4 { margin-bottom: 0.5em; }
.files-list ul { margin: 0; padding-left: 1.5em; }
.files-list li { margin: 0.25em 0; font-family: monospace; font-size: 0.9em; color: #666; }

/* Status badge */
.status-badge { display: inline-block; padding: 4px 10px; border-radius: 6px; font-size: 0.85em; margin-left: 1em; }
.status-badge.success { background: #edf8ef; color: #1a5c2a; }
.status-badge.pending { background: #fef9e7; color: #5b4a08; }
.status-badge.failed { background: #fff0f0; color: #9b2c2c; }
.status-badge.running { background: #cfe2ff; color: #084298; }

/* Info grid */
.info-grid { display: grid; grid-template-columns: auto 1fr; gap: 0.5em 1em; margin: 1em 0; }
.info-label { font-weight: bold; color: #666; }
.info-value { color: #333; }

.no-data { color: #999; font-style: italic; padding: 2em; text-align: center; }

/* Content tab */
.import-content-summary { margin-bottom: 1em; padding: 0.75em 1em; background: #f0f7ff; border-radius: 4px; font-size: 0.95em; }
.import-content-controls { display: flex; gap: 0.75em; margin-bottom: 1em; }
.import-content-search { flex: 1; padding: 8px 12px; border: 1px solid #ddd; border-radius: 4px; font-size: 0.9em; }
.import-content-search:hover:not(:focus) { border-color: #a0aec0; }
.import-content-search:focus { outline: none; border-color: #0f4c81; box-shadow: 0 0 0 3px rgba(15, 76, 129, 0.1); }
.import-content-month { padding: 8px 12px; border: 1px solid #ddd; border-radius: 4px; font-size: 0.9em; background: #fff; }
.import-content-month:hover:not(:focus) { border-color: #a0aec0; }
.import-content-month:focus { outline: none; border-color: #0f4c81; box-shadow: 0 0 0 3px rgba(15, 76, 129, 0.1); }
.import-content-items { }
.import-content-item { border: 1px solid #e5e5e5; border-radius: 4px; margin-bottom: 0.5em; cursor: pointer; transition: border-color 0.15s; }
.import-content-item:hover { border-color: var(--facet-color, #0f4c81); }
.import-content-item:active { border-color: #0056b3; background: #f8f9fa; }
.import-content-item:focus-visible { outline: 2px solid var(--facet-color, #b06a1a); outline-offset: 2px; }
.import-content-item-header { padding: 0.75em 1em; display: flex; align-items: center; gap: 0.5em; }
.import-content-item-title { font-weight: 600; flex: 1; }
.import-content-item-date { color: #888; font-size: 0.85em; white-space: nowrap; }
.import-content-item-type { color: #666; font-size: 0.8em; background: #f0f0f0; padding: 2px 6px; border-radius: 3px; }
.import-content-item-preview { color: #666; font-size: 0.9em; padding: 0 1em 0.5em; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.import-content-item-body { display: none; padding: 0.75em 1em; border-top: 1px solid #e5e5e5; background: #fafafa; }
.import-content-item.expanded .import-content-item-body { display: block; }
.import-content-item-body pre { white-space: pre-wrap; font-size: 0.9em; margin: 0; }
.import-content-markdown { font-size: 0.95em; line-height: 1.6; }
.import-content-markdown h2 { font-size: 1.1em; margin: 0 0 0.5em 0; }
.import-content-markdown h3 { font-size: 1em; margin: 0.75em 0 0.25em 0; }
.import-content-markdown ul, .import-content-markdown ol { margin: 0.25em 0; padding-left: 1.5em; }
.import-content-markdown li { margin: 0.15em 0; }
.import-content-markdown blockquote { border-left: 3px solid #ddd; margin: 0.5em 0; padding: 0.25em 0.75em; color: #555; }
.import-content-markdown p { margin: 0.4em 0; }
.import-content-markdown hr { border: none; border-top: 1px solid #e5e5e5; margin: 1em 0; }
.import-content-markdown code { background: #f0f0f0; padding: 1px 4px; border-radius: 3px; font-size: 0.9em; }
.import-content-markdown pre code { background: none; padding: 0; }
.import-content-item-body .import-content-message { margin: 0.5em 0; }
.import-content-item-body .import-content-speaker { font-weight: 600; margin-right: 0.5em; }
.import-content-item-body .import-content-speaker.human { color: var(--facet-color, #0f4c81); }
.import-content-item-body .import-content-speaker.assistant { color: #28a745; }
.import-content-pagination { display: flex; gap: 0.5em; justify-content: center; margin-top: 1em; }
.import-content-pagination button { padding: 6px 14px; border: 1px solid #ddd; border-radius: 4px; background: #fff; cursor: pointer; font-size: 0.9em; }
.import-content-pagination button:hover { background: #f5f5f5; }
.import-content-pagination button.active { background: var(--facet-color, #0f4c81); color: #fff; border-color: var(--facet-color, #0f4c81); }
.import-content-pagination button:disabled { opacity: 0.5; cursor: not-allowed; }
.import-content-pagination button { transition: background 0.1s ease; }
.import-content-pagination button:active:not(:disabled):not(.active) { background: #e5e7eb; }
.import-content-month-header { font-weight: 600; color: #555; padding: 0.75em 0 0.25em; border-bottom: 1px solid #e5e5e5; margin-bottom: 0.5em; margin-top: 0.75em; font-size: 0.9em; }
.import-content-month-header:first-child { margin-top: 0; }
.import-content-item-meta { padding: 0 1em 0.25em; font-size: 0.8em; color: #888; }
.import-content-cal-link { color: var(--facet-color, #0f4c81); text-decoration: none; }
.import-content-cal-link:hover { text-decoration: underline; }

  </style>

<div class="import-detail-content">
  <a href="/app/import/" class="back-link">← Back to Imports</a>

  <div class="import-header">
    <h1>Import: {{ timestamp }}</h1>
    <div class="import-meta" id="importMeta">
      <span>Loading...</span>
    </div>
  </div>

  <div class="tabs" role="tablist">
    <div class="tab active" data-target="overview" tabindex="0" role="tab">Overview</div>
    <div class="tab" data-target="content" tabindex="0" role="tab">Content</div>
    <div class="tab" data-target="import-json" tabindex="0" role="tab">Upload Metadata</div>
    <div class="tab" data-target="imported-json" tabindex="0" role="tab">Processing Results</div>
  </div>

  <div class="tab-content active" id="overview">
    <div class="info-grid" id="overviewContent">
      <div class="info-label">Loading...</div>
    </div>

    <div class="links-section" id="linksSection" style="display:none;">
      <h3>Quick Links</h3>
      <div id="quickLinks"></div>
    </div>

    <div class="files-list" id="filesList" style="display:none;">
      <h4>Created Files</h4>
      <ul id="filesListContent"></ul>
    </div>
  </div>

  <div class="tab-content" id="content">
    <div id="contentLoading" class="no-data">Select this tab to browse imported content</div>
    <div id="contentContainer" style="display:none;">
      <div class="import-content-summary" id="contentSummary"></div>
      <div class="import-content-controls">
        <input type="text" id="contentSearch" class="import-content-search" placeholder="Search items..." />
        <select id="contentMonth" class="import-content-month">
          <option value="">All months</option>
        </select>
      </div>
      <div id="contentItems" class="import-content-items"></div>
      <div id="contentPagination" class="import-content-pagination"></div>
    </div>
  </div>

  <div class="tab-content" id="import-json">
    <div class="json-viewer">
      <pre id="importJsonContent">Loading...</pre>
    </div>
  </div>

  <div class="tab-content" id="imported-json">
    <div class="json-viewer">
      <pre id="importedJsonContent">Loading...</pre>
    </div>
  </div>

</div>

<script src="{{ vendor_lib('marked') }}"></script>
<script>
// Configure marked for safe rendering of imported content
marked.setOptions({ breaks: true, gfm: true });
const markedRenderer = new marked.Renderer();
// Sanitize: strip raw HTML tags from markdown input to prevent XSS from user-imported content
function sanitizeMarkdown(md) {
  return md.replace(/<(script|iframe|object|embed|form|input|textarea|button|select|style|link|meta)[^>]*>[\s\S]*?<\/\1>/gi, '')
    .replace(/<(script|iframe|object|embed|form|input|textarea|button|select|style|link|meta)[^>]*\/?>/gi, '')
    .replace(/\bon\w+\s*=\s*["'][^"']*["']/gi, '')
    .replace(/javascript\s*:/gi, 'blocked:');
}

// Tab switching
const tabs = document.querySelectorAll('.tab');
const contents = document.querySelectorAll('.tab-content');
let contentLoaded = false;
let contentPage = 1;
let contentSearch = '';
let contentMonth = '';
let searchDebounce = null;

tabs.forEach(tab => {
  tab.addEventListener('click', () => {
    const target = tab.dataset.target;
    tabs.forEach(t => t.classList.toggle('active', t.dataset.target === target));
    contents.forEach(c => c.classList.toggle('active', c.id === target));
    if (target === 'content' && !contentLoaded) {
      loadContent(1);
    }
  });
  tab.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' || e.key === ' ') {
      e.preventDefault();
      tab.click();
    }
  });
});

function loadContent(page = 1) {
  const container = document.getElementById('contentContainer');
  const loading = document.getElementById('contentLoading');
  loading.textContent = 'Loading content...';
  loading.style.display = 'block';

  const params = new URLSearchParams({page, per_page: 50});
  if (contentSearch) params.set('q', contentSearch);
  if (contentMonth) params.set('month', contentMonth);

  fetch(`/app/import/api/{{ timestamp }}/content?${params}`)
    .then(r => r.json())
    .then(data => {
      if (data.error) {
        loading.textContent = data.error;
        return;
      }
      loading.style.display = 'none';
      container.style.display = 'block';
      contentPage = data.page;
      renderContentSummary(data);
      renderContentMonths(data.months);
      renderContentItems(data.items);
      renderContentPagination(data);
      contentLoaded = true;
    })
    .catch(err => {
      loading.textContent = 'Error loading content';
      console.error('Content load error:', err);
    });
}

function renderContentSummary(data) {
  const el = document.getElementById('contentSummary');
  const emoji = data.source_emoji || '';
  const display = data.source_display || '';
  el.innerHTML = `${emoji} <strong>${display}</strong> — ${data.total} items`;
}

function renderContentMonths(months) {
  const select = document.getElementById('contentMonth');
  const current = select.value;
  select.innerHTML = '<option value="">All months</option>';
  for (const [month, count] of Object.entries(months)) {
    const label = month.slice(0, 4) + '-' + month.slice(4, 6);
    const opt = document.createElement('option');
    opt.value = month;
    opt.textContent = `${label} (${count})`;
    select.appendChild(opt);
  }
  select.value = current;
}

function renderContentItems(items) {
  const el = document.getElementById('contentItems');
  if (!items.length) {
    el.innerHTML = '<div class="no-data">No items found</div>';
    return;
  }
  const monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  let currentMonth = '';
  let html = '';
  items.forEach(item => {
    const itemMonth = item.date ? item.date.slice(0, 6) : '';
    if (itemMonth && itemMonth !== currentMonth) {
      currentMonth = itemMonth;
      const year = itemMonth.slice(0, 4);
      const monthIdx = parseInt(itemMonth.slice(4, 6), 10) - 1;
      const monthLabel = monthNames[monthIdx] || '';
      const monthCount = items.filter(i => (i.date || '').startsWith(itemMonth)).length;
      html += `<div class="import-content-month-header">${monthLabel} ${year} — ${monthCount} items</div>`;
    }
    const typeLabel = {
      conversation: 'Chat',
      event: 'Event',
      highlight_group: 'Highlights',
      note: 'Note',
    }[item.type] || item.type;
    const date = item.date ? `${item.date.slice(0, 4)}-${item.date.slice(4, 6)}-${item.date.slice(6, 8)}` : '';
    const calLink = item.date ? `/app/calendar/${item.date}` : '';
    html += `
      <div class="import-content-item" data-item-id="${item.id}" tabindex="0" role="button" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();toggleContentItem(this)}">
        <div class="import-content-item-header" onclick="toggleContentItem(this.parentElement)">
          <span class="import-content-item-type">${typeLabel}</span>
          <span class="import-content-item-title">${escapeContentHtml(item.title)}</span>
          <span class="import-content-item-date">${date}</span>
        </div>
        <div class="import-content-item-meta">
          ${item.meta?.message_count ? `${item.meta.message_count} messages` : ''}
          ${item.meta?.highlight_count ? `${item.meta.highlight_count} highlights` : ''}
          ${item.meta?.time_range ? `${escapeContentHtml(item.meta.time_range)}` : (item.meta?.duration_minutes ? `${item.meta.duration_minutes} min` : '')}
          ${item.meta?.attendee_names?.length ? ` · ${item.meta.attendee_names.map(n => escapeContentHtml(n)).join(', ')}` : (item.meta?.attendee_count ? ` · ${item.meta.attendee_count} attendees` : '')}
          ${item.meta?.location ? ` · ${escapeContentHtml(item.meta.location)}` : ''}
          ${item.meta?.author ? `· ${escapeContentHtml(item.meta.author)}` : ''}
          ${item.meta?.tags?.length ? `· ${item.meta.tags.map(t => escapeContentHtml(t)).join(', ')}` : ''}
          ${calLink ? ` · <a href="${calLink}" class="import-content-cal-link" onclick="event.stopPropagation();">View in calendar →</a>` : ''}
        </div>
        ${item.preview ? `<div class="import-content-item-preview">${escapeContentHtml(stripMarkdown(item.preview))}</div>` : ''}
        <div class="import-content-item-body"><div class="no-data">Loading...</div></div>
      </div>`;
  });
  el.innerHTML = html;
}

function toggleContentItem(el) {
  const wasExpanded = el.classList.contains('expanded');
  document.querySelectorAll('.import-content-item.expanded').forEach(item => {
    item.classList.remove('expanded');
  });
  if (wasExpanded) return;

  el.classList.add('expanded');
  const body = el.querySelector('.import-content-item-body');
  const itemId = el.dataset.itemId;

  fetch(`/app/import/api/{{ timestamp }}/content/${itemId}`)
    .then(r => r.json())
    .then(data => {
      if (data.error) {
        body.innerHTML = `<div class="no-data">${data.error}</div>`;
        return;
      }
      body.innerHTML = renderContentDetail(data);
    })
    .catch(() => {
      body.innerHTML = '<div class="no-data">Error loading content</div>';
    });
}

function renderContentDetail(data) {
  if (!data.content || !data.content.length) {
    return '<div class="no-data">No content available</div>';
  }

  return data.content.map(part => {
    if (part.type === 'markdown') {
      return `<div class="import-content-markdown">${marked.parse(sanitizeMarkdown(part.content))}</div>`;
    }
    const speaker = part.speaker || 'Unknown';
    const cls = speaker === 'Human' ? 'human' : 'assistant';
    return `<div class="import-content-message"><span class="import-content-speaker ${cls}">${speaker}:</span> ${escapeContentHtml(part.text || '')}</div>`;
  }).join('');
}

function renderContentPagination(data) {
  const el = document.getElementById('contentPagination');
  if (data.pages <= 1) {
    el.innerHTML = '';
    return;
  }
  let html = '';
  html += `<button ${data.page <= 1 ? 'disabled' : ''} onclick="loadContent(${data.page - 1})">Prev</button>`;
  const start = Math.max(1, data.page - 2);
  const end = Math.min(data.pages, data.page + 2);
  for (let i = start; i <= end; i++) {
    html += `<button class="${i === data.page ? 'active' : ''}" onclick="loadContent(${i})">${i}</button>`;
  }
  html += `<button ${data.page >= data.pages ? 'disabled' : ''} onclick="loadContent(${data.page + 1})">Next</button>`;
  el.innerHTML = html;
}

function escapeContentHtml(str) {
  if (!str) return '';
  return str
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function stripMarkdown(str) {
  if (!str) return '';
  return str
    .replace(/^#{1,6}\s+/gm, '')
    .replace(/\*\*([^*]+)\*\*/g, '$1')
    .replace(/\*([^*]+)\*/g, '$1')
    .replace(/^[-*+]\s+/gm, '')
    .replace(/^\d+\.\s+/gm, '')
    .replace(/\[([^\]]+)\]\([^)]+\)/g, '$1')
    .replace(/`([^`]+)`/g, '$1')
    .replace(/^>\s+/gm, '')
    .trim();
}

document.getElementById('contentSearch').addEventListener('input', function() {
  clearTimeout(searchDebounce);
  searchDebounce = setTimeout(() => {
    contentSearch = this.value.trim();
    loadContent(1);
  }, 300);
});

document.getElementById('contentMonth').addEventListener('change', function() {
  contentMonth = this.value;
  loadContent(1);
});

// Format JSON with syntax highlighting
function formatJson(obj) {
  if (!obj) return '<span class="json-null">No data available</span>';

  const json = JSON.stringify(obj, null, 2);
  return json.replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g, function (match) {
    let cls = 'json-number';
    if (/^"/.test(match)) {
      if (/:$/.test(match)) {
        cls = 'json-key';
      } else {
        cls = 'json-string';
      }
    } else if (/true|false/.test(match)) {
      cls = 'json-boolean';
    } else if (/null/.test(match)) {
      cls = 'json-null';
    }
    return '<span class="' + cls + '">' + match + '</span>';
  });
}

// Format file size
function formatFileSize(bytes) {
  if (!bytes || bytes === 0) return '0 B';
  const k = 1024;
  const sizes = ['B', 'KB', 'MB', 'GB'];
  const i = Math.floor(Math.log(bytes) / Math.log(k));
  return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i];
}

// Format timestamp
function formatTimestamp(timestamp) {
  if (!timestamp) return '-';
  // Convert YYYYMMDD_HHMMSS to readable format
  const match = timestamp.match(/(\d{4})(\d{2})(\d{2})_(\d{2})(\d{2})(\d{2})/);
  if (match) {
    const [_, year, month, day, hour, min, sec] = match;
    return `${year}-${month}-${day} ${hour}:${min}:${sec}`;
  }
  return timestamp;
}

// Load import details
fetch('/app/import/api/{{ timestamp }}')
  .then(r => r.json())
  .then(data => {
    // Update header metadata
    const metaDiv = document.getElementById('importMeta');
    if (data.import_json) {
      const uploadTime = new Date(data.import_json.upload_datetime).toLocaleString();
      const fileName = data.import_json.original_filename || 'Unknown';
      const fileSize = formatFileSize(data.import_json.file_size);

      // Determine status based on task_id and imported_json
      let statusClass, statusText;
      if (data.imported_json && data.imported_json.error) {
        statusClass = 'failed';
        statusText = 'Failed';
      } else if (data.imported_json) {
        statusClass = 'success';
        statusText = 'Completed';
      } else if (data.import_json.task_id) {
        // Task was started but no imported.json
        statusClass = 'failed';
        statusText = 'Failed';
      } else {
        statusClass = 'pending';
        statusText = 'Pending';
      }

      metaDiv.innerHTML = `
        <span>${fileName} (${fileSize})</span> •
        <span>Uploaded: ${uploadTime}</span>
        <span class="status-badge ${statusClass}">${statusText}</span>
      `;
    }

    // Update overview tab
    const overviewContent = document.getElementById('overviewContent');
    let overviewHtml = '';

    if (data.import_json) {
      overviewHtml += `<div class="info-label">Original File:</div><div class="info-value">${data.import_json.original_filename || '-'}</div>`;
      overviewHtml += `<div class="info-label">File Size:</div><div class="info-value">${formatFileSize(data.import_json.file_size)}</div>`;
      overviewHtml += `<div class="info-label">MIME Type:</div><div class="info-value">${data.import_json.mime_type || '-'}</div>`;
      overviewHtml += `<div class="info-label">Upload Time:</div><div class="info-value">${new Date(data.import_json.upload_datetime).toLocaleString()}</div>`;
      overviewHtml += `<div class="info-label">Detected Timestamp:</div><div class="info-value">${formatTimestamp(data.import_json.detected_timestamp) || 'Not detected'}</div>`;
      overviewHtml += `<div class="info-label">Import Timestamp:</div><div class="info-value">${formatTimestamp(data.import_json.user_timestamp)}</div>`;
      if (data.import_json.facet) {
        overviewHtml += `<div class="info-label">Facet:</div><div class="info-value">${data.import_json.facet}</div>`;
      }
      if (data.import_json.setting) {
        overviewHtml += `<div class="info-label">Setting:</div><div class="info-value">${data.import_json.setting}</div>`;
      }
    }

    if (data.imported_json && data.imported_json.error) {
      // Error state
      overviewHtml += `<div class="info-label">Processing Status:</div><div class="info-value status-badge failed">Failed</div>`;
      overviewHtml += `<div class="info-label">Error:</div><div class="info-value">${data.imported_json.error}</div>`;
      if (data.imported_json.error_stage) {
        overviewHtml += `<div class="info-label">Failed At:</div><div class="info-value">${data.imported_json.error_stage}</div>`;
      }
      if (data.imported_json.processing_failed) {
        overviewHtml += `<div class="info-label">Processing Time:</div><div class="info-value">${new Date(data.imported_json.processing_failed).toLocaleString()}</div>`;
      }
    } else if (data.imported_json) {
      overviewHtml += `<div class="info-label">Processing Status:</div><div class="info-value">Completed</div>`;
      overviewHtml += `<div class="info-label">Target Day:</div><div class="info-value">${data.imported_json.target_day || '-'}</div>`;
      overviewHtml += `<div class="info-label">Files Created:</div><div class="info-value">${data.imported_json.total_files_created || 0}</div>`;
      overviewHtml += `<div class="info-label">Processing Time:</div><div class="info-value">${new Date(data.imported_json.processing_completed).toLocaleString()}</div>`;

      // Show quick links
      if (data.imported_json.target_day) {
        const linksSection = document.getElementById('linksSection');
        const quickLinks = document.getElementById('quickLinks');
        linksSection.style.display = 'block';

        let linksHtml = '';
        linksHtml += `<div class="link-item">📅 <a href="/app/calendar/${data.imported_json.target_day}">View Day in Calendar</a></div>`;
        linksHtml += `<div class="link-item">💬 <a href="/app/transcripts/${data.imported_json.target_day}">View Transcript</a></div>`;
        quickLinks.innerHTML = linksHtml;
      }

      // Show created files
      if (data.imported_json.all_created_files && data.imported_json.all_created_files.length > 0) {
        const filesList = document.getElementById('filesList');
        const filesListContent = document.getElementById('filesListContent');
        filesList.style.display = 'block';

        let filesHtml = '';
        data.imported_json.all_created_files.forEach(file => {
          const basename = file.split('/').pop();
          filesHtml += `<li>${basename}</li>`;
        });
        filesListContent.innerHTML = filesHtml;
      }
    } else {
      overviewHtml += `<div class="info-label">Processing Status:</div><div class="info-value">Pending</div>`;
    }

    overviewContent.innerHTML = overviewHtml;

    // Update JSON tabs
    document.getElementById('importJsonContent').innerHTML = formatJson(data.import_json);
    document.getElementById('importedJsonContent').innerHTML = data.imported_json ? formatJson(data.imported_json) : '<span class="no-data">Processing not yet completed</span>';

  })
  .catch(err => {
    console.error('Error loading import details:', err);
    document.getElementById('importMeta').innerHTML = '<span style="color:red;">Error loading import details</span>';
    document.getElementById('overviewContent').innerHTML = '<div class="no-data">Error loading data</div>';
    document.getElementById('importJsonContent').innerHTML = '<span class="no-data">Error loading data</span>';
    document.getElementById('importedJsonContent').innerHTML = '<span class="no-data">Error loading data</span>';
  });

if (window.location.hash === '#content') {
  tabs.forEach(t => t.classList.toggle('active', t.dataset.target === 'content'));
  contents.forEach(c => c.classList.toggle('active', c.id === 'content'));
  loadContent(1);
}
</script>
