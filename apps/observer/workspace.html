<style>
.observer-card {
  border: 1px solid var(--facet-border, #e5e0db);
  border-left: 3px solid transparent;
  border-radius: 8px;
  background: #fafafa;
  padding: 1em 1.25em;
  margin-bottom: 1.5em;
  transition: background-color 0.15s ease, border-left-color 0.15s ease;
}
.observer-card.stale {
  background: color-mix(in srgb, var(--status-stale) 10%, white);
  border-left-color: var(--status-stale);
}
.observer-card.revoked {
  background: color-mix(in srgb, var(--status-inactive) 10%, white);
  border-left-color: var(--status-inactive);
}
.observer-card.revoked .observer-name {
  text-decoration: line-through;
  color: #5a6268;
}
.observer-card.disconnected {
  background: color-mix(in srgb, var(--status-error) 10%, white);
  border-left-color: var(--status-error);
}
.observer-card.connected {
  background: color-mix(in srgb, var(--status-active) 10%, white);
  border-left-color: var(--status-active);
}
.observer-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 0.5em;
}
.observer-name {
  font-weight: 600;
  font-size: 1.1em;
}
.observer-status {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  min-height: 28px;
  font-size: 0.8em;
  font-weight: 600;
  letter-spacing: 0.03em;
  text-transform: uppercase;
  padding: 4px 10px;
  border-radius: 4px;
  transition: background-color 0.6s ease, color 0.15s ease;
}

/* ── Transition: ambient status dot ── */
.observer-status::before {
  content: '';
  width: 10px;
  height: 10px;
  border-radius: 50%;
  transition: background-color 0.6s ease;
}
.observer-status::after {
  font-size: 0.95em;
  font-weight: 700;
  line-height: 1;
}
.observer-status.connected {
  background: color-mix(in srgb, var(--status-active) 12%, transparent);
  color: var(--status-active);
}
.observer-status.connected::before {
  background: var(--status-active);
}
.observer-status.connected::after {
  content: '✓';
}
.observer-status.stale {
  background: color-mix(in srgb, var(--status-stale) 12%, transparent);
  color: var(--status-stale);
}
.observer-status.stale::before {
  background: var(--status-stale);
}
.observer-status.stale::after {
  content: '⚠';
}
.observer-status.disconnected {
  background: color-mix(in srgb, var(--status-error) 12%, transparent);
  color: var(--status-error);
}
.observer-status.disconnected::before {
  background: var(--status-error);
}
.observer-status.disconnected::after {
  content: '✗';
}
.observer-status.revoked {
  background: color-mix(in srgb, var(--status-inactive) 12%, transparent);
  color: var(--status-inactive);
}
.observer-status.revoked::before {
  background: var(--status-inactive);
}
.observer-status.revoked::after {
  content: '—';
}
.observer-stats {
  font-size: 0.9em;
  color: #666;
  margin-bottom: 1em;
}
.observer-stats dl {
  margin: 0;
  display: flex;
  flex-wrap: wrap;
  gap: 0 2em;
}
.observer-stats dl > div {
  display: flex;
  gap: 0.3em;
}
.observer-stats dt {
  color: #8a8078;
  font-weight: 500;
  font-size: 0.85em;
}
.observer-stats dt::after {
  content: ':';
}
.observer-stats dd {
  margin: 0;
}
.observer-actions {
  display: flex;
  gap: 8px;
  min-height: 44px;
}
.observer-actions button {
  padding: 8px 16px;
  border: 1px solid var(--facet-border, #e5e0db);
  border-radius: 4px;
  background: white;
  cursor: pointer;
  font-size: 0.9em;
  font-weight: 500;
  min-height: 44px;
}
.observer-actions button:hover {
  background: rgba(0,0,0,0.05);
}
.observer-actions button.danger {
  color: #dc3545;
  border-color: #dc3545;
}
.observer-actions button.danger:hover {
  background: #f8d7da;
}
.observer-actions button:active {

}
.observer-actions button.danger:active {

}

/* Add observer form */
.add-observer-form {
  display: flex;
  gap: 8px;
  margin-bottom: 1em;
}
.add-observer-form input {

/* Observer key modal */
#keyModal .modal-content {

<div class="workspace-content">
  <div id="wsErrorContainer" class="ws-error-container" role="alert" style="display: none">
    <div class="ws-error-message" id="wsErrorMessage"></div>
    <div class="ws-error-actions">
      <button type="button" class="ws-error-retry" id="wsErrorRetry" style="display: none" onclick="loadObservers()">retry now</button>
      <span class="ws-error-countdown" id="wsErrorCountdown"></span>
      <button type="button" class="ws-error-dismiss" onclick="clearError()">dismiss</button>
    </div>
  </div>
  <section aria-label="observers">
    <h2 class="section-title">observers</h2>
    <section aria-label="add observer">
      <h2 class="section-title">add observer</h2>
      <form class="add-observer-form" id="addObserverForm">
        <label for="observerName">observer name</label>
        <input type="text" id="observerName" placeholder="e.g., laptop, desktop" maxlength="64" required>
        <button type="submit">add observer</button>
      </form>
    </section>
    <div id="observersList" role="list">
      <div class="surface-state surface-state--loading" role="status" aria-busy="true">
        <div class="surface-state-spinner" aria-hidden="true"></div>
        <span class="surface-state-text" data-role="loading-status">loading observers...</span>
      </div>
    </div>
  </section>
</div>

<!-- Observer Key Modal (for new observers and viewing existing keys) -->
<div id="keyModal" class="modal" role="dialog" aria-modal="true" aria-label="observer key">
  <div class="modal-content">
    <button type="button" class="modal-close" id="keyModalClose" aria-label="close">&times;</button>
    <h3 id="keyModalTitle">observer: <span id="modalObserverName"></span></h3>
    <p>Use these credentials in your solstone app's service settings. Bearer authentication (header) is recommended; URL path auth is legacy.</p>
    <div class="credential-label">Server URL</div>
    <div class="command-box">
      <code id="serverUrlText"></code>
      <button class="copy-btn" id="copyServerUrlBtn">copy</button>
    </div>
    <div class="credential-label">Key</div>
    <div class="command-box">
      <code id="keyText"></code>
      <button class="copy-btn" id="revealKeyBtn">reveal</button>
      <button class="copy-btn" id="copyKeyBtn">copy</button>
    </div>
    <p class="modal-warning">
      Keep this key secret — anyone with it can upload to your journal.
    </p>
    <div class="modal-actions">
      <button id="doneBtn" class="modal-primary-btn">done</button>
    </div>
  </div>
</div>

<script>
const observersList = document.getElementById('observersList');
const addObserverForm = document.getElementById('addObserverForm');
const observerNameInput = document.getElementById('observerName');
const keyModal = document.getElementById('keyModal');
const modalObserverName = document.getElementById('modalObserverName');
const serverUrlText = document.getElementById('serverUrlText');
const keyText = document.getElementById('keyText');
const copyServerUrlBtn = document.getElementById('copyServerUrlBtn');
const copyKeyBtn = document.getElementById('copyKeyBtn');
const doneBtn = document.getElementById('doneBtn');
const keyModalClose = document.getElementById('keyModalClose');
const revealKeyBtn = document.getElementById('revealKeyBtn');

function escapeHtml(value) {
  return window.AppServices.escapeHtml(value);
}

let keyModalTrigger = null;
// Error display state
const wsErrorContainer = document.getElementById('wsErrorContainer');
const wsErrorMessage = document.getElementById('wsErrorMessage');
const wsErrorRetry = document.getElementById('wsErrorRetry');
const wsErrorCountdown = document.getElementById('wsErrorCountdown');
let errorAutoHideTimer = null;
let countdownInterval = null;
let lastPollTime = Date.now();
const GROUP_ORDER = ['active', 'stale', 'inactive'];
const GROUP_LABELS = {
  active: 'Active',
  stale: 'Stale',
  inactive: 'Inactive'
};

function emptyStateHTML() {
  return '<h3 class="observer-empty-heading">add your first observer</h3>';
}

function statsHTML(observer, statusClass) {
  const lastSeenBase = observer.last_seen ? `${relativeTime(Date.now() - observer.last_seen)} ago` : 'never';
  const lastSeen = statusClass === 'stale'
    ? `${lastSeenBase} — stale`
    : statusClass === 'disconnected'
      ? `${lastSeenBase} — offline`
      : lastSeenBase;
  return `<dl>
    <div><dt>Last seen</dt><dd data-last-seen="${observer.last_seen || ''}" data-state="${statusClass}">${lastSeen}</dd></div>
    <div><dt>Segments (5-min chunks)</dt><dd>${observer.stats?.segments_received ?? 0}</dd></div>
    <div><dt>Data</dt><dd>${formatBytes(observer.stats?.bytes_received || 0)}</dd></div>
  </dl>`;
}

function showLocalError(message, opts = {}) {
  wsErrorMessage.textContent = message;
  wsErrorContainer.style.display = 'flex';
  wsErrorRetry.style.display = opts.retry ? 'inline-block' : 'none';

  // Clear any existing auto-hide timer
  if (errorAutoHideTimer) clearTimeout(errorAutoHideTimer);

  if (opts.retry) {
    // For load errors: start countdown, no auto-hide (countdown stays until next load)
    startCountdown();
  } else {
    // For action errors: auto-hide after 10 seconds, no countdown
    if (countdownInterval) {
      clearInterval(countdownInterval);
      countdownInterval = null;
    }
    wsErrorCountdown.textContent = '';
    errorAutoHideTimer = setTimeout(clearError, 10000);
  }
}

function clearError() {
  wsErrorContainer.style.display = 'none';
  wsErrorMessage.textContent = '';
  wsErrorCountdown.textContent = '';
  wsErrorRetry.style.display = 'none';
  if (errorAutoHideTimer) {
    clearTimeout(errorAutoHideTimer);
    errorAutoHideTimer = null;
  }
  if (countdownInterval) {
    clearInterval(countdownInterval);
    countdownInterval = null;
  }
}

function startCountdown() {
  if (countdownInterval) clearInterval(countdownInterval);
  updateCountdownDisplay();
  countdownInterval = setInterval(updateCountdownDisplay, 1000);
}

function updateCountdownDisplay() {
  const elapsed = Math.floor((Date.now() - lastPollTime) / 1000);
  const remaining = Math.max(0, 30 - elapsed);
  wsErrorCountdown.textContent = remaining > 0 ? `retrying in ${remaining}s\u2026` : 'retrying\u2026';
}

let currentFullKey = null;
let revealTimer = null;

function statusMeta(state) {
  const currentState = state || 'disconnected';
  return {
    statusClass: currentState,
    statusText:
      currentState === 'connected'
        ? 'Connected'
        : currentState === 'stale'
          ? 'Stale'
          : currentState === 'revoked'
            ? 'Revoked'
            : 'Disconnected',
    cardClass: currentState
  };
}

function groupFor(state) {
  if (state === 'connected') return 'active';
  if (state === 'stale') return 'stale';
  return 'inactive';
}

function groupHeaderHTML(group) {
  return `<h3 class="observer-group-header" data-group="${group}">${GROUP_LABELS[group]}</h3>`;
}

function observerCardHTML(observer) {
  const { statusClass, statusText, cardClass } = statusMeta(observer.state);
  const label = observer.label || statusText;
  const safeLabel = escapeHtml(label);

  return `
    <div class="observer-card ${cardClass}" data-key="${observer.key_prefix}" role="listitem" aria-label="${escapeHtml(observer.name)}, ${safeLabel}">
      <div class="observer-header">
        <span class="observer-name">${escapeHtml(observer.name)}</span>
        <span class="observer-status ${statusClass}">${safeLabel}</span>
      </div>
      <div class="observer-stats">${statsHTML(observer, statusClass)}</div>
      <div class="observer-actions">
        ${observer.revoked ? '' : `<button onclick="viewObserverKey('${observer.key_prefix}', '${escapeHtml(observer.name)}')">view key</button>`}
        ${observer.revoked ? '' : `<button class="danger" onclick="revokeObserver('${observer.key_prefix}', '${escapeHtml(observer.name)}')">revoke</button>`}
      </div>
    </div>
  `;
}

function renderObservers(observers) {
  if (!observers || observers.length === 0) {
    return emptyStateHTML();
  }

  const groups = {
    active: [],
    stale: [],
    inactive: []
  };

  for (const observer of observers) {
    const group = observer.group || groupFor(observer.state);
    (groups[group] || groups.inactive).push(observer);
  }

  let html = '';
  for (const group of GROUP_ORDER) {
    if (!groups[group].length) continue;
    html += groupHeaderHTML(group);
    html += groups[group].map(observerCardHTML).join('');
  }

  return html || emptyStateHTML();
}

function formatBytes(bytes) {
  if (bytes === 0) return '0 B';
  const k = 1024;
  const sizes = ['B', 'KB', 'MB', 'GB', 'TB'];
  const i = Math.floor(Math.log(bytes) / Math.log(k));
  return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i];
}

async function loadObservers() {
  lastPollTime = Date.now();
  if (countdownInterval) { clearInterval(countdownInterval); countdownInterval = null; }
  try {
    const payload = await window.apiJson('/app/observer/api/list');
    if (!payload || typeof payload !== 'object' || !Array.isArray(payload.observers)) {
      throw new window.ApiError({
        status: 200,
        statusText: 'OK',
        serverMessage: 'Malformed observer response',
        url: '/app/observer/api/list',
        cause: 'parse',
      });
    }
    if (payload.thresholds && typeof payload.thresholds !== 'object') {
      throw new window.ApiError({
        status: 200,
        statusText: 'OK',
        serverMessage: 'Malformed observer response',
        url: '/app/observer/api/list',
        cause: 'parse',
      });
    }
    const observers = payload.observers;

    // Rebuild on every poll so grouped headers stay aligned with server ordering.
    const activeEl = document.activeElement;
    let focusSelector = null;
    if (activeEl && observersList.contains(activeEl)) {
      const card = activeEl.closest('.observer-card');
      if (card) {
        const key = card.getAttribute('data-key');
        const buttons = [...card.querySelectorAll('button')];
        const btnIndex = buttons.indexOf(activeEl);
        if (btnIndex >= 0) {
          focusSelector = `[data-key="${key}"] button:nth-child(${btnIndex + 1})`;
        }
      }
    }
    const scrollTop = observersList.scrollTop;

    observersList.innerHTML = renderObservers(observers);
    clearError();
    observersList.scrollTop = scrollTop;

    if (focusSelector) {
      const target = observersList.querySelector(focusSelector);
      if (target) target.focus();
    }
  } catch (err) {
    window.SurfaceState.replaceLoading('observersList', window.SurfaceState.errorCard({
      heading: 'Couldn\'t load observers',
      desc: 'Reload the page to try again.',
      serverMessage: err?.serverMessage || err?.message || '',
    }));
  }
}

function refreshTimestamps() {
  const spans = observersList.querySelectorAll('[data-last-seen]');
  for (const span of spans) {
    const lastSeen = parseInt(span.getAttribute('data-last-seen'), 10);
    if (!lastSeen) continue;
    const text = `${relativeTime(Date.now() - lastSeen)} ago`;
    const state = span.getAttribute('data-state');
    span.textContent = state === 'stale'
      ? `${text} — stale`
      : state === 'disconnected'
        ? `${text} — offline`
        : text;
  }
}

async function revokeObserver(keyPrefix, name) {
  if (!confirm(`Revoke observer "${name}"? The observer will no longer be able to upload.`)) {
    return;
  }

  try {
    const response = await fetch(`/app/observer/api/${keyPrefix}`, {
      method: 'DELETE'
    });

    if (!response.ok) {
      const data = await response.json();
      throw new Error(data.error || 'Failed to revoke');
    }

    loadObservers();
  } catch (err) {
    const msg = 'couldn\'t revoke observer — the server may be unavailable. try again in a moment.';
    if (window.showError) { showError(msg); } else { showLocalError(msg); }
  }
}

async function viewObserverKey(keyPrefix, name) {
  if (!confirm(`Reveal key for "${name}"?`)) return;
  const trigger = document.querySelector(`.observer-card[data-key="${keyPrefix}"] button`);
  try {
    const response = await fetch(`/app/observer/api/${keyPrefix}/key`);
    const data = await response.json();

    if (!response.ok) {
      throw new Error(data.error || 'Failed to get key');
    }

    showKeyModal(name, data.key, trigger);
  } catch (err) {
    const msg = 'couldn\'t retrieve observer key — the server may be unavailable. try again in a moment.';
    if (window.showError) { showError(msg); } else { showLocalError(msg); }
  }
}

function showKeyModal(name, key, trigger) {
  modalObserverName.textContent = name;
  serverUrlText.textContent = window.location.origin;
  currentFullKey = key;
  keyText.textContent = key.slice(0, 8) + '••••••••••••••••';
  revealKeyBtn.textContent = 'reveal';
  if (revealTimer) { clearTimeout(revealTimer); revealTimer = null; }
  keyModal.style.display = 'block';
  keyModalTrigger = trigger || null;
  keyModalClose.focus();
  document.addEventListener('keydown', handleKeyModalKeys);
}

addObserverForm.onsubmit = async (e) => {
  e.preventDefault();
  const name = observerNameInput.value.trim();
  if (!name) return;

  const submitBtn = addObserverForm.querySelector('button[type="submit"]');
  submitBtn.disabled = true;

  try {
    const response = await fetch('/app/observer/api/create', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name })
    });

    const data = await response.json();

    if (!response.ok) {
      throw new Error(data.error || 'Failed to create observer');
    }

    // Show modal with key
    showKeyModal(name, data.key, submitBtn);

    // Clear input and reload list
    observerNameInput.value = '';
    loadObservers();
  } catch (err) {
    const msg = 'couldn\'t add observer — the name may already be in use. try a different name or refresh the page.';
    if (window.showError) { showError(msg); } else { showLocalError(msg); }
  } finally {
    submitBtn.disabled = false;
  }
};

function handleKeyModalKeys(e) {
  if (e.key === 'Escape') {
    closeKeyModal();
    return;
  }
  if (e.key === 'Tab') {
    const focusable = [...keyModal.querySelectorAll('button:not([disabled]), [tabindex="0"]')];
    if (focusable.length === 0) return;
    const currentIndex = focusable.indexOf(document.activeElement);
    if (e.shiftKey) {
      e.preventDefault();
      focusable[currentIndex <= 0 ? focusable.length - 1 : currentIndex - 1].focus();
    } else {
      e.preventDefault();
      focusable[currentIndex >= focusable.length - 1 ? 0 : currentIndex + 1].focus();
    }
  }
}

function closeKeyModal() {
  if (revealTimer) { clearTimeout(revealTimer); revealTimer = null; }
  currentFullKey = null;
  revealKeyBtn.textContent = 'reveal';
  keyModal.style.display = 'none';
  document.removeEventListener('keydown', handleKeyModalKeys);
  if (keyModalTrigger && document.contains(keyModalTrigger)) {
    keyModalTrigger.focus();
  }
  keyModalTrigger = null;
}

// Modal controls
keyModalClose.onclick = () => closeKeyModal();
doneBtn.onclick = () => closeKeyModal();

window.onclick = (e) => {
  if (e.target === keyModal) {
    closeKeyModal();
  }
};

function copyText(text) {
  if (navigator.clipboard && navigator.clipboard.writeText) {
    return navigator.clipboard.writeText(text);
  }
  // Fallback for non-HTTPS contexts (local solstone instances)
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.opacity = '0';
  document.body.appendChild(ta);
  ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
  return Promise.resolve();
}

function setupCopyBtn(btn, codeEl) {
  btn.onclick = () => {
    copyText(codeEl.textContent).then(() => {
      btn.textContent = 'copied!';
      btn.classList.add('copied');
      setTimeout(() => {
        btn.textContent = 'copy';
        btn.classList.remove('copied');
      }, 2000);
    }, () => {
      btn.textContent = 'failed';
      setTimeout(() => { btn.textContent = 'copy'; }, 2000);
    });
  };
}

setupCopyBtn(copyServerUrlBtn, serverUrlText);
copyKeyBtn.onclick = () => {
  if (!currentFullKey) return;
  copyText(currentFullKey).then(() => {
    copyKeyBtn.textContent = 'copied!';
    copyKeyBtn.classList.add('copied');
    setTimeout(() => {
      copyKeyBtn.textContent = 'copy';
      copyKeyBtn.classList.remove('copied');
    }, 2000);
  }, () => {
    copyKeyBtn.textContent = 'failed';
    setTimeout(() => { copyKeyBtn.textContent = 'copy'; }, 2000);
  });
};
revealKeyBtn.onclick = () => {
  if (!currentFullKey) return;
  const isRevealed = keyText.textContent === currentFullKey;
  if (isRevealed) {
    keyText.textContent = currentFullKey.slice(0, 8) + '••••••••••••••••';
    revealKeyBtn.textContent = 'reveal';
    if (revealTimer) { clearTimeout(revealTimer); revealTimer = null; }
  } else {
    keyText.textContent = currentFullKey;
    revealKeyBtn.textContent = 'hide';
    if (revealTimer) clearTimeout(revealTimer);
    revealTimer = setTimeout(() => {
      if (currentFullKey && keyText.textContent === currentFullKey) {
        keyText.textContent = currentFullKey.slice(0, 8) + '••••••••••••••••';
        revealKeyBtn.textContent = 'reveal';
      }
      revealTimer = null;
    }, 30000);
  }
};

// Initial load
loadObservers();

// Refresh every 30 seconds to update connection status
setInterval(loadObservers, 30000);
setInterval(refreshTimestamps, 10000);
</script>
