<style>
.observer-card {
  background: #f8f9fa;
  border: 1px solid #dee2e6;
  border-radius: 8px;
  padding: 1em;
  margin-bottom: 1em;
}
.observer-card.disconnected {
  opacity: 0.7;
}
.observer-card.revoked {
  opacity: 0.5;
  background: #e9ecef;
}
.observer-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 0.5em;
}
.observer-name {
  font-weight: bold;
  font-size: 1.1em;
}
.observer-status {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 0.9em;
  padding: 2px 8px;
  border-radius: 4px;
}
.observer-status.connected {
  background: #d4edda;
  color: #155724;
}
.observer-status.connected::before {
  content: '';
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: #28a745;
}
.observer-status.disconnected {
  background: #f8d7da;
  color: #721c24;
}
.observer-status.disconnected::before {
  content: '';
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: #dc3545;
}
.observer-status.revoked {
  background: #e9ecef;
  color: #6c757d;
}
.observer-status.revoked::before {
  content: '';
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: #6c757d;
}
.observer-stats {
  font-size: 0.9em;
  color: #666;
  margin-bottom: 0.5em;
}
.observer-stats span {
  margin-right: 1.5em;
}
.observer-actions {
  display: flex;
  gap: 0.5em;
}
.observer-actions button {
  padding: 4px 12px;
  border: 1px solid #ccc;
  border-radius: 4px;
  background: white;
  cursor: pointer;
  font-size: 0.9em;
}
.observer-actions button:hover {
  background: #f0f0f0;
}
.observer-actions button.danger {
  color: #dc3545;
  border-color: #dc3545;
}
.observer-actions button.danger:hover {
  background: #f8d7da;
}

/* Add observer form */
.add-observer-form {
  display: flex;
  gap: 0.5em;
  margin-bottom: 1.5em;
}
.add-observer-form input {
  flex: 1;
  padding: 8px 12px;
  border: 1px solid #ccc;
  border-radius: 4px;
  font-size: 1em;
}
.add-observer-form button {
  padding: 8px 16px;
  background: #007bff;
  color: white;
  border: none;
  border-radius: 4px;
  cursor: pointer;
  font-weight: bold;
}
.add-observer-form button:hover {
  background: #0056b3;
}
.add-observer-form button:disabled {
  background: #ccc;
  cursor: not-allowed;
}

/* Observer key modal */
.modal {
  display: none;
  position: fixed;
  z-index: 1000;
  left: 0;
  top: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.5);
}
.modal-content {
  background: white;
  margin: 10% auto;
  padding: 1.5em;
  border-radius: 8px;
  max-width: 600px;
  position: relative;
}
.modal-close {
  position: absolute;
  top: 10px;
  right: 15px;
  cursor: pointer;
  font-size: 24px;
  color: #666;
}
.modal-close:hover {
  color: #333;
}
.modal h3 {
  margin-top: 0;
  margin-bottom: 1em;
}
.command-box {
  background: #1e1e1e;
  color: #d4d4d4;
  padding: 1em;
  border-radius: 4px;
  font-family: monospace;
  font-size: 0.9em;
  overflow-x: auto;
  margin: 1em 0;
  position: relative;
}
.command-box code {
  white-space: pre-wrap;
  word-break: break-all;
}
.copy-btn {
  position: absolute;
  top: 8px;
  right: 8px;
  padding: 4px 8px;
  background: #444;
  color: white;
  border: none;
  border-radius: 4px;
  cursor: pointer;
  font-size: 0.8em;
}
.copy-btn:hover {
  background: #555;
}
.copy-btn.copied {
  background: #28a745;
}
.credential-label {
  font-weight: bold;
  font-size: 0.85em;
  color: #333;
  margin-bottom: 0.25em;
}
.modal-actions {
  display: flex;
  justify-content: flex-end;
  margin-top: 1em;
}
.modal-actions button {
  padding: 8px 16px;
  border-radius: 4px;
  cursor: pointer;
}

.no-observers {
  color: #666;
  font-style: italic;
  text-align: center;
  padding: 2em;
}

.section-title {
  margin-bottom: 1em;
  color: #333;
}
</style>

<div class="workspace-content">
  <h2 class="section-title">Add Observer Observer</h2>
  <form class="add-observer-form" id="addObserverForm">
    <input type="text" id="observerName" placeholder="Observer name (e.g., laptop, desktop)" required>
    <button type="submit">Add Observer</button>
  </form>

  <h2 class="section-title">Connected Observers</h2>
  <div id="observersList">
    <div class="no-observers">Loading...</div>
  </div>
</div>

<!-- Observer Key Modal (for new observers and viewing existing keys) -->
<div id="keyModal" class="modal">
  <div class="modal-content">
    <span class="modal-close" id="keyModalClose">&times;</span>
    <h3 id="keyModalTitle">Observer: <span id="modalObserverName"></span></h3>
    <p>Use these credentials in your solstone app's service settings:</p>
    <div class="credential-label">Server URL</div>
    <div class="command-box">
      <code id="serverUrlText"></code>
      <button class="copy-btn" id="copyServerUrlBtn">Copy</button>
    </div>
    <div class="credential-label">Key</div>
    <div class="command-box">
      <code id="keyText"></code>
      <button class="copy-btn" id="copyKeyBtn">Copy</button>
    </div>
    <p style="font-size: 0.9em; color: #666;">
      Keep this key secret — anyone with it can upload to your journal.
    </p>
    <div class="modal-actions">
      <button id="doneBtn" style="background: #007bff; color: white; border: none;">Done</button>
    </div>
  </div>
</div>

<script>
const observersList = document.getElementById('observersList');
const addObserverForm = document.getElementById('addObserverForm');
const observerNameInput = document.getElementById('observerName');
const keyModal = document.getElementById('keyModal');
const modalObserverName = document.getElementById('modalObserverName');
const serverUrlText = document.getElementById('serverUrlText');
const keyText = document.getElementById('keyText');
const copyServerUrlBtn = document.getElementById('copyServerUrlBtn');
const copyKeyBtn = document.getElementById('copyKeyBtn');
const doneBtn = document.getElementById('doneBtn');
const keyModalClose = document.getElementById('keyModalClose');

function formatBytes(bytes) {
  if (bytes === 0) return '0 B';
  const k = 1024;
  const sizes = ['B', 'KB', 'MB', 'GB', 'TB'];
  const i = Math.floor(Math.log(bytes) / Math.log(k));
  return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i];
}

function formatTimeAgo(timestamp) {
  if (!timestamp) return 'never';
  const seconds = Math.floor((Date.now() - timestamp) / 1000);
  if (seconds < 60) return 'just now';
  if (seconds < 3600) return `${Math.floor(seconds / 60)} min ago`;
  if (seconds < 86400) return `${Math.floor(seconds / 3600)} hours ago`;
  return `${Math.floor(seconds / 86400)} days ago`;
}

function isConnected(lastSeen) {
  if (!lastSeen) return false;
  // Consider connected if seen in last 2 minutes
  return (Date.now() - lastSeen) < 120000;
}

async function loadObservers() {
  try {
    const response = await fetch('/app/observer/api/list');
    const observers = await response.json();

    if (!observers || observers.length === 0) {
      observersList.innerHTML = '<div class="no-observers">No observers registered yet. Add one above to get started.</div>';
      return;
    }

    let html = '';
    for (const observer of observers) {
      const isRevoked = observer.revoked;
      let statusClass, statusText, cardClass;

      if (isRevoked) {
        statusClass = 'revoked';
        statusText = 'Revoked';
        cardClass = 'revoked';
      } else {
        const connected = isConnected(observer.last_seen);
        statusClass = connected ? 'connected' : 'disconnected';
        statusText = connected ? 'Connected' : 'Disconnected';
        cardClass = statusClass;
      }

      html += `
        <div class="observer-card ${cardClass}" data-key="${observer.key_prefix}">
          <div class="observer-header">
            <span class="observer-name">${escapeHtml(observer.name)}</span>
            <span class="observer-status ${statusClass}">${statusText}</span>
          </div>
          <div class="observer-stats">
            <span>Last seen: ${formatTimeAgo(observer.last_seen)}</span>
            <span>Segments: ${observer.stats?.segments_received || 0}</span>
            <span>Data: ${formatBytes(observer.stats?.bytes_received || 0)}</span>
          </div>
          <div class="observer-actions">
            ${isRevoked ? '' : `<button onclick="viewObserverKey('${observer.key_prefix}', '${escapeHtml(observer.name)}')">View Key</button>`}
            ${isRevoked ? '' : `<button class="danger" onclick="revokeObserver('${observer.key_prefix}', '${escapeHtml(observer.name)}')">Revoke</button>`}
          </div>
        </div>
      `;
    }
    observersList.innerHTML = html;
  } catch (err) {
    observersList.innerHTML = '<div class="no-observers">Error loading observers</div>';
    console.error('Failed to load observers:', err);
  }
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

async function revokeObserver(keyPrefix, name) {
  if (!confirm(`Revoke observer "${name}"? The observer will no longer be able to upload.`)) {
    return;
  }

  try {
    const response = await fetch(`/app/observer/api/${keyPrefix}`, {
      method: 'DELETE'
    });

    if (!response.ok) {
      const data = await response.json();
      throw new Error(data.error || 'Failed to revoke');
    }

    loadObservers();
  } catch (err) {
    if (window.showError) showError(err.message);
  }
}

async function viewObserverKey(keyPrefix, name) {
  try {
    const response = await fetch(`/app/observer/api/${keyPrefix}/key`);
    const data = await response.json();

    if (!response.ok) {
      throw new Error(data.error || 'Failed to get key');
    }

    showKeyModal(name, data.key);
  } catch (err) {
    if (window.showError) showError(err.message);
  }
}

function showKeyModal(name, key) {
  modalObserverName.textContent = name;
  serverUrlText.textContent = window.location.origin;
  keyText.textContent = key;
  keyModal.style.display = 'block';
}

addObserverForm.onsubmit = async (e) => {
  e.preventDefault();
  const name = observerNameInput.value.trim();
  if (!name) return;

  const submitBtn = addObserverForm.querySelector('button[type="submit"]');
  submitBtn.disabled = true;

  try {
    const response = await fetch('/app/observer/api/create', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name })
    });

    const data = await response.json();

    if (!response.ok) {
      throw new Error(data.error || 'Failed to create observer');
    }

    // Show modal with key
    showKeyModal(name, data.key);

    // Clear input and reload list
    observerNameInput.value = '';
    loadObservers();
  } catch (err) {
    if (window.showError) showError(err.message);
  } finally {
    submitBtn.disabled = false;
  }
};

// Modal controls
keyModalClose.onclick = () => {
  keyModal.style.display = 'none';
};

doneBtn.onclick = () => {
  keyModal.style.display = 'none';
};

window.onclick = (e) => {
  if (e.target === keyModal) {
    keyModal.style.display = 'none';
  }
};

function copyText(text) {
  if (navigator.clipboard && navigator.clipboard.writeText) {
    return navigator.clipboard.writeText(text);
  }
  // Fallback for non-HTTPS contexts (local solstone instances)
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.opacity = '0';
  document.body.appendChild(ta);
  ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
  return Promise.resolve();
}

function setupCopyBtn(btn, codeEl) {
  btn.onclick = () => {
    copyText(codeEl.textContent).then(() => {
      btn.textContent = 'Copied!';
      btn.classList.add('copied');
      setTimeout(() => {
        btn.textContent = 'Copy';
        btn.classList.remove('copied');
      }, 2000);
    }, () => {
      btn.textContent = 'Failed';
      setTimeout(() => { btn.textContent = 'Copy'; }, 2000);
    });
  };
}

setupCopyBtn(copyServerUrlBtn, serverUrlText);
setupCopyBtn(copyKeyBtn, keyText);

// Initial load
loadObservers();

// Refresh every 30 seconds to update connection status
setInterval(loadObservers, 30000);
</script>
